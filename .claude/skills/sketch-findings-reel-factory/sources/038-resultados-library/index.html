<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sketch 038 — Resultados as a persistent library / history</title>
<link rel="stylesheet" href="../themes/default.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--font); background: var(--canvas); color: var(--text); font-size: var(--t-base); padding-top: 46px; -webkit-font-smoothing: antialiased; }
  .variant { display: none; height: calc(100vh - 46px); }
  .variant.active { display: flex; }
  @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* rail (033-B, Resultados active) */
  .rail { width: 56px; flex: none; background: var(--chrome); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: var(--s-6) 0; gap: var(--s-3); }
  .rlogo { width: 30px; height: 30px; border-radius: var(--r-sm); background: linear-gradient(145deg, var(--accent), var(--accent-strong)); display: grid; place-items: center; font-weight: 800; color: var(--stage); margin-bottom: var(--s-6); }
  .railbtn { width: 40px; height: 40px; border-radius: var(--r-sm); border: none; background: none; color: var(--text-muted); cursor: pointer; display: grid; place-items: center; font-size: 17px; position: relative; transition: all var(--dur) var(--ease); }
  .railbtn:hover { background: var(--surface-2); color: var(--text); }
  .railbtn.on { background: var(--accent-tint); color: var(--accent); }
  .railbtn.on::before { content: ""; position: absolute; left: -8px; top: 8px; bottom: 8px; width: 3px; border-radius: 2px; background: var(--accent); }
  .railbtn .lab { position: absolute; left: 48px; top: 50%; transform: translateY(-50%); background: var(--surface); border: 1px solid var(--border-strong); color: var(--text); font-size: var(--t-xs); font-weight: 500; padding: 4px 9px; border-radius: var(--r-xs); white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity var(--dur); box-shadow: var(--shadow-md); z-index: 50; }
  .railbtn:hover .lab { opacity: 1; }
  .railbtn .tally { position: absolute; top: 2px; right: 2px; display: flex; gap: 2px; font-size: 8px; font-weight: 700; font-family: var(--mono); }
  .railbtn .tally .ok { color: var(--success); }
  .rail .rsp { flex: 1; }

  .colwrap { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .hdr { height: 52px; flex: none; display: flex; align-items: center; gap: var(--s-6); padding: 0 var(--s-12); background: var(--chrome); border-bottom: 1px solid var(--border); }
  .ctxname { font-size: var(--t-md); font-weight: 600; color: var(--text); }
  .ctxname .ct { color: var(--text-muted); font-weight: 500; font-size: var(--t-sm); margin-left: 7px; }
  .spacer { flex: 1; }
  .search { display: flex; align-items: center; gap: 7px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 5px 10px; font-size: var(--t-sm); color: var(--text-muted); width: 200px; }
  .btn { font: inherit; font-size: var(--t-sm); font-weight: 600; padding: 6px 13px; border-radius: var(--r-sm); cursor: pointer; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 6px; transition: all var(--dur) var(--ease); }
  .btn-out { background: transparent; border-color: var(--border-strong); color: var(--text-2); }
  .btn-out:hover { background: var(--surface-2); color: var(--text); }
  .btn-acc { background: var(--accent-tint); border-color: var(--accent-strong); color: var(--accent); }
  .btn-acc:hover { background: var(--accent-tint-2); }
  .btn-green { background: var(--action); color: #08220f; }
  .btn-green:hover { background: var(--action-hover); }
  .toggle-empty { font-size: var(--t-2xs); color: var(--text-faint); border: 1px dashed var(--border-strong); border-radius: var(--r-full); padding: 3px 9px; cursor: pointer; }

  .scroll { flex: 1; overflow-y: auto; padding: var(--s-12) var(--s-16); }

  /* shared reel-thumb visual */
  .thumb { border-radius: var(--r-sm); position: relative; overflow: hidden; flex: none; }
  .thumb .tt { position: absolute; top: 10%; left: 8%; right: 8%; text-align: center; font-weight: 700; background: rgba(0,0,0,.5); color: #fff; border-radius: 4px; }
  .thumb .cw { position: absolute; bottom: 12%; left: 0; right: 0; text-align: center; font-weight: 800; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.6); }
  .thumb .play { position: absolute; inset: 0; display: grid; place-items: center; font-size: 22px; color: rgba(255,255,255,.9); opacity: 0; transition: opacity var(--dur) var(--ease); background: oklch(0.1 0.02 280 / 0.25); }
  .platbadges { display: flex; gap: 5px; }
  .pb { font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: var(--r-full); background: var(--surface-2); color: var(--text-muted); }
  .pb.rdy { background: var(--accent-tint); color: var(--accent); }

  /* ── A: uniform gallery grid ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(168px, 1fr)); gap: var(--s-10); }
  .gcard { cursor: pointer; }
  .gcard .thumb { aspect-ratio: 9/16; background: linear-gradient(180deg, oklch(0.34 0.05 255), oklch(0.2 0.03 280)); margin-bottom: var(--s-5); }
  .gcard .thumb .tt { font-size: 10px; padding: 3px; } .gcard .thumb .cw { font-size: 13px; }
  .gcard:hover .thumb .play { opacity: 1; }
  .gcard .gn { font-size: var(--t-sm); font-weight: 600; color: var(--text); }
  .gcard .gm { font-size: var(--t-2xs); color: var(--text-muted); margin-top: 2px; }
  .gcard .ga { display: flex; gap: 6px; margin-top: var(--s-5); opacity: 0; transition: opacity var(--dur) var(--ease); }
  .gcard:hover .ga { opacity: 1; }

  /* ── B: file-manager list ── */
  .lhead { display: grid; grid-template-columns: 52px 1fr 130px 90px 80px 150px; gap: var(--s-6); padding: 0 var(--s-6) var(--s-4); font-size: var(--t-2xs); color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .lrow { display: grid; grid-template-columns: 52px 1fr 130px 90px 80px 150px; gap: var(--s-6); align-items: center; padding: var(--s-5) var(--s-6); border-radius: var(--r-sm); border-bottom: 1px solid var(--border-faint); transition: background var(--dur) var(--ease); }
  .lrow:hover { background: var(--surface); }
  .lrow .thumb { width: 36px; height: 64px; background: linear-gradient(180deg, oklch(0.34 0.05 255), oklch(0.2 0.03 280)); }
  .lrow .thumb .tt { font-size: 5px; padding: 1px; } .lrow .thumb .cw { font-size: 7px; }
  .lrow:hover .thumb .play { opacity: 1; font-size: 14px; }
  .lrow .ln { font-size: var(--t-sm); font-weight: 600; color: var(--text); font-family: var(--mono); }
  .lrow .lsub { font-size: var(--t-2xs); color: var(--text-muted); margin-top: 2px; }
  .lrow .lm { font-size: var(--t-xs); color: var(--text-2); }
  .lrow .la { display: flex; gap: 6px; opacity: 0; transition: opacity var(--dur) var(--ease); }
  .lrow:hover .la { opacity: 1; }
  .iconmini { width: 26px; height: 26px; display: grid; place-items: center; border-radius: var(--r-xs); border: 1px solid var(--border); background: var(--surface); color: var(--text-2); cursor: pointer; font-size: 12px; }
  .iconmini:hover { border-color: var(--border-strong); color: var(--text); }

  /* ── C: featured latest + history ── */
  .feat { display: flex; gap: var(--s-16); margin-bottom: var(--s-14); align-items: flex-start; }
  .feat .thumb { width: 230px; aspect-ratio: 9/16; background: linear-gradient(180deg, oklch(0.4 0.07 150), oklch(0.22 0.03 160)); box-shadow: var(--shadow-md); }
  .feat .thumb .tt { font-size: 12px; padding: 5px; } .feat .thumb .cw { font-size: 15px; }
  .feat .thumb .play { opacity: .85; font-size: 30px; }
  .feat .meta { flex: 1; padding-top: var(--s-4); }
  .feat .freshtag { display: inline-flex; align-items: center; gap: 6px; font-size: var(--t-2xs); font-weight: 700; color: var(--success); background: oklch(0.72 0.14 150 / 0.16); padding: 3px 9px; border-radius: var(--r-full); letter-spacing: 0.04em; text-transform: uppercase; }
  .feat h2 { font-size: var(--t-2xl); font-weight: 700; margin: var(--s-6) 0 var(--s-3); letter-spacing: -0.01em; }
  .feat .filecard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); padding: var(--s-5) var(--s-8); font-family: var(--mono); font-size: var(--t-xs); color: var(--text-2); margin: var(--s-5) 0; display: inline-block; }
  .feat .factions { display: flex; gap: var(--s-5); margin: var(--s-8) 0; }
  .feat .metarow { display: flex; align-items: center; gap: var(--s-6); font-size: var(--t-sm); color: var(--text-2); margin-top: var(--s-6); }
  .feat .metarow .lbl { color: var(--text-muted); font-size: var(--t-xs); }
  .histlabel { font-size: var(--t-2xs); color: var(--text-muted); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: var(--s-6); display: flex; align-items: center; gap: 8px; }
  .histlabel::after { content: ""; flex: 1; height: 1px; background: var(--border-faint); }
  .histrow { display: flex; align-items: center; gap: var(--s-8); padding: var(--s-5) var(--s-5); border-radius: var(--r-sm); transition: background var(--dur) var(--ease); cursor: pointer; }
  .histrow:hover { background: var(--surface); }
  .histrow .thumb { width: 30px; height: 53px; background: linear-gradient(180deg, oklch(0.34 0.05 255), oklch(0.2 0.03 280)); }
  .histrow .hn { font-size: var(--t-sm); color: var(--text); font-weight: 500; font-family: var(--mono); flex: 1; }
  .histrow .hm { font-size: var(--t-xs); color: var(--text-muted); }
  .histrow .ha { display: flex; gap: 6px; opacity: 0; transition: opacity var(--dur) var(--ease); }
  .histrow:hover .ha { opacity: 1; }

  /* empty state (shared) */
  .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--s-8); text-align: center; padding: var(--s-16); }
  .empty .eill { width: 90px; height: 160px; border: 2px dashed var(--border-strong); border-radius: var(--r-md); display: grid; place-items: center; font-size: 30px; color: var(--text-faint); }
  .empty h2 { font-size: var(--t-xl); font-weight: 600; }
  .empty p { font-size: var(--t-sm); color: var(--text-muted); max-width: 42ch; line-height: 1.6; }

  .vhint { font-size: var(--t-2xs); color: var(--text-faint); padding: var(--s-4) var(--s-12); text-align: center; border-top: 1px solid var(--border-faint); background: var(--canvas); flex: none; line-height: 1.5; }
  .vhint b { color: var(--text-muted); }

  #vnav { position: fixed; top: 0; left: 0; right: 0; height: 46px; z-index: 9998; background: var(--chrome); border-bottom: 1px solid var(--border-strong); display: flex; align-items: center; gap: var(--s-4); padding: 0 var(--s-10); font-size: var(--t-sm); }
  #vnav .lbl { color: var(--text-muted); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; font-size: var(--t-2xs); margin-right: var(--s-4); }
  .vtab { font: inherit; font-size: var(--t-sm); color: var(--text-2); background: var(--surface); border: 1px solid var(--border); padding: 5px 12px; border-radius: var(--r-full); cursor: pointer; }
  .vtab.active { background: var(--accent-tint); border-color: var(--accent-strong); color: var(--accent); font-weight: 600; }
  #vnav .hint { margin-left: auto; color: var(--text-faint); font-size: var(--t-2xs); }
  #tools { position: fixed; bottom: 12px; right: 12px; z-index: 9999; font-family: system-ui; font-size: 11px; background: rgba(0,0,0,0.72); color: #fff; padding: 7px 10px; border-radius: 8px; opacity: 0.4; display: flex; gap: 8px; transition: opacity .2s; }
  #tools:hover { opacity: 1; } #tools select { font: inherit; background: #222; color: #fff; border: 1px solid #555; border-radius: 4px; }
</style>
</head>
<body>

<nav id="vnav">
  <span class="lbl">Sketch 038 · Resultados library</span>
  <button class="vtab active" onclick="show('a',this)">A ★ · Galería uniforme</button>
  <button class="vtab" onclick="show('b',this)">B · Lista tipo archivo</button>
  <button class="vtab" onclick="show('c',this)">C · Último destacado + historial</button>
  <span class="hint">El destino <b style="color:var(--accent)">Resultados</b> del riel cuando NO acabás de renderizar · tocá "ver vacío" en cada uno</span>
</nav>

<!-- shared rail builder injected by JS into each variant -->
<div class="variant active" id="v-a"></div>
<div class="variant" id="v-b"></div>
<div class="variant" id="v-c"></div>

<div id="tools"><span>theme</span>
  <select onchange="document.querySelector('link[href*=themes]').href='../themes/'+this.value+'.css'"><option value="default">default</option></select>
</div>

<script>
// ── real-ish finished reels (what's in output/) ──
const REELS = [
  { id:1, name:'reel-3-trucos.mp4',        title:'3 trucos de edición', cap:'tus reels', date:'hoy · 14:32',    dur:'1:14', size:'9.4 MB', plats:[1,1,1], fresh:true,  bg:'linear-gradient(180deg,oklch(0.4 0.07 150),oklch(0.22 0.03 160))' },
  { id:2, name:'entrevista-marzo.mp4',     title:'Entrevista', cap:'la clave', date:'hoy · 11:08',    dur:'2:41', size:'17.2 MB', plats:[1,1,0], bg:'linear-gradient(180deg,oklch(0.34 0.05 255),oklch(0.2 0.03 280))' },
  { id:3, name:'clip-podcast-07.mp4',      title:'Podcast #7', cap:'escuchá esto', date:'ayer · 19:50',   dur:'0:58', size:'6.1 MB', plats:[1,0,0], bg:'linear-gradient(180deg,oklch(0.3 0.08 320),oklch(0.18 0.04 300))' },
  { id:4, name:'reel-promo-abril.mp4',     title:'Promo abril', cap:'no te lo pierdas', date:'2 días',        dur:'0:32', size:'3.8 MB', plats:[1,1,1], bg:'linear-gradient(180deg,oklch(0.28 0.06 200),oklch(0.16 0.03 220))' },
  { id:5, name:'demo-producto.mp4',        title:'Demo', cap:'así funciona', date:'3 días',        dur:'1:47', size:'11.9 MB', plats:[0,0,0], bg:'linear-gradient(180deg,oklch(0.32 0.04 60),oklch(0.18 0.02 40))' },
  { id:6, name:'tip-rapido-edicion.mp4',   title:'Tip rápido', cap:'un segundo', date:'la semana pasada', dur:'0:21', size:'2.4 MB', plats:[1,0,1], bg:'linear-gradient(180deg,oklch(0.36 0.05 160),oklch(0.2 0.03 180))' },
];
function thumb(r, cls=''){ return `<div class="thumb ${cls}" style="background:${r.bg}"><div class="tt">${r.title}</div><div class="cw">${r.cap}</div><div class="play">▶</div></div>`; }
function badges(plats){ const names=['TikTok','Reels','Shorts']; return `<div class="platbadges">${plats.map((p,i)=>`<span class="pb ${p?'rdy':''}">${names[i]}</span>`).join('')}</div>`; }
function railHtml(){ return `<nav class="rail">
  <div class="rlogo">R</div>
  <button class="railbtn">✎<span class="lab">Editor</span></button>
  <button class="railbtn">≣<span class="lab">Cola</span><span class="tally"><span class="ok">✓3</span></span></button>
  <button class="railbtn on">✓<span class="lab">Resultados</span></button>
  <div class="rsp"></div>
  <button class="railbtn">⚙<span class="lab">Procesamiento</span></button>
  <button class="railbtn">?<span class="lab">Atajos (⌘K)</span></button>
</nav>`; }
function emptyHtml(){ return `<div class="empty">
  <div class="eill">🎬</div>
  <h2>Todavía no renderizaste ningún reel</h2>
  <p>Cuando termines de editar y le des a Render, tus reels listos para publicar van a vivir acá: descargables, reproducibles y con la metadata por plataforma ya generada.</p>
  <button class="btn btn-green" style="padding:9px 18px;font-size:var(--t-md)">Ir al editor →</button>
</div>`; }

// ── A: uniform gallery grid (the naive answer) ──
function viewA(empty){ return `${railHtml()}<div class="colwrap">
  <header class="hdr"><span class="ctxname">Resultados${empty?'':'<span class="ct">6 reels</span>'}</span><div class="spacer"></div>
    <span class="toggle-empty" onclick="render('a',${!empty})">${empty?'ver poblado':'ver vacío'}</span>
    ${empty?'':'<div class="search">⌕ Buscar reel…</div>'}</header>
  ${empty? emptyHtml() : `<div class="scroll"><div class="grid">${REELS.map(r=>`<div class="gcard">${thumb(r)}<div class="gn">${r.title}</div><div class="gm">${r.date} · ${r.dur} · ${r.size}</div><div class="ga"><button class="btn btn-acc" style="padding:4px 10px">⤓</button><button class="btn btn-out" style="padding:4px 10px">▶</button><button class="btn btn-out" style="padding:4px 10px">↻</button></div></div>`).join('')}</div></div>`}
  <div class="vhint">A — <b>galería uniforme</b>: una grilla de miniaturas 9:16 iguales, hover→reproducir/descargar/re-render. Familiar, pero <b>cards idénticas repetidas</b> = el cliché que la grilla de SaaS arrastra; nada jerarquiza el último reel.</div>
</div>`; }

// ── B: file-manager list ──
function viewB(empty){ return `${railHtml()}<div class="colwrap">
  <header class="hdr"><span class="ctxname">Resultados${empty?'':'<span class="ct">6 reels · 50.8 MB en output/</span>'}</span><div class="spacer"></div>
    <span class="toggle-empty" onclick="render('b',${!empty})">${empty?'ver poblado':'ver vacío'}</span>
    ${empty?'':'<div class="search">⌕ Buscar…</div><button class="btn btn-out">📁 Abrir output/</button>'}</header>
  ${empty? emptyHtml() : `<div class="scroll"><div class="lhead"><span></span><span>Archivo</span><span>Fecha</span><span>Duración</span><span>Tamaño</span><span>Plataformas</span></div>
    ${REELS.map(r=>`<div class="lrow">${thumb(r)}<div><div class="ln">${r.name}</div><div class="lsub">${r.title}</div></div><div class="lm">${r.date}</div><div class="lm">${r.dur}</div><div class="lm">${r.size}</div><div style="display:flex;align-items:center;gap:var(--s-6)">${badges(r.plats)}<div class="la"><span class="iconmini" title="Reproducir">▶</span><span class="iconmini" title="Descargar">⤓</span><span class="iconmini" title="Re-render (1 a la vez)">↻</span><span class="iconmini" title="Ubicar archivo">📁</span></div></div></div>`).join('')}</div>`}
  <div class="vhint">B — <b>lista tipo archivo</b>: una fila por reel (nombre real · fecha · duración · tamaño · plataformas listas), densa y escaneable, honesta con que esto es la carpeta <b>output/</b>. Ritmo variado, gestión clara; menos "vitrina".</div>
</div>`; }

// ── C: featured latest + history (bridges the 024-B takeover and the library) ──
function viewC(empty){ const f=REELS[0]; const rest=REELS.slice(1);
  return `${railHtml()}<div class="colwrap">
  <header class="hdr"><span class="ctxname">Resultados</span><div class="spacer"></div>
    <span class="toggle-empty" onclick="render('c',${!empty})">${empty?'ver poblado':'ver vacío'}</span>
    ${empty?'':'<div class="search">⌕ Buscar…</div>'}</header>
  ${empty? emptyHtml() : `<div class="scroll">
    <div class="feat">${thumb(f)}
      <div class="meta"><span class="freshtag">● Recién renderizado</span>
        <h2>${f.title}</h2>
        <div class="filecard">📄 ${f.name} · 1080×1920 · ${f.dur} · ${f.size}</div>
        <div class="factions"><button class="btn btn-acc" style="padding:8px 15px">⤓ Descargar</button><button class="btn btn-out" style="padding:8px 15px">▶ Reproducir</button><button class="btn btn-out" style="padding:8px 15px">↻ Re-render</button></div>
        <div class="metarow"><span class="lbl">Metadata:</span>${badges(f.plats)}<span style="color:var(--text-muted);font-size:var(--t-xs)">3/3 listas para publicar</span></div>
      </div>
    </div>
    <div class="histlabel">Historial</div>
    ${rest.map(r=>`<div class="histrow">${thumb(r)}<span class="hn">${r.name}</span><span class="hm">${r.date}</span><span class="hm">${r.dur} · ${r.size}</span><div class="ha"><span class="iconmini">⤓</span><span class="iconmini">▶</span><span class="iconmini">↻</span></div></div>`).join('')}
  </div>`}
  <div class="vhint">C — <b>último destacado + historial</b>: el reel más reciente grande y reproducible (la toma 024-B como aterrizaje por defecto) sobre una lista densa de los anteriores. Varía el ritmo, conecta el "momento post-render" con la biblioteca duradera.</div>
</div>`; }

const VIEWS = { a:viewA, b:viewB, c:viewC };
const emptyState = { a:false, b:false, c:false };
function render(v, empty){ emptyState[v]=empty; document.getElementById('v-'+v).innerHTML = VIEWS[v](empty); }
['a','b','c'].forEach(v=>render(v,false));

function show(id, btn){
  document.querySelectorAll('.variant').forEach(v=>v.classList.remove('active'));
  document.getElementById('v-'+id).classList.add('active');
  document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
}
</script>
</body>
</html>
