<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sketch 009 — motion coherence</title>
<link rel="stylesheet" href="../themes/default.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--font); background: var(--canvas); color: var(--text);
         font-size: var(--t-base); padding-top: 46px; -webkit-font-smoothing: antialiased; }
  .variant { display: none; height: calc(100vh - 46px); }
  .variant.active { display: flex; flex-direction: column; }

  /* ── timing calibrations (the variant axis) — each overrides the motion tokens ── */
  .cal { --dur: 170ms; --dur2: 300ms; --ease: cubic-bezier(0.22, 1, 0.36, 1); --enter-y: 4px; --enter-s: 1; }
  .snp { --dur: 100ms; --dur2: 190ms; --ease: cubic-bezier(0.32, 1, 0.40, 1); --enter-y: 2px; --enter-s: 1; }
  .exp { --dur: 240ms; --dur2: 440ms; --ease: cubic-bezier(0.16, 1, 0.30, 1); --enter-y: 10px; --enter-s: 0.985; }

  .hdr { height: 52px; flex: none; display: flex; align-items: center; justify-content: space-between;
         padding: 0 var(--s-12); background: var(--chrome); border-bottom: 1px solid var(--border); }
  .brand { display: flex; align-items: center; gap: var(--s-5); }
  .brand .glyph { width: 26px; height: 26px; border-radius: var(--r-sm);
         background: linear-gradient(145deg, var(--accent), var(--accent-strong));
         display: grid; place-items: center; font-weight: 700; font-size: var(--t-md); color: var(--stage); }
  .brand h1 { font-size: var(--t-lg); font-weight: 600; letter-spacing: -0.01em; }
  .brand .tag { font-size: var(--t-2xs); color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 1px; }
  .hdr .timing { font-size: var(--t-xs); color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .hdr .timing b { color: var(--accent); font-weight: 600; }

  .savebtn { display: inline-flex; align-items: center; gap: 7px; font: inherit; font-size: var(--t-md); font-weight: 600;
        padding: 7px 15px; border-radius: var(--r-sm); border: 1px solid transparent; cursor: pointer; min-width: 132px; justify-content: center;
        transition: background var(--dur) var(--ease), color var(--dur) var(--ease); }
  .savebtn .sdot { width: 7px; height: 7px; border-radius: 50%; }
  .savebtn[data-s=dirty]  { background: var(--action); color: oklch(0.16 0.02 150); }
  .savebtn[data-s=dirty] .sdot { background: oklch(0.16 0.02 150); }
  .savebtn[data-s=saving] { background: var(--surface-2); color: var(--text-2); border-color: var(--border-strong); }
  .savebtn[data-s=saved]  { background: var(--surface-2); color: var(--success); border-color: var(--border); }
  .spin { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--text-faint); border-top-color: var(--text); animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .work { flex: 1; display: flex; min-height: 0; }
  .stage { flex: 0 1 440px; background: var(--stage); display: flex; flex-direction: column;
           align-items: center; justify-content: center; padding: var(--s-12); border-right: 1px solid var(--border); min-width: 0; }
  .phone { position: relative; aspect-ratio: 9 / 16; height: min(100%, 600px); border-radius: 18px; overflow: hidden;
           background: radial-gradient(120% 70% at 50% 18%, oklch(0.42 0.07 250), transparent 60%),
                       radial-gradient(90% 60% at 50% 95%, oklch(0.30 0.06 320), transparent 70%),
                       linear-gradient(180deg, oklch(0.30 0.04 255), oklch(0.18 0.03 270));
           box-shadow: var(--shadow-pop), inset 0 0 0 1px oklch(0.6 0.02 280 / 0.18); }
  .pv-title { position: absolute; z-index: 50; padding: 7px 16px; border-radius: var(--r-sm);
           background: oklch(0.20 0.03 280 / 0.82); backdrop-filter: blur(3px); font-weight: 700; font-size: 16px; white-space: nowrap;
           transition: left var(--dur2) var(--ease), top var(--dur2) var(--ease), box-shadow var(--dur) var(--ease); }
  .pv-title.snapped { box-shadow: 0 0 0 2px var(--accent), 0 0 22px oklch(0.82 0.095 242 / 0.45); }
  .pv-cap { position: absolute; bottom: 13%; left: 8%; right: 8%; text-align: center; z-index: 40; font-weight: 800; font-size: 24px; line-height: 1.15; text-shadow: 0 2px 12px oklch(0.12 0 0 / 0.85); }
  .pv-cap .on { color: var(--accent); }
  /* snap guides */
  .guide { position: absolute; background: var(--accent); opacity: 0; z-index: 30; }
  .guide.v { width: 1px; top: 0; bottom: 0; } .guide.h { height: 1px; left: 0; right: 0; }
  .guide.show { animation: guideflash var(--dur2) var(--ease); }
  @keyframes guideflash { 0% { opacity: 0; } 30% { opacity: 0.8; } 100% { opacity: 0; } }
  .stage-hint { margin-top: var(--s-8); font-size: var(--t-xs); color: var(--text-muted); }

  .controls { display: flex; flex-direction: column; min-width: 0; background: var(--canvas); flex: 1 1 auto; }
  .tabs { display: flex; gap: 2px; padding: 0 var(--s-10); background: var(--chrome); border-bottom: 1px solid var(--border); flex: none; }
  .tab { appearance: none; border: none; background: none; font: inherit; font-size: var(--t-md); font-weight: 500;
         color: var(--text-muted); padding: 13px 14px 11px; cursor: pointer; border-bottom: 2px solid transparent; position: relative;
         transition: color var(--dur) var(--ease); }
  .tab.sel { color: var(--accent); font-weight: 600; }
  /* animated underline that slides between tabs */
  .tab-underline { position: absolute; bottom: -1px; height: 2px; background: var(--accent); border-radius: 2px;
        transition: left var(--dur) var(--ease), width var(--dur) var(--ease); }
  .tabs-wrap { position: relative; }
  .ctrl-body { flex: 1; overflow-y: auto; padding: var(--s-10); }
  .ctrl-body.enter { animation: bodyenter var(--dur2) var(--ease); }
  @keyframes bodyenter { from { opacity: 0; transform: translateY(var(--enter-y)) scale(var(--enter-s)); } to { opacity: 1; transform: none; } }

  .sec { margin-bottom: var(--s-10); }
  .sec-h { display: flex; align-items: center; gap: var(--s-5); font-size: var(--t-2xs); font-weight: 700;
           letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: var(--s-6); }
  .sec-h::after { content: ""; flex: 1; height: 1px; background: var(--border-faint); }
  .sec-h .num { width: 16px; height: 16px; border-radius: var(--r-xs); background: var(--surface-2); display: grid; place-items: center; font-size: var(--t-2xs); color: var(--text-2); }
  .row { display: grid; grid-template-columns: 72px 1fr; align-items: center; gap: var(--s-6); margin-bottom: var(--s-5); }
  .row > label { font-size: var(--t-sm); color: var(--text-2); }
  .inp { font: inherit; font-size: var(--t-md); color: var(--text); background: var(--surface-2); border: 1px solid var(--border);
               border-radius: var(--r-sm); padding: 6px 9px; width: 100%; transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease); }
  .inp:focus { outline: none; border-color: var(--accent-strong); box-shadow: 0 0 0 3px var(--accent-tint); }
  .inp.flash { animation: flash var(--dur2) var(--ease); }
  @keyframes flash { 0% { background: var(--accent-tint); border-color: var(--accent-strong); } 100% { background: var(--surface-2); border-color: var(--border); } }
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-5); }
  .field { display: flex; flex-direction: column; gap: var(--s-3); }
  .field .mini { font-size: var(--t-2xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .seg { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 2px; gap: 2px; }
  .seg button { flex: 1; font: inherit; font-size: var(--t-sm); color: var(--text-2); background: none; border: none; padding: 5px; border-radius: var(--r-xs); cursor: pointer; transition: background var(--dur) var(--ease), color var(--dur) var(--ease); }
  .seg button.on { background: var(--accent-tint); color: var(--accent); font-weight: 600; }
  .pgrid { display: inline-grid; grid-template-columns: repeat(3, 30px); grid-auto-rows: 30px; gap: 3px; margin-top: var(--s-5); }
  .pgrid button { border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); border-radius: var(--r-xs); cursor: pointer; font-size: 13px; display: grid; place-items: center;
        transition: background var(--dur) var(--ease), color var(--dur) var(--ease), border-color var(--dur) var(--ease); }
  .pgrid button.on { background: var(--accent-tint); border-color: var(--accent-strong); color: var(--accent); }

  /* condensed textarea (005-C) */
  .ta { font: inherit; font-size: var(--t-md); line-height: 1.5; color: var(--text); background: var(--surface-2); border: 1px solid var(--border);
        border-radius: var(--r-sm); padding: var(--s-5) var(--s-6); width: 100%; resize: none; height: 40px; overflow: hidden;
        white-space: nowrap; text-overflow: ellipsis; cursor: text;
        transition: height var(--dur2) var(--ease), border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease); }
  .ta.expanded { height: 92px; white-space: normal; border-color: var(--accent-strong); box-shadow: 0 0 0 3px var(--accent-tint); }
  .ta-meta { margin-top: var(--s-3); font-size: var(--t-2xs); }
  .ta-meta .drives { display: inline-flex; align-items: center; gap: 5px; color: var(--accent); }
  .ta-meta .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

  /* motion control bar (sketch chrome) */
  .motionbar { flex: none; border-top: 1px solid var(--border-strong); background: oklch(0.255 0.055 268 / 0.55); padding: var(--s-6) var(--s-8); display: flex; align-items: center; gap: var(--s-5); flex-wrap: wrap; }
  .motionbar .lbl { font-size: var(--t-2xs); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-faint); }
  .mbtn { font: inherit; font-size: var(--t-xs); color: var(--text-2); background: var(--surface); border: 1px solid var(--border); padding: 5px 11px; border-radius: var(--r-full); cursor: pointer; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
  .mbtn:hover { border-color: var(--border-strong); color: var(--text); }
  .mbtn.seq { background: var(--accent-tint); border-color: var(--accent-strong); color: var(--accent); font-weight: 600; margin-left: auto; }

  #vnav { position: fixed; top: 0; left: 0; right: 0; height: 46px; z-index: 9998; background: var(--chrome);
          border-bottom: 1px solid var(--border-strong); display: flex; align-items: center; gap: var(--s-4); padding: 0 var(--s-10); font-size: var(--t-sm); }
  #vnav .lbl { color: var(--text-muted); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; font-size: var(--t-2xs); margin-right: var(--s-4); }
  .vtab { font: inherit; font-size: var(--t-sm); color: var(--text-2); background: var(--surface); border: 1px solid var(--border); padding: 5px 12px; border-radius: var(--r-full); cursor: pointer; }
  .vtab.active { background: var(--accent-tint); border-color: var(--accent-strong); color: var(--accent); font-weight: 600; }
  #tools { position: fixed; bottom: 12px; right: 12px; z-index: 9999; font-family: system-ui; font-size: 11px; background: rgba(0,0,0,0.72); color: #fff; padding: 7px 10px; border-radius: 8px; opacity: 0.4; display: flex; gap: 8px; align-items: center; }
  #tools:hover { opacity: 1; }
  #tools select { font: inherit; background: #222; color: #fff; border: 1px solid #555; border-radius: 4px; padding: 2px 4px; }
</style>
</head>
<body>

<nav id="vnav">
  <span class="lbl">Sketch 009 · motion coherence</span>
  <button class="vtab active" onclick="show('a',this)">A ★ · Calm (170ms)</button>
  <button class="vtab" onclick="show('b',this)">B · Snappy (100ms)</button>
  <button class="vtab" onclick="show('c',this)">C · Expressive (240ms)</button>
  <span style="margin-left:auto;color:var(--text-faint);font-size:var(--t-2xs)">trigger each motion, then ▶ Secuencia — do they feel like one tool?</span>
</nav>

<div class="variant active" id="v-a"></div>
<div class="variant" id="v-b"></div>
<div class="variant" id="v-c"></div>

<div id="tools"><span>theme</span>
  <select onchange="document.querySelector('link[href*=themes]').href='../themes/'+this.value+'.css'"><option value="default">default</option></select>
</div>

<script>
  const CALIB = {
    a:{ cls:'cal', name:'Calm',       dur:'170ms', ease:'ease-out-quart' },
    b:{ cls:'snp', name:'Snappy',     dur:'100ms', ease:'ease-out (tight)' },
    c:{ cls:'exp', name:'Expressive', dur:'240ms', ease:'ease-out-expo + enter' },
  };
  // 9 anchors as % positions for the draggable title (top-left anchored, centered horizontally where applicable)
  const ANCHORS = [
    {l:'8%', t:'7%'},  {l:'50%', t:'7%',  c:1}, {l:'92%', t:'7%', r:1},
    {l:'8%', t:'50%'}, {l:'50%', t:'50%', c:1}, {l:'92%', t:'50%', r:1},
    {l:'8%', t:'88%'}, {l:'50%', t:'88%', c:1}, {l:'92%', t:'88%', r:1},
  ];
  const st = { a:{tab:'estilo', anchor:1, save:'dirty'}, b:{tab:'estilo', anchor:1, save:'dirty'}, c:{tab:'estilo', anchor:1, save:'dirty'} };

  function body(tab){
    if (tab === 'posicion') {
      return `<div class="sec"><div class="sec-h"><span class="num">1</span>Posición</div>
        <div class="two"><div class="field"><span class="mini">X</span><input class="inp xy" value="300"></div><div class="field"><span class="mini">Y</span><input class="inp xy" value="170"></div></div>
        <div class="pgrid"><button>↖</button><button class="on">↑</button><button>↗</button><button>←</button><button>•</button><button>→</button><button>↙</button><button>↓</button><button>↘</button></div></div>
        <div class="sec" style="margin-bottom:0"><div class="sec-h"><span class="num">3</span>Avanzado</div>
        <div class="row"><label>Aparece</label><input class="inp" value="0.0 s"></div><div class="row"><label>Duración</label><input class="inp" value="3.0 s"></div></div>`;
    }
    return `<div class="sec"><div class="sec-h"><span class="num">✎</span>Texto de muestra</div>
        <textarea class="ta">Cómo edité este reel para que los subtítulos enganchen palabra por palabra.</textarea>
        <div class="ta-meta"><span class="drives"><span class="dot"></span>Alimenta los subtítulos · no se exporta</span></div></div>
      <div class="sec" style="margin-bottom:0"><div class="sec-h"><span class="num">2</span>Estilo</div>
        <div class="row"><label>Tamaño</label><input type="range" min="12" max="80" value="40" style="width:100%"></div>
        <div class="row"><label>Peso</label><div class="seg"><button>Regular</button><button class="on">Bold</button><button>Black</button></div></div></div>`;
  }

  function render(vk){
    const v = st[vk]; const c = CALIB[vk];
    const titleAnchor = ANCHORS[v.anchor];
    const tl = titleAnchor.c ? 'transform:translateX(-50%);' : titleAnchor.r ? 'transform:translateX(-100%);' : '';
    document.getElementById('v-'+vk).className = 'variant '+c.cls+(vk==='a'?' active':'');
    document.getElementById('v-'+vk).innerHTML = `
      <header class="hdr">
        <div class="brand"><div class="glyph">R</div><div><h1>Reel Factory Studio</h1><div class="tag">Motion · ${c.name}</div></div></div>
        <div style="display:flex;align-items:center;gap:var(--s-10)">
          <span class="timing"><b>${c.dur}</b> · ${c.ease}</span>
          <button class="savebtn" data-s="${v.save}" data-save>${saveInner(v.save)}</button>
        </div>
      </header>
      <div class="work">
        <section class="stage">
          <div class="phone">
            <div class="guide v" data-gv></div><div class="guide h" data-gh></div>
            <div class="pv-title" data-title style="left:${titleAnchor.l};top:${titleAnchor.t};${tl}">Cómo edité este reel</div>
            <div class="pv-cap"><span class="on">subtítulos</span> que enganchan</div>
          </div>
          <div class="stage-hint">el título salta entre los 9 anclajes — observá la curva</div>
        </section>
        <section class="controls">
          <div class="tabs tabs-wrap" data-tabs>
            <button class="tab ${v.tab==='estilo'?'sel':''}" data-tab="estilo">Subtitles</button>
            <button class="tab ${v.tab==='posicion'?'sel':''}" data-tab="posicion">Titles</button>
            <span class="tab-underline" data-underline></span>
          </div>
          <div class="ctrl-body" data-body>${body(v.tab)}</div>
          <div class="motionbar">
            <span class="lbl">Motion</span>
            <button class="mbtn" data-m="tab">Cambiar tab</button>
            <button class="mbtn" data-m="ta">Expandir textarea</button>
            <button class="mbtn" data-m="flash">Flash preset</button>
            <button class="mbtn" data-m="snap">Snap elemento</button>
            <button class="mbtn" data-m="save">Guardar</button>
            <button class="mbtn seq" data-m="seq">▶ Secuencia</button>
          </div>
        </section>
      </div>`;
    positionUnderline(vk);
    wire(vk);
  }
  function saveInner(s){ return s==='saving'?'<span class="spin"></span>Guardando…' : s==='saved'?'✓ Guardado' : '<span class="sdot"></span>Guardar config'; }

  function positionUnderline(vk){
    const root = document.getElementById('v-'+vk);
    const sel = root.querySelector('.tab.sel'); const ul = root.querySelector('[data-underline]');
    if (sel && ul){ ul.style.left = sel.offsetLeft+'px'; ul.style.width = sel.offsetWidth+'px'; }
  }

  // ── motion triggers ──
  function doTab(vk){ const v=st[vk]; v.tab = v.tab==='estilo'?'posicion':'estilo';
    const root=document.getElementById('v-'+vk);
    root.querySelectorAll('.tab').forEach(t=>t.classList.toggle('sel', t.dataset.tab===v.tab));
    positionUnderline(vk);
    const b=root.querySelector('[data-body]'); b.innerHTML=body(v.tab); b.classList.remove('enter'); void b.offsetWidth; b.classList.add('enter');
    wireBody(vk);
  }
  function doTextarea(vk){ const ta=document.querySelector('#v-'+vk+' .ta'); if(!ta) { doTab(vk); return doTextarea(vk); } ta.classList.add('expanded'); setTimeout(()=>ta.classList.remove('expanded'), 1400); }
  function doFlash(vk){ const root=document.getElementById('v-'+vk); let xs=root.querySelectorAll('.xy'); if(!xs.length){ doTab(vk); xs=root.querySelectorAll('.xy'); } xs.forEach(x=>{ x.classList.remove('flash'); void x.offsetWidth; x.classList.add('flash'); }); }
  function doSnap(vk){ const v=st[vk]; v.anchor=(v.anchor+ (Math.floor(v.anchor)%3===0?1:1))%9; if(v.anchor===v.__last) v.anchor=(v.anchor+3)%9; v.__last=v.anchor;
    const root=document.getElementById('v-'+vk); const t=root.querySelector('[data-title]'); const a=ANCHORS[v.anchor];
    t.style.left=a.l; t.style.top=a.t; t.style.transform = a.c?'translateX(-50%)':a.r?'translateX(-100%)':'none';
    setTimeout(()=>{ t.classList.add('snapped'); const gv=root.querySelector('[data-gv]'), gh=root.querySelector('[data-gh]');
      gv.style.left=a.l; gh.style.top=a.t; gv.classList.remove('show'); gh.classList.remove('show'); void gv.offsetWidth; gv.classList.add('show'); gh.classList.add('show');
      setTimeout(()=>t.classList.remove('snapped'), 420); }, 30);
  }
  function doSave(vk){ const v=st[vk]; v.save='saving'; updateSave(vk);
    setTimeout(()=>{ v.save='saved'; updateSave(vk); setTimeout(()=>{ v.save='dirty'; updateSave(vk); }, 1100); }, 780); }
  function updateSave(vk){ const b=document.querySelector('#v-'+vk+' [data-save]'); b.dataset.s=st[vk].save; b.innerHTML=saveInner(st[vk].save); }

  async function doSeq(vk){
    const wait = ms => new Promise(r=>setTimeout(r,ms));
    doTab(vk);              await wait(700);
    doTextarea(vk);        await wait(1500);
    if (st[vk].tab!=='posicion') doTab(vk); await wait(650);
    doFlash(vk);           await wait(700);
    doSnap(vk);            await wait(900);
    doSnap(vk);            await wait(900);
    doSave(vk);
  }

  function wireBody(vk){
    const root=document.getElementById('v-'+vk);
    root.querySelectorAll('.ta').forEach(ta=>{ ta.onfocus=()=>ta.classList.add('expanded'); ta.onblur=()=>ta.classList.remove('expanded'); });
    root.querySelectorAll('.seg').forEach(s=> s.querySelectorAll('button').forEach(btn=> btn.onclick=()=>{ s.querySelectorAll('button').forEach(x=>x.classList.remove('on')); btn.classList.add('on'); }));
    root.querySelectorAll('.pgrid button').forEach(btn=> btn.onclick=()=>{ const g=btn.closest('.pgrid'); g.querySelectorAll('button').forEach(x=>x.classList.remove('on')); btn.classList.add('on'); doFlash(vk); });
  }
  function wire(vk){
    const root=document.getElementById('v-'+vk);
    root.querySelectorAll('.tab').forEach(t=> t.onclick=()=>{ if(t.dataset.tab!==st[vk].tab) doTab(vk); });
    const M={ tab:doTab, ta:doTextarea, flash:doFlash, snap:doSnap, save:doSave, seq:doSeq };
    root.querySelectorAll('[data-m]').forEach(b=> b.onclick=()=>M[b.dataset.m](vk));
    root.querySelectorAll('[data-save]').forEach(b=> b.onclick=()=>doSave(vk));
    wireBody(vk);
  }

  ['a','b','c'].forEach(render);
  function show(id, btn) {
    document.querySelectorAll('.variant').forEach(v => v.classList.remove('active'));
    const el=document.getElementById('v-'+id); el.classList.add('active');
    document.querySelectorAll('.vtab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    positionUnderline(id);
  }
</script>
</body>
</html>
