x-pipeline-common: &pipeline-common
  volumes:
    - ./pipeline:/data/pipeline
  networks:
    - pipeline-net
  user: "${UID:-1000}:${GID:-1000}"
  environment:
    - HOME=/data/pipeline/.cache

services:
  base-python:
    build:
      context: ./services/base-python
    image: video-pipeline-base-python:latest

  base-node:
    build:
      context: ./services/base-node
    image: video-pipeline-base-node:latest

  smoke-test:
    <<: *pipeline-common
    build:
      context: ./services/smoke-test
    depends_on:
      base-python:
        condition: service_completed_successfully
    environment:
      - INPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/input/video.mp4
      - OUTPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/smoke-test/output/video.mp4
      - PIPELINE_JOB_ID=${PIPELINE_JOB_ID}

  # ═════════════════════════════════════════════════════
  # Pipeline Step Services
  # Each step uses the x-pipeline-common extension for shared volume/network config.
  # Steps are chained with depends_on + healthcheck (D-08, D-09).
  # To add a new step: insert a service in the chain with depends_on the previous step.
  # Existing step configurations do NOT need modification (PIPE-04).
  # ═════════════════════════════════════════════════════

  # Step 1: Whisper Transcription (Phase 2; externalized via HTTP in Phase 15-02)
  # Service KEY stays "whisper" and OUTPUT_PATH dir stays whisper/ so downstream
  # (silence-cutter, remotion-renderer, srt-exporter) need zero changes — the
  # file-based step contract is preserved. The heavy embedded GPU Whisper step is
  # replaced by a thin HTTP-client step that calls the external whisper-api on the
  # host (D-3/D-4). The external service owns the GPU, so no deploy.devices stanza.
  whisper:
    <<: *pipeline-common
    # Pinned so the build output matches the name the api-server orchestrator
    # uses (reel-factory-*), independent of the compose project / directory name
    # (a git worktree checkout has a different dir name).
    image: reel-factory-whisper-http-step:latest
    build:
      context: ./services/whisper-http-step
    depends_on:
      base-python:
        condition: service_completed_successfully
    environment:
      - INPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/input/video.mp4
      - OUTPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/whisper/transcript.json
      - PIPELINE_JOB_ID=${PIPELINE_JOB_ID}
      - WHISPER_API_URL=${WHISPER_API_URL:-http://host.docker.internal:8000}
      - WHISPER_API_KEY=${WHISPER_API_KEY:-}
    extra_hosts:
      # D-3: reach the external whisper-api stack published on the host. Required on
      # Linux/WSL2 bridge networks; harmless on Docker Desktop where it resolves natively.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "test", "-f", "/data/pipeline/${PIPELINE_JOB_ID}/whisper/manifest.json"]
      interval: 5s
      timeout: 10s
      retries: 3
      # No model load anymore (HTTP call), so the start_period drops 30s -> 15s.
      start_period: 15s

  # Silence Cutter: runs BEFORE whisper in the new pipeline order.
  # TRANSCRIPT_PATH is optional — if not set, uses FFmpeg-only mode.
  silence-cutter:
    <<: *pipeline-common
    image: reel-factory-silence-cutter:latest
    build:
      context: ./services/silence-cutter
    depends_on:
      base-python:
        condition: service_completed_successfully
    environment:
      - INPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/input/video.mp4
      - OUTPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/silence-cutter/output.mp4
      - PIPELINE_JOB_ID=${PIPELINE_JOB_ID}
      - TRANSCRIPT_PATH=${TRANSCRIPT_PATH:-}
      - SILENCE_MIN_DURATION=${SILENCE_MIN_DURATION:-0.5}
      - SILENCE_CUT_SHRINK=${SILENCE_CUT_SHRINK:-0.4}
    healthcheck:
      test: ["CMD", "test", "-f", "/data/pipeline/${PIPELINE_JOB_ID}/silence-cutter/manifest.json"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Remotion Renderer: adds TikTok-style animated subtitles to video
  remotion-renderer:
    <<: *pipeline-common
    image: reel-factory-remotion-renderer:latest
    build:
      context: ./services/remotion-renderer
    depends_on:
      base-node:
        condition: service_completed_successfully
      ffmpeg-finalizer:
        condition: service_completed_successfully
    environment:
      - INPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/ffmpeg-finalizer/output.mp4
      - OUTPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/remotion-renderer/output.mp4
      - PIPELINE_JOB_ID=${PIPELINE_JOB_ID}
      - TRANSCRIPT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/whisper/transcript.json
      - SILENCE_CUTS_PATH=/data/pipeline/${PIPELINE_JOB_ID}/silence-cutter/silence-cuts.json
      - FINALIZER_INFO_PATH=/data/pipeline/${PIPELINE_JOB_ID}/ffmpeg-finalizer/finalizer-info.json
      - ACTIVE_COLOR=${ACTIVE_COLOR:-#FFFF00}
      - INACTIVE_COLOR=${INACTIVE_COLOR:-#FFFFFF}
      - FONT_SIZE=${FONT_SIZE:-58}
      # Phase 14 + Spike 001: scale:1 default (supersampling gave no perceptible gain for
      # 1080-bounded captions). PNG kept for lossless frame capture. Override REMOTION_SCALE to
      # re-enable supersampling for thin/animated graphics if ever needed.
      - REMOTION_SCALE=${REMOTION_SCALE:-1}
      - REMOTION_IMAGE_FORMAT=${REMOTION_IMAGE_FORMAT:-png}
      - PIPELINE_CONFIG_PATH=${PIPELINE_CONFIG_PATH:-}
    healthcheck:
      test: ["CMD", "test", "-f", "/data/pipeline/${PIPELINE_JOB_ID}/remotion-renderer/manifest.json"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Quality Finalizer: probe-gated Lanczos downscale 2160x3840 → 1080x1920 (Phase 14, RENDER-03)
  # Carries through BT.709 color tags (D-11), preserves A/V parity via -c:a copy (D-10),
  # idempotent on inputs already at target resolution (D-08 stream-copy passthrough).
  quality-finalizer:
    profiles: ["pipeline"]
    image: reel-factory-quality-finalizer:latest
    build:
      context: ./services/quality-finalizer
    volumes:
      - ./pipeline:/data/pipeline
    networks:
      - pipeline-net
    environment:
      - INPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/remotion-renderer/output.mp4
      - OUTPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/quality-finalizer/output.mp4
      - PIPELINE_JOB_ID=${PIPELINE_JOB_ID}
    depends_on:
      remotion-renderer:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "test", "-f", "/data/pipeline/${PIPELINE_JOB_ID}/quality-finalizer/manifest.json"]
      interval: 10s
      timeout: 5s
      retries: 30

  # Remotion Studio: interactive preview + config editor (Phase 6, Plan 04)
  # Serves Remotion Studio for live preview and REST API for config editing (D-14, D-15, D-18).
  # Shares Remotion source code with renderer via COPY at build time (D-14).
  # Both remotion-renderer and remotion-studio read pipeline-config.json from shared volume (D-19).
  remotion-studio:
    <<: *pipeline-common
    build:
      context: ./services/remotion-studio
      additional_contexts:
        - renderer-src=./services/remotion-renderer/src
    depends_on:
      base-node:
        condition: service_completed_successfully
    ports:
      - "${STUDIO_PORT:-3123}:3123"
    environment:
      - INPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/remotion-renderer/output.mp4
      - PIPELINE_JOB_ID=${PIPELINE_JOB_ID}
      - PIPELINE_CONFIG_PATH=/data/pipeline/${PIPELINE_JOB_ID}/remotion-renderer/pipeline-config.json
      - PORT=3123
      - ACTIVE_PIPELINE_CONFIG_PATH=/data/pipeline/pipeline-config.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3123/api/config"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ═════════════════════════════════════════════════════
  # Infrastructure
  # ═════════════════════════════════════════════════════

  # Redis: job queue backing store + progress tracking (Phase 10)
  # Per D-04: Required by BullMQ and per-job progress hashes
  # Per D-05: AOF persistence for job durability, LRU eviction for stale data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - pipeline-net
    restart: unless-stopped

  # API Server: exposes processing pipeline via REST API (Phase 9, Plan 03)
  # Per D-01: Express.js container on Node.js 22 with Docker socket for sibling orchestration
  # Per D-06: Serves artifact URLs from shared pipeline volume
  # Per D-02: BullMQ queue for async batch processing (Phase 10)
  api-server:
    <<: *pipeline-common
    build:
      context: ./services/api-server
    depends_on:
      base-node:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    group_add:
      - "1001"
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./pipeline:/data/pipeline
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PIPELINE_JOB_ID=${PIPELINE_JOB_ID:-}
      - PROCESS_TIMEOUT_MS=${PROCESS_TIMEOUT_MS:-10800000}  # 3h — Phase 14 D-03, matches render.ts timeoutInMilliseconds ceiling
      - PIPELINE_NETWORK=${PIPELINE_NETWORK:-reel-factory_pipeline-net}
      # Host-side absolute path to ./pipeline — the orchestrator bind-mounts it
      # into sibling containers via the Docker socket, so it must be the HOST
      # path, not a container path. Defaults to $PWD/pipeline (compose is run
      # from the repo root); set HOST_PIPELINE_DIR in .env to override.
      - HOST_PIPELINE_DIR=${HOST_PIPELINE_DIR:-${PWD}/pipeline}
      - REDIS_URL=redis://redis:6379
      - MAX_CONCURRENT_JOBS=${MAX_CONCURRENT_JOBS:-2}
      - MAX_BATCH_SIZE=${MAX_BATCH_SIZE:-10}
      - PORT=3000
      - NODE_ENV=production
      # Phase 15-02: the orchestrator reads these from process.env at module load and
      # threads them into the spawned whisper HTTP-step container (orchestrator.ts STEPS[0]).
      # Without them on the api-server, process.env.WHISPER_API_KEY is undefined when STEPS builds.
      - WHISPER_API_URL=${WHISPER_API_URL:-http://host.docker.internal:8000}
      - WHISPER_API_KEY=${WHISPER_API_KEY:-}
    restart: unless-stopped

  # SRT/VTT Exporter: generates sidecar subtitle files with remapped timestamps
  # Per D-01, D-02: Node.js service following pipeline step contract
  # Per D-12: Runs in parallel with remotion-renderer (both consume transcript + silence-cuts)
  srt-exporter:
    <<: *pipeline-common
    image: reel-factory-srt-exporter:latest
    build:
      context: ./services/srt-exporter
    depends_on:
      base-node:
        condition: service_completed_successfully
      whisper:
        condition: service_completed_successfully
      silence-cutter:
        condition: service_completed_successfully
    environment:
      - INPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/input/video.mp4
      - OUTPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/srt-exporter/output.vtt
      - PIPELINE_JOB_ID=${PIPELINE_JOB_ID}
      - TRANSCRIPT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/whisper/transcript.json
      - SILENCE_CUTS_PATH=/data/pipeline/${PIPELINE_JOB_ID}/silence-cutter/silence-cuts.json
    healthcheck:
      test: ["CMD", "test", "-f", "/data/pipeline/${PIPELINE_JOB_ID}/srt-exporter/manifest.json"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 15s

  # FFmpeg Finalizer: converts to 9:16 vertical (1080x1920) with center-crop
  ffmpeg-finalizer:
    <<: *pipeline-common
    image: reel-factory-ffmpeg-finalizer:latest
    build:
      context: ./services/ffmpeg-finalizer
    depends_on:
      base-python:
        condition: service_completed_successfully
    environment:
      - INPUT_PATH=${FINALIZER_INPUT_PATH:-/data/pipeline/${PIPELINE_JOB_ID}/silence-cutter/output.mp4}
      - OUTPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/ffmpeg-finalizer/output.mp4
      - PIPELINE_JOB_ID=${PIPELINE_JOB_ID}
      - VERTICAL_WIDTH=${VERTICAL_WIDTH:-1080}
      - VERTICAL_HEIGHT=${VERTICAL_HEIGHT:-1920}
      - CROP_STRATEGY=${CROP_STRATEGY:-center}
    healthcheck:
      test: ["CMD", "test", "-f", "/data/pipeline/${PIPELINE_JOB_ID}/ffmpeg-finalizer/manifest.json"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  redis-data:

networks:
  pipeline-net:
    driver: bridge