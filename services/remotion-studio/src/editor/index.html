<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remotion Studio</title>
  <style>
    /* ── default.css OKLCH token set (verbatim from .claude/skills/sketch-findings-reel-factory/sources/themes/default.css) ── */
    :root {
      /* Surfaces (cool indigo, layered dark) */
      --canvas:        oklch(0.205 0.038 278);
      --chrome:        oklch(0.255 0.055 268);
      --surface:       oklch(0.245 0.030 282);
      --surface-2:     oklch(0.285 0.028 282);
      --surface-hover: oklch(0.315 0.030 282);
      --stage:         oklch(0.165 0.022 280);

      /* Borders / dividers */
      --border:        oklch(0.345 0.022 282);
      --border-strong: oklch(0.43 0.030 282);
      --border-faint:  oklch(0.30 0.018 282);

      /* Text */
      --text:          oklch(0.93 0.012 280);
      --text-2:        oklch(0.74 0.018 280);
      --text-muted:    oklch(0.58 0.018 280);
      --text-faint:    oklch(0.46 0.016 280);

      /* Accent (selection / focus / current) */
      --accent:        oklch(0.82 0.095 242);
      --accent-strong: oklch(0.72 0.130 244);
      --accent-tint:   oklch(0.82 0.095 242 / 0.12);
      --accent-tint-2: oklch(0.82 0.095 242 / 0.06);

      /* Semantic */
      --action:        oklch(0.68 0.150 150);
      --action-hover:  oklch(0.62 0.150 150);
      --danger:        oklch(0.63 0.185 25);
      --warning:       oklch(0.80 0.120 78);
      --success:       oklch(0.72 0.140 150);

      /* Typography */
      --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
      --t-2xs: 10.5px;
      --t-xs:  11.5px;
      --t-sm:  12.5px;
      --t-md:  13.5px;
      --t-base: 14px;
      --t-lg:  16px;
      --t-xl:  19px;
      --t-2xl: 23px;

      /* Spacing (compact rhythm for dense control panel) */
      --s-1: 2px;  --s-2: 4px;  --s-3: 6px;   --s-4: 8px;
      --s-5: 10px; --s-6: 12px; --s-8: 16px;  --s-10: 20px;
      --s-12: 24px; --s-16: 32px;

      /* Shape */
      --r-xs: 4px; --r-sm: 6px; --r-md: 8px; --r-lg: 12px; --r-full: 999px;

      /* Elevation */
      --shadow-sm: 0 1px 2px oklch(0.12 0.02 280 / 0.5);
      --shadow-md: 0 6px 18px oklch(0.10 0.02 280 / 0.45);
      --shadow-pop: 0 12px 34px oklch(0.08 0.02 280 / 0.55);

      /* Motion */
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --dur: 170ms;
      --dur2: 300ms;
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif); background: var(--canvas, #1a1a2e); color: var(--text, #e0e0e0); }
    #root { min-height: 100vh; }

    /* Column 3 hides below 1024px viewport width (UI-SPEC Layout Contract) */
    @media (max-width: 1023px) {
      .col3-metadata { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    window.onerror = function(msg, url, line, col, err) {
      fetch('/api/diag', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({type: 'error', msg, url, line, col, stack: err ? err.stack : null}) }).catch(function(){});
    };
    window.addEventListener('unhandledrejection', function(e) {
      fetch('/api/diag', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({type: 'promise', msg: e.reason ? e.reason.message || String(e.reason) : 'unknown'}) }).catch(function(){});
    });
    window.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        var root = document.getElementById('root');
        fetch('/api/diag', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({type: 'loaded', rootChildren: root ? root.children.length : -1, rootHTML: root ? root.innerHTML.substring(0, 500) : 'no root', url: window.location.href}) }).catch(function(){});
      }, 3000);
    });
  </script>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
