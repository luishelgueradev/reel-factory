<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sketch 008 — states & empties</title>
<link rel="stylesheet" href="../themes/default.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--font); background: var(--canvas); color: var(--text);
         font-size: var(--t-base); padding-top: 46px; -webkit-font-smoothing: antialiased; }
  .variant { display: none; height: calc(100vh - 46px); }
  .variant.active { display: flex; flex-direction: column; }

  .hdr { height: 52px; flex: none; display: flex; align-items: center; justify-content: space-between;
         padding: 0 var(--s-12); background: var(--chrome); border-bottom: 1px solid var(--border); }
  .brand { display: flex; align-items: center; gap: var(--s-5); }
  .brand .glyph { width: 26px; height: 26px; border-radius: var(--r-sm);
         background: linear-gradient(145deg, var(--accent), var(--accent-strong));
         display: grid; place-items: center; font-weight: 700; font-size: var(--t-md); color: var(--stage); }
  .brand h1 { font-size: var(--t-lg); font-weight: 600; letter-spacing: -0.01em; }
  .brand .tag { font-size: var(--t-2xs); color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 1px; }
  .hdr-actions { display: flex; gap: var(--s-6); align-items: center; }
  .btn { font: inherit; font-size: var(--t-md); font-weight: 500; padding: 7px 14px; border-radius: var(--r-sm);
         border: 1px solid var(--border-strong); background: var(--surface-2); color: var(--text-2); cursor: pointer; }
  .btn.ghost { background: transparent; color: var(--text-faint); border-color: var(--border); cursor: not-allowed; }

  /* save button — base for all variants */
  .savebtn { display: inline-flex; align-items: center; gap: 7px; font: inherit; font-size: var(--t-md); font-weight: 600;
        padding: 7px 15px; border-radius: var(--r-sm); border: 1px solid transparent; cursor: pointer;
        transition: background var(--dur) var(--ease), color var(--dur) var(--ease), opacity var(--dur) var(--ease); }
  .savebtn .sdot { width: 7px; height: 7px; border-radius: 50%; }
  .savebtn[data-s=clean]  { background: var(--surface-2); color: var(--text-faint); border-color: var(--border); cursor: default; }
  .savebtn[data-s=dirty]  { background: var(--action); color: oklch(0.16 0.02 150); }
  .savebtn[data-s=dirty] .sdot { background: oklch(0.16 0.02 150); box-shadow: 0 0 0 3px oklch(0.16 0.02 150 / 0.25); }
  .savebtn[data-s=saving] { background: var(--surface-2); color: var(--text-2); border-color: var(--border-strong); cursor: progress; }
  .savebtn[data-s=saved]  { background: var(--surface-2); color: var(--success); border-color: var(--border); cursor: default; }
  .spin { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--text-faint); border-top-color: var(--text); animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* B — header status chip */
  .statuschip { display: inline-flex; align-items: center; gap: 7px; font-size: var(--t-sm); font-weight: 500; padding: 5px 11px; border-radius: var(--r-full); }
  .statuschip .sdot { width: 7px; height: 7px; border-radius: 50%; }
  .statuschip[data-s=clean]  { color: var(--text-muted); }
  .statuschip[data-s=clean] .sdot { background: var(--success); }
  .statuschip[data-s=dirty]  { color: var(--warning); background: oklch(0.80 0.12 78 / 0.12); }
  .statuschip[data-s=dirty] .sdot { background: var(--warning); box-shadow: 0 0 0 3px oklch(0.80 0.12 78 / 0.22); }
  .statuschip[data-s=saving] { color: var(--text-2); }
  .statuschip[data-s=saved]  { color: var(--success); background: oklch(0.72 0.14 150 / 0.12); }

  .work { flex: 1; display: flex; min-height: 0; }
  .stage { flex: 0 1 470px; background: var(--stage); display: flex; flex-direction: column;
           align-items: center; justify-content: center; padding: var(--s-12); border-right: 1px solid var(--border); min-width: 0; }
  .phone { position: relative; aspect-ratio: 9 / 16; height: min(100%, 620px); border-radius: 18px; overflow: hidden;
           background: radial-gradient(120% 70% at 50% 18%, oklch(0.42 0.07 250), transparent 60%),
                       radial-gradient(90% 60% at 50% 95%, oklch(0.30 0.06 320), transparent 70%),
                       linear-gradient(180deg, oklch(0.30 0.04 255), oklch(0.18 0.03 270));
           box-shadow: var(--shadow-pop), inset 0 0 0 1px oklch(0.6 0.02 280 / 0.18); }
  .pv-title { position: absolute; top: 9%; left: 50%; transform: translateX(-50%); z-index: 50; padding: 7px 16px; border-radius: var(--r-sm);
           background: oklch(0.20 0.03 280 / 0.78); backdrop-filter: blur(3px); font-weight: 700; font-size: 17px; white-space: nowrap; }
  .pv-cap { position: absolute; bottom: 13%; left: 8%; right: 8%; text-align: center; z-index: 50; font-weight: 800; font-size: 26px; line-height: 1.15; text-shadow: 0 2px 12px oklch(0.12 0 0 / 0.85); }
  .pv-cap .on { color: var(--accent); }
  .pv-ov { position: absolute; display: grid; place-items: center; border-radius: var(--r-sm); font-size: var(--t-xs); font-weight: 700; color: oklch(0.96 0.01 280); }
  .ov-logo { background: linear-gradient(140deg, oklch(0.7 0.13 30), oklch(0.6 0.16 12)); }

  /* empty / loading preview states */
  .phone.blank { background: linear-gradient(180deg, oklch(0.22 0.03 270), oklch(0.155 0.022 278)); display: grid; place-items: center; }
  .ph-empty { text-align: center; padding: var(--s-12); }
  .ph-empty .ic { width: 56px; height: 56px; margin: 0 auto var(--s-8); border-radius: var(--r-lg); border: 2px dashed var(--border-strong);
        display: grid; place-items: center; font-size: 24px; color: var(--text-faint); }
  .ph-empty .t1 { font-size: var(--t-md); font-weight: 600; color: var(--text-2); }
  .ph-empty .t2 { font-size: var(--t-xs); color: var(--text-muted); margin-top: 5px; line-height: 1.5; }
  .ph-empty .drop { margin-top: var(--s-8); font-size: var(--t-xs); color: var(--accent); border: 1px dashed var(--accent-strong); border-radius: var(--r-sm); padding: 7px 13px; display: inline-block; }
  .shimmer { position: absolute; inset: 0; overflow: hidden; }
  .shimmer .bar { position: absolute; left: 8%; right: 8%; height: 12px; border-radius: var(--r-full); background: oklch(0.34 0.02 280 / 0.6); overflow: hidden; }
  .shimmer .bar::after { content: ""; position: absolute; inset: 0; transform: translateX(-100%);
        background: linear-gradient(90deg, transparent, oklch(0.6 0.06 250 / 0.5), transparent); animation: sweep 1.5s var(--ease) infinite; }
  @keyframes sweep { to { transform: translateX(100%); } }
  .ph-load { position: relative; z-index: 2; text-align: center; }
  .ph-load .ring { width: 46px; height: 46px; margin: 0 auto var(--s-6); border-radius: 50%; border: 3px solid oklch(0.4 0.03 280 / 0.5); border-top-color: var(--accent); animation: spin 0.9s linear infinite; }
  .ph-load .t1 { font-size: var(--t-md); font-weight: 600; }
  .ph-load .t2 { font-size: var(--t-xs); color: var(--text-muted); margin-top: 4px; }

  .stage-meta { margin-top: var(--s-8); display: flex; gap: var(--s-6); align-items: center; color: var(--text-muted); font-size: var(--t-xs); }
  .pill { padding: 3px 9px; border-radius: var(--r-full); background: var(--surface); border: 1px solid var(--border); font-variant-numeric: tabular-nums; }
  .pill.off { opacity: 0.4; }

  .controls { display: flex; flex-direction: column; min-width: 0; background: var(--canvas); flex: 1 1 auto; position: relative; }
  .tabs { display: flex; gap: 2px; padding: 0 var(--s-10); background: var(--chrome); border-bottom: 1px solid var(--border); flex: none; }
  .tab { appearance: none; border: none; background: none; font: inherit; font-size: var(--t-md); font-weight: 500;
         color: var(--text-muted); padding: 13px 14px 11px; cursor: pointer; border-bottom: 2px solid transparent; transition: color var(--dur) var(--ease); }
  .tab:hover { color: var(--text-2); }
  .tab.sel { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .tab .ct { margin-left: 6px; font-size: var(--t-2xs); color: var(--text-faint); font-variant-numeric: tabular-nums; }
  .ctrl-body { flex: 1; overflow-y: auto; padding: var(--s-10); }

  /* scenario switcher (sketch chrome, not the real app) */
  .scnbar { display: flex; align-items: center; gap: var(--s-4); flex-wrap: wrap; padding: var(--s-5) var(--s-6); margin-bottom: var(--s-10);
        background: oklch(0.255 0.055 268 / 0.5); border: 1px dashed var(--border-strong); border-radius: var(--r-sm); }
  .scnbar .lbl { font-size: var(--t-2xs); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-faint); margin-right: 2px; }
  .scnpill { font: inherit; font-size: var(--t-xs); color: var(--text-2); background: var(--surface); border: 1px solid var(--border); padding: 4px 10px; border-radius: var(--r-full); cursor: pointer; }
  .scnpill.on { background: var(--accent-tint); border-color: var(--accent-strong); color: var(--accent); font-weight: 600; }

  .sec { margin-bottom: var(--s-10); }
  .sec-h { display: flex; align-items: center; gap: var(--s-5); font-size: var(--t-2xs); font-weight: 700;
           letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: var(--s-6); }
  .sec-h::after { content: ""; flex: 1; height: 1px; background: var(--border-faint); }
  .sec-h .num { width: 16px; height: 16px; border-radius: var(--r-xs); background: var(--surface-2); display: grid; place-items: center; font-size: var(--t-2xs); color: var(--text-2); }
  .row { display: grid; grid-template-columns: 72px 1fr; align-items: center; gap: var(--s-6); margin-bottom: var(--s-5); }
  .row > label { font-size: var(--t-sm); color: var(--text-2); }
  .inp { font: inherit; font-size: var(--t-md); color: var(--text); background: var(--surface-2); border: 1px solid var(--border);
               border-radius: var(--r-sm); padding: 6px 9px; width: 100%; transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease); }
  .inp:focus { outline: none; border-color: var(--accent-strong); box-shadow: 0 0 0 3px var(--accent-tint); }
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-5); }
  .field { display: flex; flex-direction: column; gap: var(--s-3); }
  .field .mini { font-size: var(--t-2xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .seg { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 2px; gap: 2px; }
  .seg button { flex: 1; font: inherit; font-size: var(--t-sm); color: var(--text-2); background: none; border: none; padding: 5px; border-radius: var(--r-xs); cursor: pointer; }
  .seg button.on { background: var(--accent-tint); color: var(--accent); font-weight: 600; }
  input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; border-radius: var(--r-full); background: var(--surface-hover); }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; border-radius: 50%; background: var(--accent); cursor: pointer; }
  .pgrid { display: inline-grid; grid-template-columns: repeat(3, 28px); grid-auto-rows: 28px; gap: 3px; margin-top: var(--s-5); }
  .pgrid button { border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); border-radius: var(--r-xs); cursor: pointer; font-size: 12px; display: grid; place-items: center; }
  .pgrid button.on { background: var(--accent-tint); border-color: var(--accent-strong); color: var(--accent); }

  .ctrl-2col { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-6) var(--s-12); align-items: start; }
  .colwrap { display: flex; flex-direction: column; min-width: 0; }
  .colwrap > .sec:first-child { margin-top: 0; }

  /* list */
  .listhead { display: flex; align-items: center; gap: var(--s-5); font-size: var(--t-2xs); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: var(--s-6); }
  .listhead .cnt { margin-left: auto; font-weight: 600; color: var(--text-faint); text-transform: none; letter-spacing: 0; font-variant-numeric: tabular-nums; }
  .listhead .cnt.full { color: var(--warning); }
  .ovlist { display: flex; flex-direction: column; gap: var(--s-4); margin-bottom: var(--s-6); }
  .ovcard { display: flex; align-items: center; gap: var(--s-5); padding: var(--s-4) var(--s-5); background: var(--surface);
            border: 1px solid var(--border); border-radius: var(--r-sm); cursor: pointer; }
  .ovcard.sel { border-color: var(--accent-strong); background: var(--accent-tint-2); }
  .ovcard .drag { color: var(--text-faint); font-size: 15px; cursor: grab; }
  .ovthumb { width: 30px; height: 30px; border-radius: var(--r-xs); flex: none; display: grid; place-items: center; font-size: 12px; font-weight: 700; color: oklch(0.96 0.01 280); }
  .th-logo { background: linear-gradient(140deg, oklch(0.7 0.13 30), oklch(0.6 0.16 12)); }
  .th-mark { background: oklch(0.96 0.01 280 / 0.14); border: 1px solid oklch(0.96 0.01 280 / 0.3); }
  .ovcard .info { flex: 1; min-width: 0; }
  .ovcard .nm { font-size: var(--t-sm); color: var(--text); font-weight: 500; }
  .ovcard .sub { font-size: var(--t-2xs); color: var(--text-muted); margin-top: 1px; }
  .lbadge { font-size: var(--t-2xs); font-weight: 700; text-transform: uppercase; padding: 2px 7px; border-radius: var(--r-full); border: 1px solid var(--border); }
  .lbadge.back { color: var(--text-muted); background: var(--surface-2); }
  .lbadge.front { color: var(--accent); background: var(--accent-tint); border-color: var(--accent-strong); }
  .addbtn { width: 100%; padding: 8px; border: 1px dashed var(--border-strong); background: transparent; color: var(--text-2);
            border-radius: var(--r-sm); font: inherit; font-size: var(--t-sm); cursor: pointer; transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease); }
  .addbtn:hover:not(:disabled) { border-color: var(--accent-strong); color: var(--accent); }
  .addbtn:disabled { opacity: 0.5; cursor: not-allowed; border-style: solid; }
  .caphint { font-size: var(--t-2xs); color: var(--warning); margin-top: var(--s-3); text-align: center; }

  /* EMPTY STATE block (0 overlays) */
  .empty { text-align: center; padding: var(--s-16) var(--s-10); border: 1px dashed var(--border-strong); border-radius: var(--r-md); background: oklch(0.245 0.030 282 / 0.4); }
  .empty .ic { width: 48px; height: 48px; margin: 0 auto var(--s-6); border-radius: var(--r-md); background: var(--surface-2); display: grid; place-items: center; font-size: 22px; color: var(--text-muted); }
  .empty .t1 { font-size: var(--t-md); font-weight: 600; color: var(--text); }
  .empty .t2 { font-size: var(--t-xs); color: var(--text-muted); margin: 6px auto var(--s-8); max-width: 30ch; line-height: 1.55; }
  .empty .addbtn { max-width: 220px; margin: 0 auto; }

  .editing-head { display: flex; align-items: center; justify-content: space-between; margin: var(--s-12) 0 var(--s-6); padding-bottom: var(--s-5); border-bottom: 1px solid var(--border-faint); }
  .editing-head .t { font-size: var(--t-md); font-weight: 600; }

  /* C — footer save bar inside controls */
  .savebar { position: absolute; left: 0; right: 0; bottom: 0; transform: translateY(110%); z-index: 30;
        display: flex; align-items: center; gap: var(--s-6); padding: var(--s-6) var(--s-8);
        background: var(--surface); border-top: 1px solid var(--border-strong); box-shadow: var(--shadow-md);
        transition: transform var(--dur) var(--ease); }
  .savebar.show { transform: translateY(0); }
  .savebar .msg { font-size: var(--t-sm); color: var(--text-2); display: inline-flex; align-items: center; gap: 7px; }
  .savebar .msg .sdot { width: 7px; height: 7px; border-radius: 50%; background: var(--warning); }
  .savebar .acts { margin-left: auto; display: flex; gap: var(--s-5); }
  .savebar .discard { font: inherit; font-size: var(--t-sm); color: var(--text-muted); background: none; border: none; cursor: pointer; padding: 6px 10px; }
  .savebar .discard:hover { color: var(--text-2); }

  .meta { background: var(--chrome); border-left: 1px solid var(--border); display: flex; flex-direction: column; min-width: 0; flex: 0 0 320px; }
  .meta-h { padding: var(--s-10) var(--s-10) var(--s-6); }
  .meta-h .row1 { display: flex; align-items: center; justify-content: space-between; }
  .meta-h h2 { font-size: var(--t-md); font-weight: 600; }
  .soon { font-size: var(--t-2xs); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); background: var(--accent-tint); padding: 3px 8px; border-radius: var(--r-full); }
  .meta-h p { font-size: var(--t-xs); color: var(--text-muted); margin-top: 4px; line-height: 1.5; }
  .meta-body { flex: 1; overflow-y: auto; padding: var(--s-6) var(--s-10) var(--s-12); display: flex; flex-direction: column; gap: var(--s-8); }
  .ghost { opacity: 0.5; pointer-events: none; }
  .gh-label { font-size: var(--t-2xs); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: var(--s-3); }
  .gh-box { background: var(--surface); border: 1px dashed var(--border-strong); border-radius: var(--r-sm); padding: var(--s-6); color: var(--text-faint); font-size: var(--t-sm); }
  .gh-line { height: 9px; border-radius: var(--r-full); background: var(--surface-2); margin: 7px 0; }
  .gh-line.w70 { width: 70%; } .gh-line.w90 { width: 90%; } .gh-line.w50 { width: 50%; }

  #vnav { position: fixed; top: 0; left: 0; right: 0; height: 46px; z-index: 9998; background: var(--chrome);
          border-bottom: 1px solid var(--border-strong); display: flex; align-items: center; gap: var(--s-4); padding: 0 var(--s-10); font-size: var(--t-sm); }
  #vnav .lbl { color: var(--text-muted); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; font-size: var(--t-2xs); margin-right: var(--s-4); }
  .vtab { font: inherit; font-size: var(--t-sm); color: var(--text-2); background: var(--surface); border: 1px solid var(--border); padding: 5px 12px; border-radius: var(--r-full); cursor: pointer; }
  .vtab.active { background: var(--accent-tint); border-color: var(--accent-strong); color: var(--accent); font-weight: 600; }
  #tools { position: fixed; bottom: 12px; right: 12px; z-index: 9999; font-family: system-ui; font-size: 11px; background: rgba(0,0,0,0.72); color: #fff; padding: 7px 10px; border-radius: 8px; opacity: 0.4; display: flex; gap: 8px; align-items: center; }
  #tools:hover { opacity: 1; }
  #tools select { font: inherit; background: #222; color: #fff; border: 1px solid #555; border-radius: 4px; padding: 2px 4px; }
</style>
</head>
<body>

<nav id="vnav">
  <span class="lbl">Sketch 008 · states &amp; empties</span>
  <button class="vtab active" onclick="show('a',this)">A · Save = button</button>
  <button class="vtab" onclick="show('b',this)">B ★ · Save = header status</button>
  <button class="vtab" onclick="show('c',this)">C · Save = footer bar</button>
  <span style="margin-left:auto;color:var(--text-faint);font-size:var(--t-2xs)">edit a control → dirty · then save · scenarios switch the empties</span>
</nav>

<div class="variant active" id="v-a"></div>
<div class="variant" id="v-b"></div>
<div class="variant" id="v-c"></div>

<div id="tools"><span>theme</span>
  <select onchange="document.querySelector('link[href*=themes]').href='../themes/'+this.value+'.css'"><option value="default">default</option></select>
</div>

<script>
  const SCENARIOS = [
    { id:'normal',  label:'Normal' },
    { id:'empty',   label:'Overlays vacío' },
    { id:'cap',     label:'Overlays al tope (3)' },
    { id:'novideo', label:'Sin video' },
    { id:'loading', label:'Procesando' },
  ];
  const overlays = [
    { id:'o1', name:'logo-marca.png', kind:'logo', sub:'160px · 100%', layer:'front' },
    { id:'o2', name:'watermark.png',  kind:'mark', sub:'150px · 45%',  layer:'back' },
    { id:'o3', name:'marco-borde.png',kind:'mark', sub:'1080px · 70%', layer:'back' },
  ];
  // a:button  b:header  c:footer
  const state = {
    a:{ scn:'empty', save:'clean' },
    b:{ scn:'empty', save:'clean' },
    c:{ scn:'empty', save:'clean' },
  };
  const SAVE_LABEL = { clean:'Guardado', dirty:'Guardar config', saving:'Guardando…', saved:'Guardado' };

  function presetGrid(){ return `<div class="pgrid"><button>↖</button><button>↑</button><button>↗</button><button>←</button><button>•</button><button>→</button><button>↙</button><button class="on">↓</button><button>↘</button></div>`; }

  function overlayForm(o){
    return `<div class="editing-head"><span class="t">Overlay · ${o.name}</span><span class="lbadge ${o.layer}">${o.layer==='back'?'Detrás':'Delante'}</span></div>
      <div class="ctrl-2col">
        <div class="colwrap">
          <div class="sec"><div class="sec-h"><span class="num">1</span>Posición</div>
            <div class="two"><div class="field"><span class="mini">X</span><input class="inp dirty-src" value="856"></div><div class="field"><span class="mini">Y</span><input class="inp dirty-src" value="64"></div></div>
            ${presetGrid()}</div>
        </div>
        <div class="colwrap">
          <div class="sec"><div class="sec-h"><span class="num">2</span>Estilo</div>
            <div class="row"><label>Capa</label><div class="seg dirty-src"><button class="${o.layer==='back'?'on':''}">Detrás</button><button class="${o.layer==='front'?'on':''}">Delante</button></div></div>
            <div class="row"><label>Ancho</label><input type="range" min="40" max="1080" value="160" class="dirty-src"></div>
            <div class="row"><label>Opacidad</label><input type="range" min="0" max="100" value="100" class="dirty-src"></div></div>
        </div>
      </div>`;
  }

  function overlaysBody(vk){
    const v = state[vk];
    if (v.scn === 'empty') {
      return `<div class="listhead">Overlays <span class="cnt">0 / 3</span></div>
        <div class="empty">
          <div class="ic">▦</div>
          <div class="t1">Sin overlays todavía</div>
          <div class="t2">Sumá un logo, watermark o marco PNG. Aparecen <b>detrás</b> del texto salvo que los promuevas al frente.</div>
          <button class="addbtn add-src">＋ Agregar overlay</button>
        </div>`;
    }
    // cap: 3 items, add disabled
    const sel = overlays[0];
    let h = `<div class="listhead">Overlays <span class="cnt full">3 / 3 · al tope</span></div><div class="ovlist">`;
    overlays.forEach((o,i)=>{
      const th = o.kind==='logo'?'th-logo':'th-mark'; const g = o.kind==='logo'?'R':'@';
      h += `<div class="ovcard ${i===0?'sel':''}"><span class="drag">⠿</span><span class="ovthumb ${th}">${g}</span>
        <div class="info"><div class="nm">${o.name}</div><div class="sub">${o.sub}</div></div>
        <span class="lbadge ${o.layer}">${o.layer==='back'?'Detrás':'Delante'}</span></div>`;
    });
    h += `</div><button class="addbtn" disabled>＋ Agregar overlay</button>
      <div class="caphint">Máximo 3 overlays — quitá uno para sumar otro.</div>`;
    h += overlayForm(sel);
    return h;
  }

  function renderPhone(vk){
    const v = state[vk];
    if (v.scn === 'novideo') {
      return `<div class="phone blank"><div class="ph-empty">
        <div class="ic">⬆</div><div class="t1">Sin video cargado</div>
        <div class="t2">El preview aparece cuando subís un MP4 de una persona hablando.</div>
        <div class="drop">Soltá un .mp4 o elegí archivo</div></div></div>`;
    }
    if (v.scn === 'loading') {
      return `<div class="phone blank">
        <div class="shimmer"><div class="bar" style="top:30%"></div><div class="bar" style="top:42%;left:14%;right:20%"></div><div class="bar" style="top:54%;left:14%;right:30%"></div></div>
        <div class="ph-load"><div class="ring"></div><div class="t1">Transcribiendo…</div><div class="t2">Whisper · paso 1 de 3</div></div></div>`;
    }
    let html = '<div class="pv-title">Cómo edité este reel</div><div class="pv-cap"><span class="on">subtítulos</span> que enganchan</div>';
    if (v.scn === 'cap') {
      html += `<div class="pv-ov ov-logo" style="z-index:60;right:6%;top:4%;width:16%;aspect-ratio:1;">LOGO</div>`;
    }
    return `<div class="phone">${html}</div>`;
  }

  const metaHTML = `
    <div class="meta-h"><div class="row1"><h2>Metadata de redes</h2><span class="soon">Próximamente</span></div>
      <p>Generada con IA desde la transcripción y los títulos.</p></div>
    <div class="meta-body ghost">
      <div><div class="gh-label">Título</div><div class="gh-box">El truco de edición que cambió mis reels</div></div>
      <div><div class="gh-label">Descripción</div><div class="gh-box"><div class="gh-line w90"></div><div class="gh-line w70"></div><div class="gh-line w50"></div></div></div>
    </div>`;

  function scnBar(vk){
    const v = state[vk];
    return `<div class="scnbar"><span class="lbl">Escenario</span>` +
      SCENARIOS.map(s=>`<button class="scnpill ${s.id===v.scn?'on':''}" data-scn="${s.id}">${s.label}</button>`).join('') +
      `</div>`;
  }

  // ── header rendering per save-variant ──
  function headerActions(vk){
    const v = state[vk]; const s = v.save;
    if (vk === 'a') {
      const inner = s==='saving' ? `<span class="spin"></span>${SAVE_LABEL.saving}`
                  : s==='saved'  ? `✓ ${SAVE_LABEL.saved}`
                  : s==='dirty'  ? `<span class="sdot"></span>${SAVE_LABEL.dirty}`
                  : SAVE_LABEL.clean;
      return `<button class="btn ghost" title="Próximamente">Render Video</button>
        <button class="savebtn" data-s="${s}" data-save>${inner}</button>`;
    }
    if (vk === 'b') {
      const chip = s==='dirty'  ? `<span class="sdot"></span>Cambios sin guardar`
                 : s==='saving' ? `<span class="spin"></span>Guardando…`
                 : s==='saved'  ? `✓ Guardado recién`
                 : `<span class="sdot"></span>Todo guardado`;
      const disabled = (s==='clean'||s==='saving'||s==='saved');
      return `<span class="statuschip" data-s="${s}">${chip}</span>
        <button class="btn ghost" title="Próximamente">Render Video</button>
        <button class="savebtn" data-s="${disabled?'clean':'dirty'}" ${disabled?'':'data-save'}>${disabled?'Guardar config':'Guardar config'}</button>`;
    }
    // c: header button is plain; the bar does the work
    return `<button class="btn ghost" title="Próximamente">Render Video</button>
      <button class="savebtn" data-s="${v.save==='dirty'?'dirty':'clean'}" ${v.save==='dirty'?'data-save':''}>Guardar config</button>`;
  }

  function render(vk){
    const v = state[vk];
    const metaCols = `<aside class="meta">${metaHTML}</aside>`;
    const footer = vk==='c' ? `<div class="savebar ${v.save==='dirty'||v.save==='saving'?'show':''}">
        <span class="msg">${v.save==='saving'?'<span class="spin"></span>Guardando…':'<span class="sdot"></span>Tenés cambios sin guardar'}</span>
        <span class="acts"><button class="discard" data-discard>Descartar</button>
          <button class="savebtn" data-s="dirty" data-save>Guardar config</button></span></div>` : '';
    document.getElementById('v-'+vk).innerHTML = `
      <header class="hdr">
        <div class="brand"><div class="glyph">R</div><div><h1>Reel Factory Studio</h1><div class="tag">Vertical 9:16 · Subtítulos</div></div></div>
        <div class="hdr-actions">${headerActions(vk)}</div>
      </header>
      <div class="work">
        <section class="stage">${renderPhone(vk)}
          <div class="stage-meta"><span class="pill ${v.scn==='novideo'||v.scn==='loading'?'off':''}">1080 × 1920</span><span class="pill ${v.scn==='novideo'||v.scn==='loading'?'off':''}">9:16</span><span class="pill ${v.scn==='novideo'?'off':''}">${v.scn==='loading'?'…':'00:10'}</span></div>
        </section>
        <section class="controls">
          <div class="tabs"><button class="tab">Titles<span class="ct">2</span></button><button class="tab sel">Overlays<span class="ct">${v.scn==='empty'?0:3}</span></button><button class="tab">Subtitles</button></div>
          <div class="ctrl-body">${scnBar(vk)}${overlaysBody(vk)}</div>
          ${footer}
        </section>
        ${metaCols}
      </div>`;
    wire(vk);
  }

  function setSave(vk, s){ state[vk].save = s; render(vk);
    if (s==='saving'){ setTimeout(()=>setSave(vk,'saved'), 850); }
    if (s==='saved'){ setTimeout(()=>{ if(state[vk].save==='saved') setSave(vk,'clean'); }, 1600); }
  }

  function wire(vk){
    const root = document.getElementById('v-'+vk);
    root.querySelectorAll('[data-scn]').forEach(b=> b.onclick = ()=>{ state[vk].scn = b.dataset.scn; render(vk); });
    root.querySelectorAll('[data-save]').forEach(b=> b.onclick = ()=> setSave(vk,'saving'));
    root.querySelectorAll('[data-discard]').forEach(b=> b.onclick = ()=> setSave(vk,'clean'));
    // editing any control marks dirty
    const markDirty = ()=>{ if(state[vk].save==='clean'||state[vk].save==='saved') setSave(vk,'dirty'); };
    root.querySelectorAll('.dirty-src').forEach(el=>{
      if (el.classList.contains('seg')) el.querySelectorAll('button').forEach(btn=> btn.addEventListener('click', ()=>{ el.querySelectorAll('button').forEach(x=>x.classList.remove('on')); btn.classList.add('on'); markDirty(); }));
      else el.addEventListener('input', markDirty);
    });
    root.querySelectorAll('.pgrid button').forEach(btn=> btn.addEventListener('click', ()=>{ const g=btn.closest('.pgrid'); g.querySelectorAll('button').forEach(x=>x.classList.remove('on')); btn.classList.add('on'); markDirty(); }));
    root.querySelectorAll('.add-src').forEach(b=> b.addEventListener('click', ()=>{ state[vk].scn='cap'; markDirty(); render(vk); }));
  }

  ['a','b','c'].forEach(render);

  function show(id, btn) {
    document.querySelectorAll('.variant').forEach(v => v.classList.remove('active'));
    document.getElementById('v-' + id).classList.add('active');
    document.querySelectorAll('.vtab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
  }
</script>
</body>
</html>
