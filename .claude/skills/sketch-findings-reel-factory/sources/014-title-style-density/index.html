<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sketch 014 — title style density</title>
<link rel="stylesheet" href="../themes/default.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,700&family=Bebas+Neue&family=Montserrat:wght@600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--font); background: var(--canvas); color: var(--text);
         font-size: var(--t-base); padding-top: 46px; -webkit-font-smoothing: antialiased; }
  .variant { display: none; height: calc(100vh - 46px); }
  .variant.active { display: flex; flex-direction: column; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hdr { height: 52px; flex: none; display: flex; align-items: center; justify-content: space-between;
         padding: 0 var(--s-12); background: var(--chrome); border-bottom: 1px solid var(--border); }
  .brand { display: flex; align-items: center; gap: var(--s-5); }
  .brand .glyph { width: 26px; height: 26px; border-radius: var(--r-sm);
         background: linear-gradient(145deg, var(--accent), var(--accent-strong));
         display: grid; place-items: center; font-weight: 700; font-size: var(--t-md); color: var(--stage); }
  .brand h1 { font-size: var(--t-lg); font-weight: 600; letter-spacing: -0.01em; }
  .brand .tag { font-size: var(--t-2xs); color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 1px; }
  .hdr-actions { display: flex; gap: var(--s-6); align-items: center; }
  .save-chip { display: inline-flex; align-items: center; gap: var(--s-2); font-size: var(--t-xs); padding: var(--s-2) var(--s-4); border-radius: var(--r-full); color: var(--warning); background: oklch(0.80 0.12 78 / 0.12); }
  .save-chip .dot { width: 6px; height: 6px; border-radius: var(--r-full); background: currentColor; }
  .btn { font: inherit; font-size: var(--t-md); font-weight: 500; padding: 7px 14px; border-radius: var(--r-sm); border: 1px solid var(--border-strong); background: transparent; color: var(--text-2); cursor: pointer; }
  .render-cta { display: inline-flex; align-items: center; gap: 8px; font: inherit; font-size: var(--t-md); font-weight: 600; padding: 7px 16px; border-radius: var(--r-sm); border: 1px solid transparent; background: var(--action); color: oklch(0.16 0.02 150); cursor: pointer; }

  .work { flex: 1; display: flex; min-height: 0; }
  .stage { flex: 0 1 470px; background: var(--stage); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: var(--s-12); border-right: 1px solid var(--border); min-width: 0; }
  .phone { position: relative; aspect-ratio: 9 / 16; height: min(100%, 620px); border-radius: 18px; overflow: hidden;
           background: radial-gradient(120% 70% at 50% 18%, oklch(0.42 0.07 250), transparent 60%),
                       radial-gradient(90% 60% at 50% 95%, oklch(0.30 0.06 320), transparent 70%),
                       linear-gradient(180deg, oklch(0.30 0.04 255), oklch(0.18 0.03 270));
           box-shadow: var(--shadow-pop), inset 0 0 0 1px oklch(0.6 0.02 280 / 0.18); }
  /* the boxed title — background card with padding + radius (real TitleStyleProps) */
  .pv-titlebox { position: absolute; left: 50%; transform: translateX(-50%); z-index: 50; max-width: 84%; text-align: center;
        font-family: "Plus Jakarta Sans", var(--font); font-weight: 700; line-height: 1.15; }
  .pv-cap { position: absolute; bottom: 12%; left: 8%; right: 8%; text-align: center; z-index: 40; font-weight: 800; font-size: 22px; color: #fff; opacity: 0.55; text-shadow: 0 2px 12px oklch(0.12 0 0 / 0.85); }
  .pv-cap .on { color: #ffea00; }
  .stage-meta { margin-top: var(--s-8); display: flex; gap: var(--s-6); align-items: center; color: var(--text-muted); font-size: var(--t-xs); }
  .pill { padding: 3px 9px; border-radius: var(--r-full); background: var(--surface); border: 1px solid var(--border); font-variant-numeric: tabular-nums; }

  .controls { display: flex; flex-direction: column; min-width: 0; background: var(--canvas); flex: 1 1 auto; }
  .tabs { display: flex; gap: 2px; padding: 0 var(--s-10); background: var(--chrome); border-bottom: 1px solid var(--border); flex: none; }
  .tab { appearance: none; border: none; background: none; font: inherit; font-size: var(--t-md); font-weight: 500; color: var(--text-muted); padding: 13px 14px 11px; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.sel { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .tab .ct { margin-left: 6px; font-size: var(--t-2xs); color: var(--text-faint); }
  .ctrl-body { flex: 1; overflow-y: auto; padding: var(--s-10); }

  .sec { margin-bottom: var(--s-10); }
  .sec-h { display: flex; align-items: center; gap: var(--s-5); font-size: var(--t-2xs); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: var(--s-6); }
  .sec-h::after { content: ""; flex: 1; height: 1px; background: var(--border-faint); }
  .sec-h .num { width: 16px; height: 16px; border-radius: var(--r-xs); background: var(--surface-2); display: grid; place-items: center; font-size: var(--t-2xs); color: var(--text-2); }
  .sec-h .note { color: var(--text-faint); font-weight: 500; text-transform: none; letter-spacing: 0; }
  .row { display: grid; grid-template-columns: 84px 1fr; align-items: center; gap: var(--s-6); margin-bottom: var(--s-5); }
  .row > label { font-size: var(--t-sm); color: var(--text-2); }
  .inp, .sel { font: inherit; font-size: var(--t-md); color: var(--text); background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 6px 9px; width: 100%; transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease); }
  .inp:focus, .sel:focus { outline: none; border-color: var(--accent-strong); box-shadow: 0 0 0 3px var(--accent-tint); }
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-5); }
  .field { display: flex; flex-direction: column; gap: var(--s-3); }
  .field .mini { font-size: var(--t-2xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .seg { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 2px; gap: 2px; }
  .seg button { flex: 1; font: inherit; font-size: var(--t-sm); color: var(--text-2); background: none; border: none; padding: 5px; border-radius: var(--r-xs); cursor: pointer; }
  .seg button.on { background: var(--accent-tint); color: var(--accent); font-weight: 600; }
  .rng { display: grid; grid-template-columns: 1fr 42px; align-items: center; gap: var(--s-5); }
  input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; border-radius: var(--r-full); background: var(--surface-hover); }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; border-radius: 50%; background: var(--accent); cursor: pointer; }
  .rng output { font-size: var(--t-xs); color: var(--text-2); font-variant-numeric: tabular-nums; text-align: right; }
  .pgrid { display: inline-grid; grid-template-columns: repeat(3, 30px); grid-auto-rows: 30px; gap: 3px; margin-top: var(--s-6); }
  .pgrid button { border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); border-radius: var(--r-xs); cursor: pointer; font-size: 13px; display: grid; place-items: center; transition: all var(--dur) var(--ease); }
  .pgrid button:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-strong); }
  .pgrid button.on { background: var(--accent-tint); border-color: var(--accent-strong); color: var(--accent); }

  .fontgrid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-4); }
  .fontcard { padding: var(--s-4) var(--s-5); background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); cursor: pointer; transition: border-color var(--dur) var(--ease), background var(--dur) var(--ease); }
  .fontcard:hover { border-color: var(--border-strong); }
  .fontcard.on { border-color: var(--accent-strong); background: var(--accent-tint-2); }
  .fontcard .fn { font-size: var(--t-md); color: var(--text); }
  .fontcard .fp { font-size: var(--t-2xs); color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
  .fontmore { grid-column: 1 / -1; text-align: center; font-size: var(--t-2xs); color: var(--text-faint); padding-top: 2px; }

  .cmatrix { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-5) var(--s-6); }
  .crole { display: flex; align-items: center; gap: var(--s-4); padding: var(--s-3) 0; }
  .crole .rl { font-size: var(--t-xs); color: var(--text-2); flex: 1; min-width: 0; }
  .cswatch { position: relative; width: 26px; height: 26px; flex: none; border-radius: var(--r-sm); border: 1px solid var(--border-strong); overflow: hidden; cursor: pointer; }
  .cswatch input[type=color] { position: absolute; inset: -4px; width: calc(100% + 8px); height: calc(100% + 8px); border: none; padding: 0; background: none; cursor: pointer; }
  .colorfield { display: flex; align-items: center; gap: var(--s-4); }
  .chex { font-family: var(--mono); font-size: var(--t-xs); color: var(--text-2); text-transform: uppercase; letter-spacing: 0.03em; }
  .clab { font-size: var(--t-2xs); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-faint); margin: var(--s-8) 0 var(--s-5); }
  .clab:first-child { margin-top: 0; }

  .fx { border: 1px solid var(--border); border-radius: var(--r-sm); background: var(--surface); margin-bottom: var(--s-5); overflow: hidden; transition: border-color var(--dur) var(--ease); }
  .fx.open { border-color: var(--border-strong); }
  .fx-head { display: flex; align-items: center; gap: var(--s-5); padding: var(--s-5) var(--s-6); cursor: pointer; }
  .fx-head .fx-name { font-size: var(--t-sm); color: var(--text); flex: 1; font-weight: 500; }
  .fx-head .fx-hint { font-size: var(--t-2xs); color: var(--text-faint); }
  .switch { position: relative; width: 30px; height: 17px; border-radius: var(--r-full); background: var(--surface-hover); border: 1px solid var(--border-strong); flex: none; transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease); }
  .switch::after { content: ""; position: absolute; top: 1px; left: 1px; width: 13px; height: 13px; border-radius: 50%; background: var(--text-2); transition: transform var(--dur) var(--ease), background var(--dur) var(--ease); }
  .fx.open .switch { background: var(--accent-tint); border-color: var(--accent-strong); }
  .fx.open .switch::after { transform: translateX(13px); background: var(--accent); }
  .fx-params { display: none; padding: 0 var(--s-6) var(--s-6); }
  .fx.open .fx-params { display: block; }

  /* in-panel specimen — shows the BOXED title (C) */
  .specimen { position: relative; border-radius: var(--r-md); margin-bottom: var(--s-8); overflow: hidden;
              background: linear-gradient(180deg, oklch(0.30 0.04 255), oklch(0.20 0.03 270));
              border: 1px solid var(--border); min-height: 104px; display: grid; place-items: center; padding: var(--s-10) var(--s-8); }
  .specimen .sp-tag { position: absolute; top: 7px; right: 9px; font-size: var(--t-2xs); color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.07em; }

  /* entrance-animation preset cards (the title analog of subtitle layout modes) */
  .modecards { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--s-4); margin-bottom: var(--s-8); }
  .modecard { padding: var(--s-5) var(--s-3) var(--s-4); background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); cursor: pointer; text-align: center; transition: border-color var(--dur) var(--ease), background var(--dur) var(--ease); }
  .modecard:hover { border-color: var(--border-strong); }
  .modecard.on { border-color: var(--accent-strong); background: var(--accent-tint-2); }
  .modecard .mc-vis { height: 30px; border-radius: var(--r-xs); background: var(--stage); display: grid; place-items: center; margin-bottom: var(--s-4); overflow: hidden; font-size: 15px; color: var(--accent); }
  .modecard .mc-nm { font-size: var(--t-2xs); color: var(--text-2); font-weight: 600; }
  .modecard.on .mc-nm { color: var(--accent); }

  /* list */
  .listhead { display: flex; align-items: center; gap: var(--s-5); font-size: var(--t-2xs); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: var(--s-6); }
  .listhead .cnt { margin-left: auto; font-weight: 600; color: var(--text-faint); text-transform: none; letter-spacing: 0; }
  .ovlist { display: flex; flex-direction: column; gap: var(--s-4); margin-bottom: var(--s-6); }
  .ovcard { display: flex; align-items: center; gap: var(--s-5); padding: var(--s-4) var(--s-5); background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); cursor: pointer; }
  .ovcard:hover { border-color: var(--border-strong); }
  .ovcard.sel { border-color: var(--accent-strong); background: var(--accent-tint-2); }
  .ovcard .drag { color: var(--text-faint); font-size: 15px; cursor: grab; }
  .ovthumb { width: 30px; height: 30px; border-radius: var(--r-xs); flex: none; display: grid; place-items: center; font-size: 12px; font-weight: 700; background: var(--accent-tint); color: var(--accent); }
  .ovcard .info { flex: 1; min-width: 0; }
  .ovcard .nm { font-size: var(--t-sm); color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ovcard .sub { font-size: var(--t-2xs); color: var(--text-muted); margin-top: 1px; }
  .addbtn { width: 100%; padding: 8px; border: 1px dashed var(--border-strong); background: transparent; color: var(--text-2); border-radius: var(--r-sm); font: inherit; font-size: var(--t-sm); cursor: pointer; }
  .addbtn:hover { border-color: var(--accent-strong); color: var(--accent); }
  .editing-head { display: flex; align-items: center; justify-content: space-between; margin: var(--s-12) 0 var(--s-6); padding-bottom: var(--s-5); border-bottom: 1px solid var(--border-faint); }
  .editing-head .t { font-size: var(--t-md); font-weight: 600; }

  .ctrl-2col { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-6) var(--s-12); align-items: start; }
  .ctrl-2col .colwrap { display: flex; flex-direction: column; min-width: 0; }
  .ctrl-2col .colwrap > .sec:first-child { margin-top: 0; }
  .ctrl-2col .row { grid-template-columns: 72px 1fr; }
  .fullbleed { margin-bottom: var(--s-10); }

  .meta { background: var(--chrome); border-left: 1px solid var(--border); display: flex; flex-direction: column; min-width: 0; flex: 0 0 320px; }
  .meta-h { padding: var(--s-10) var(--s-10) var(--s-6); }
  .meta-h .row1 { display: flex; align-items: center; justify-content: space-between; }
  .meta-h h2 { font-size: var(--t-md); font-weight: 600; }
  .soon { font-size: var(--t-2xs); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); background: var(--accent-tint); padding: 3px 8px; border-radius: var(--r-full); }
  .meta-h p { font-size: var(--t-xs); color: var(--text-muted); margin-top: 4px; line-height: 1.5; }
  .meta-body { flex: 1; overflow-y: auto; padding: var(--s-6) var(--s-10) var(--s-12); display: flex; flex-direction: column; gap: var(--s-8); }
  .ghost { opacity: 0.5; pointer-events: none; }
  .gh-label { font-size: var(--t-2xs); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: var(--s-3); }
  .gh-box { background: var(--surface); border: 1px dashed var(--border-strong); border-radius: var(--r-sm); padding: var(--s-6); color: var(--text-faint); font-size: var(--t-sm); }
  .gh-line { height: 9px; border-radius: var(--r-full); background: var(--surface-2); margin: 7px 0; }
  .gh-line.w70 { width: 70%; } .gh-line.w90 { width: 90%; }

  #vnav { position: fixed; top: 0; left: 0; right: 0; height: 46px; z-index: 9998; background: var(--chrome); border-bottom: 1px solid var(--border-strong); display: flex; align-items: center; gap: var(--s-4); padding: 0 var(--s-10); font-size: var(--t-sm); }
  #vnav .lbl { color: var(--text-muted); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; font-size: var(--t-2xs); margin-right: var(--s-4); }
  .vtab { font: inherit; font-size: var(--t-sm); color: var(--text-2); background: var(--surface); border: 1px solid var(--border); padding: 5px 12px; border-radius: var(--r-full); cursor: pointer; transition: all var(--dur) var(--ease); }
  .vtab:hover { background: var(--surface-hover); color: var(--text); }
  .vtab.active { background: var(--accent-tint); border-color: var(--accent-strong); color: var(--accent); font-weight: 600; }
  #tools { position: fixed; bottom: 12px; right: 12px; z-index: 9999; font-family: system-ui; font-size: 11px; background: rgba(0,0,0,0.72); color: #fff; padding: 7px 10px; border-radius: 8px; opacity: 0.4; display: flex; gap: 8px; align-items: center; }
  #tools:hover { opacity: 1; }
  #tools select { font: inherit; background: #222; color: #fff; border: 1px solid #555; border-radius: 4px; padding: 2px 4px; }
</style>
</head>
<body>

<nav id="vnav">
  <span class="lbl">Sketch 014 · title style density</span>
  <button class="vtab active" onclick="show('a',this)">A · Plana ortodoxa</button>
  <button class="vtab" onclick="show('b',this)">B · Clusters + Caja/Glow plegables</button>
  <button class="vtab" onclick="show('c',this)">C ★ · Specimen + entrada presets</button>
  <span style="margin-left:auto;color:var(--text-faint);font-size:var(--t-2xs)">TitleStyleProps real: caja (bg/padding/radio) + entrada + glow</span>
</nav>

<div class="variant active" id="v-a"></div>
<div class="variant" id="v-b"></div>
<div class="variant" id="v-c"></div>

<div id="tools"><span>theme</span>
  <select onchange="document.querySelector('link[href*=themes]').href='../themes/'+this.value+'.css'"><option value="default">default</option></select>
</div>

<script>
  const titles = [
    { id:'t1', name:'Cómo edité este reel', x:300, y:170 },
    { id:'t2', name:'El antes y el después', x:300, y:1500 },
  ];
  const state = { a:{sel:'t1'}, b:{sel:'t1'}, c:{sel:'t1'} };

  const presetGrid = `<div class="pgrid"><button class="on">↖</button><button>↑</button><button>↗</button><button>←</button><button>•</button><button>→</button><button>↙</button><button>↓</button><button>↘</button></div>`;
  const fontGridHTML = `<div class="fontgrid">
        <div class="fontcard on" data-font="'Plus Jakarta Sans'"><div class="fn" style="font-family:'Plus Jakarta Sans'">Plus Jakarta</div><div class="fp">Humanista</div></div>
        <div class="fontcard" data-font="Inter"><div class="fn" style="font-family:Inter">Inter</div><div class="fp">Geométrica</div></div>
        <div class="fontcard" data-font="Montserrat"><div class="fn" style="font-family:Montserrat">Montserrat</div><div class="fp">Grotesque</div></div>
        <div class="fontcard" data-font="'Bebas Neue'"><div class="fn" style="font-family:'Bebas Neue';font-size:18px">BEBAS NEUE</div><div class="fp">Condensada</div></div>
        <div class="fontmore">+ 22 fuentes</div></div>`;
  const entranceCards = `<div class="modecards">
        <div class="modecard on" data-anim><div class="mc-vis">↑</div><div class="mc-nm">Slide ↑</div></div>
        <div class="modecard" data-anim><div class="mc-vis">↓</div><div class="mc-nm">Slide ↓</div></div>
        <div class="modecard" data-anim><div class="mc-vis">◍</div><div class="mc-nm">Fade</div></div>
        <div class="modecard" data-anim><div class="mc-vis">∅</div><div class="mc-nm">Ninguna</div></div></div>`;
  const glowFx = `<div class="fx" data-fx>
        <div class="fx-head"><span class="switch"></span><span class="fx-name">Glow exterior</span><span class="fx-hint">apagado</span></div>
        <div class="fx-params"><div class="row"><label>Color</label><div class="colorfield"><span class="cswatch"><input type="color" value="#90caf9"></span><span class="chex">#90CAF9</span></div></div>
          <div class="row"><label>Intensidad</label><div class="rng"><input type="range" min="0" max="100" value="60"><output>60</output></div></div>
          <div class="row"><label>Difusión</label><div class="rng"><input type="range" min="0" max="60" value="18"><output>18</output></div></div></div></div>`;

  // ── VARIANT A — flat orthodox ──
  function bodyA(){
    return listLead() + `<div class="editing-head"><span class="t">Título · ${sel().name}</span></div>
      <div class="ctrl-2col">
        <div class="colwrap">
          <div class="sec"><div class="sec-h"><span class="num">1</span>Posición</div>
            <div class="two"><div class="field"><span class="mini">X</span><input class="inp" value="300"></div><div class="field"><span class="mini">Y</span><input class="inp" value="170"></div></div>
            ${presetGrid}</div>
          <div class="sec" style="margin-bottom:0"><div class="sec-h"><span class="num">3</span>Avanzado <span class="note">· rara vez</span></div>
            <div class="row"><label>Entrada</label><select class="sel" data-animsel><option>Slide ↑</option><option>Slide ↓</option><option>Fade</option><option>Ninguna</option></select></div>
            <div class="row"><label>Interlínea</label><div class="rng"><input type="range" min="80" max="200" value="115"><output>1.15</output></div></div>
            <div class="row"><label>Glow</label><div class="seg"><button class="on">Off</button><button>On</button></div></div>
            <div class="row"><label>Glow color</label><div class="colorfield"><span class="cswatch"><input type="color" value="#90caf9"></span><span class="chex">#90CAF9</span></div></div>
            <div class="row"><label>Glow difus.</label><div class="rng"><input type="range" min="0" max="60" value="18"><output>18</output></div></div>
            <div class="row"><label>Aparece</label><input class="inp" value="0.0 s"></div>
            <div class="row"><label>Duración</label><input class="inp" value="3.0 s"></div></div>
        </div>
        <div class="colwrap">
          <div class="sec" style="margin-bottom:0"><div class="sec-h"><span class="num">2</span>Estilo</div>
            <div class="row"><label>Texto</label><input class="inp" data-text value="${sel().name}"></div>
            <div style="margin:var(--s-3) 0 var(--s-6)">${fontGridHTML}</div>
            <div class="row"><label>Tamaño</label><div class="rng"><input type="range" min="20" max="120" value="56" data-size><output>56</output></div></div>
            <div class="row"><label>Peso</label><div class="seg" data-weight><button>Regular</button><button class="on">Bold</button></div></div>
            <div class="row"><label>Cursiva</label><div class="seg" data-italic><button class="on">Normal</button><button><span style="font-style:italic">Itálica</span></button></div></div>
            <div class="row"><label>Texto col.</label><div class="colorfield"><span class="cswatch"><input type="color" value="#ffffff" data-textcolor></span><span class="chex">#FFFFFF</span></div></div>
            <div class="row"><label>Caja col.</label><div class="colorfield"><span class="cswatch"><input type="color" value="#1a1a2e" data-boxcolor></span><span class="chex">#1A1A2E</span></div></div>
            <div class="row"><label>Relleno</label><div class="rng"><input type="range" min="0" max="48" value="16" data-pad><output>16</output></div></div>
            <div class="row"><label>Radio</label><div class="rng"><input type="range" min="0" max="40" value="12" data-radius><output>12</output></div></div></div>
        </div>
      </div>`;
  }

  // ── VARIANT B — clusters + collapsible Caja/Glow ──
  function bodyB(){
    return listLead() + `<div class="editing-head"><span class="t">Título · ${sel().name}</span></div>
      <div class="ctrl-2col">
        <div class="colwrap">
          <div class="sec"><div class="sec-h"><span class="num">1</span>Posición</div>
            <div class="two"><div class="field"><span class="mini">X</span><input class="inp" value="300"></div><div class="field"><span class="mini">Y</span><input class="inp" value="170"></div></div>${presetGrid}</div>
          <div class="sec" style="margin-bottom:0"><div class="sec-h"><span class="num">2</span>Estilo</div>
            <div class="clab">Texto</div>
            <div class="row"><label>Texto</label><input class="inp" data-text value="${sel().name}"></div>
            <div style="margin-bottom:var(--s-6)">${fontGridHTML}</div>
            <div class="row"><label>Tamaño</label><div class="rng"><input type="range" min="20" max="120" value="56" data-size><output>56</output></div></div>
            <div class="row"><label>Estilo</label><div class="seg" data-weight><button>Reg</button><button class="on">Bold</button><button data-it><span style="font-style:italic">It</span></button></div></div>
            <div class="row"><label>Color</label><div class="colorfield"><span class="cswatch"><input type="color" value="#ffffff" data-textcolor></span><span class="chex">#FFFFFF</span></div></div></div>
        </div>
        <div class="colwrap">
          <div class="sec"><div class="sec-h"><span class="num">3</span>Caja &amp; efectos <span class="note">· entrada, fondo, glow</span></div>
            <div class="clab">Entrada</div>
            <div class="row"><label>Animación</label><select class="sel" data-animsel><option>Slide ↑</option><option>Slide ↓</option><option>Fade</option><option>Ninguna</option></select></div>
            <div class="clab">Caja</div>
            <div class="fx open" data-fx>
              <div class="fx-head"><span class="switch"></span><span class="fx-name">Fondo de caja</span><span class="fx-hint">activado</span></div>
              <div class="fx-params" style="display:block">
                <div class="row"><label>Color</label><div class="colorfield"><span class="cswatch"><input type="color" value="#1a1a2e" data-boxcolor></span><span class="chex">#1A1A2E</span></div></div>
                <div class="row"><label>Relleno</label><div class="rng"><input type="range" min="0" max="48" value="16" data-pad><output>16</output></div></div>
                <div class="row"><label>Radio</label><div class="rng"><input type="range" min="0" max="40" value="12" data-radius><output>12</output></div></div></div></div>
            <div class="clab">Efecto</div>
            ${glowFx}
            <div class="clab">Tiempo</div>
            <div class="row"><label>Aparece</label><input class="inp" value="0.0 s"></div>
            <div class="row"><label>Duración</label><input class="inp" value="3.0 s"></div></div>
        </div>
      </div>`;
  }

  // ── VARIANT C — specimen-led + entrance presets (mirrors 011-C) ──
  function bodyC(){
    return listLead() +
      `<div class="specimen fullbleed"><span class="sp-tag">vista en vivo</span><div class="pv-titlebox" data-spec></div></div>
       <div class="sec fullbleed"><div class="sec-h">Animación de entrada</div>${entranceCards}</div>
       <div class="editing-head"><span class="t">Título · ${sel().name}</span></div>
       <div class="ctrl-2col">
        <div class="colwrap">
          <div class="sec"><div class="sec-h"><span class="num">1</span>Tipografía</div>
            <div class="row"><label>Texto</label><input class="inp" data-text value="${sel().name}"></div>
            <div style="margin:var(--s-3) 0 var(--s-6)">${fontGridHTML}</div>
            <div class="row"><label>Tamaño</label><div class="rng"><input type="range" min="20" max="120" value="56" data-size><output>56</output></div></div>
            <div class="row"><label>Estilo</label><div class="seg" data-weight><button>Reg</button><button class="on">Bold</button><button data-it><span style="font-style:italic">It</span></button></div></div></div>
          <div class="sec" style="margin-bottom:0"><div class="sec-h"><span class="num">3</span>Posición</div>
            <div class="two"><div class="field"><span class="mini">X</span><input class="inp" value="300"></div><div class="field"><span class="mini">Y</span><input class="inp" value="170"></div></div>${presetGrid}</div>
        </div>
        <div class="colwrap">
          <div class="sec"><div class="sec-h"><span class="num">2</span>Caja &amp; color</div>
            <div class="cmatrix">
              <div class="crole"><span class="cswatch"><input type="color" value="#ffffff" data-textcolor></span><span class="rl">Texto</span></div>
              <div class="crole"><span class="cswatch"><input type="color" value="#1a1a2e" data-boxcolor></span><span class="rl">Caja</span></div></div>
            <div class="row" style="margin-top:var(--s-6)"><label>Relleno</label><div class="rng"><input type="range" min="0" max="48" value="16" data-pad><output>16</output></div></div>
            <div class="row"><label>Radio</label><div class="rng"><input type="range" min="0" max="40" value="12" data-radius><output>12</output></div></div></div>
          <div class="sec" style="margin-bottom:0"><div class="sec-h">Efectos <span class="note">· opcionales</span></div>${glowFx}</div>
        </div>
      </div>`;
  }

  function sel(){ return titles.find(t=>t.id===state[curVk].sel) || titles[0]; }
  let curVk = 'a';

  function listLead(){
    const v = state[curVk];
    return `<div class="listhead">Títulos <span class="cnt">${titles.length}</span></div>
      <div class="ovlist" data-list>` + titles.map(t=>
        `<div class="ovcard ${t.id===v.sel?'sel':''}" data-id="${t.id}"><span class="drag">⠿</span><span class="ovthumb">T</span>
          <div class="info"><div class="nm">${t.name}</div><div class="sub">X ${t.x} · Y ${t.y}</div></div></div>`).join('')
      + `</div><button class="addbtn">＋ Agregar título</button>`;
  }

  const BODY = { a:bodyA, b:bodyB, c:bodyC };
  const metaHTML = `<aside class="meta"><div class="meta-h"><div class="row1"><h2>Metadata de redes</h2><span class="soon">Próximamente</span></div>
      <p>Generada con IA desde la transcripción y los títulos.</p></div>
    <div class="meta-body ghost"><div><div class="gh-label">Título</div><div class="gh-box">El truco de edición que cambió mis reels</div></div>
      <div><div class="gh-label">Descripción</div><div class="gh-box"><div class="gh-line w90"></div><div class="gh-line w70"></div></div></div></div></aside>`;

  function render(vk){
    curVk = vk;
    document.getElementById('v-'+vk).innerHTML = `
      <header class="hdr">
        <div class="brand"><div class="glyph">R</div><div><h1>Reel Factory Studio</h1><div class="tag">Vertical 9:16 · Títulos</div></div></div>
        <div class="hdr-actions"><span class="save-chip"><span class="dot"></span>Cambios sin guardar</span><button class="btn">Guardar config</button><button class="render-cta"><span style="font-size:11px">▶</span>Render Video</button></div>
      </header>
      <div class="work">
        <section class="stage"><div class="phone" data-phone></div>
          <div class="stage-meta"><span class="pill">1080 × 1920</span><span class="pill">9:16</span><span class="pill">00:10</span></div></section>
        <section class="controls">
          <div class="tabs"><button class="tab sel">Títulos<span class="ct">2</span></button><button class="tab">Overlays<span class="ct">3</span></button><button class="tab">Subtítulos</button></div>
          <div class="ctrl-body">${BODY[vk]()}</div>
        </section>
        ${metaHTML}
      </div>`;
    wire(vk); sync(vk);
  }

  function sync(vk){
    const root = document.getElementById('v-'+vk);
    const text = root.querySelector('[data-text]')?.value || 'Cómo edité este reel';
    const size = +(root.querySelector('[data-size]')?.value || 56);
    const font = root.querySelector('.fontcard.on')?.dataset.font || "'Plus Jakarta Sans'";
    const wBtns = root.querySelector('[data-weight]');
    const onLabel = wBtns ? (wBtns.querySelector('button.on')?.textContent || 'Bold') : 'Bold';
    const bold = !/Reg/.test(onLabel);
    const italBtn = root.querySelector('[data-italic] button:last-child.on') || root.querySelector('[data-weight] [data-it].on');
    const italic = !!italBtn;
    const textColor = root.querySelector('[data-textcolor]')?.value || '#ffffff';
    const boxColor = root.querySelector('[data-boxcolor]')?.value || '#1a1a2e';
    const pad = +(root.querySelector('[data-pad]')?.value || 16);
    const radius = +(root.querySelector('[data-radius]')?.value || 12);

    function paint(el, scale){
      el.textContent = text;
      el.style.fontSize = (size*scale)+'px';
      el.style.fontFamily = font + ', sans-serif';
      el.style.fontWeight = bold ? 700 : 400;
      el.style.fontStyle = italic ? 'italic' : 'normal';
      el.style.color = textColor;
      el.style.background = boxColor;
      el.style.padding = (pad*scale)+'px '+(pad*scale*1.4)+'px';
      el.style.borderRadius = (radius*scale)+'px';
      el.style.backdropFilter = 'blur(3px)';
    }
    // phone title box
    const ph = root.querySelector('[data-phone]');
    ph.innerHTML = `<div class="pv-titlebox" style="top:9%"></div><div class="pv-cap"><span class="on">subtítulos</span> que enganchan</div>`;
    paint(ph.querySelector('.pv-titlebox'), 0.5);
    // specimen (C)
    const spec = root.querySelector('[data-spec]'); if (spec) paint(spec, 0.42);
  }

  function wire(vk){
    const root = document.getElementById('v-'+vk);
    root.querySelectorAll('[data-list] .ovcard').forEach(c=> c.onclick=()=>{ state[vk].sel=c.dataset.id; render(vk); });
    root.querySelectorAll('.seg').forEach(s=> s.querySelectorAll('button').forEach(b=> b.onclick=()=>{ s.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); sync(vk); }));
    root.querySelectorAll('.pgrid').forEach(g=> g.querySelectorAll('button').forEach(b=> b.onclick=()=>{ g.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); }));
    root.querySelectorAll('.fontgrid').forEach(g=> g.querySelectorAll('.fontcard').forEach(c=> c.onclick=()=>{ g.querySelectorAll('.fontcard').forEach(x=>x.classList.remove('on')); c.classList.add('on'); sync(vk); }));
    root.querySelectorAll('.modecards').forEach(g=> g.querySelectorAll('.modecard').forEach(c=> c.onclick=()=>{ g.querySelectorAll('.modecard').forEach(x=>x.classList.remove('on')); c.classList.add('on'); }));
    root.querySelectorAll('.rng input[type=range]').forEach(r=>{ const out=r.parentElement.querySelector('output'); r.oninput=()=>{ if(out) out.textContent=(r.min==='80'&&r.max==='200')?(r.value/100).toFixed(2):r.value; sync(vk); }; });
    root.querySelectorAll('input[type=color]').forEach(ci=> ci.oninput=()=>{ const hex=ci.closest('.colorfield')?.querySelector('.chex'); if(hex) hex.textContent=ci.value.toUpperCase(); sync(vk); });
    root.querySelectorAll('[data-text]').forEach(t=> t.oninput=()=>sync(vk));
    root.querySelectorAll('[data-fx] .fx-head').forEach(h=> h.onclick=()=>{ const fx=h.closest('.fx'); fx.classList.toggle('open'); h.querySelector('.fx-hint').textContent=fx.classList.contains('open')?'activado':'apagado'; });
  }

  ['a','b','c'].forEach(render);

  function show(id, btn){
    document.querySelectorAll('.variant').forEach(v=>v.classList.remove('active'));
    document.getElementById('v-'+id).classList.add('active');
    document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    curVk = id; sync(id);
  }
</script>
</body>
</html>
