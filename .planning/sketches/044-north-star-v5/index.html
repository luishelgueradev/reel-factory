<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sketch 044 — north-star v5 (the four newest laws composed)</title>
<link rel="stylesheet" href="../themes/default.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--font); background: var(--canvas); color: var(--text); font-size: var(--t-base); padding-top: 46px; -webkit-font-smoothing: antialiased; }
  .variant { display: none; height: calc(100vh - 46px); }
  .variant.active { display: flex; }
  @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @keyframes toastin { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes scrimin { from { opacity: 0; } to { opacity: 1; } }

  /* ─── rail (033-B) ─── */
  .rail { width: 56px; flex: none; background: var(--chrome); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: var(--s-6) 0; gap: var(--s-3); z-index: 10; }
  .rlogo { width: 30px; height: 30px; border-radius: var(--r-sm); background: linear-gradient(145deg, var(--accent), var(--accent-strong)); display: grid; place-items: center; font-weight: 800; color: var(--stage); margin-bottom: var(--s-6); }
  .railbtn { width: 40px; height: 40px; border-radius: var(--r-sm); border: none; background: none; color: var(--text-muted); cursor: pointer; display: grid; place-items: center; font-size: 17px; position: relative; transition: all var(--dur) var(--ease); }
  .railbtn:hover { background: var(--surface-2); color: var(--text); }
  .railbtn.on { background: var(--accent-tint); color: var(--accent); }
  .railbtn.on::before { content: ""; position: absolute; left: -8px; top: 8px; bottom: 8px; width: 3px; border-radius: 2px; background: var(--accent); }
  .railbtn .lab { position: absolute; left: 48px; top: 50%; transform: translateY(-50%); background: var(--surface); border: 1px solid var(--border-strong); color: var(--text); font-size: var(--t-xs); font-weight: 500; padding: 4px 9px; border-radius: var(--r-xs); white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity var(--dur); box-shadow: var(--shadow-md); z-index: 50; }
  .railbtn:hover .lab { opacity: 1; }
  .railbtn .tally { position: absolute; top: 2px; right: 2px; display: flex; gap: 2px; font-size: 8px; font-weight: 700; font-family: var(--mono); }
  .railbtn .tally .ok { color: var(--success); } .railbtn .tally .er { color: var(--danger); }
  .rail .rsp { flex: 1; }

  /* ─── header (one dense row, 037-B) ─── */
  .colwrap { display: flex; flex-direction: column; flex: 1; min-width: 0; position: relative; }
  .hdr { height: 52px; flex: none; display: flex; align-items: center; gap: var(--s-6); padding: 0 var(--s-10); background: var(--chrome); border-bottom: 1px solid var(--border); z-index: 6; }
  .preset { display: inline-flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 5px 10px 5px 8px; cursor: pointer; font-size: var(--t-sm); color: var(--text); white-space: nowrap; }
  .preset .pl { font-size: var(--t-2xs); color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; }
  .preset .pv { font-weight: 600; } .preset .mod { color: var(--warning); font-size: var(--t-2xs); font-weight: 600; } .preset .car { color: var(--text-muted); font-size: 10px; }
  .ctabs { display: flex; gap: var(--s-3); }
  .ctab { font-size: var(--t-xs); padding: 5px 11px; border-radius: var(--r-full); background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); cursor: pointer; transition: all var(--dur) var(--ease); }
  .ctab:hover { color: var(--text-2); }
  .ctab.on { background: var(--accent-tint); color: var(--accent); border-color: var(--accent-strong); }
  .spacer { flex: 1; }
  .chip { display: inline-flex; align-items: center; gap: 7px; font-size: var(--t-xs); font-weight: 600; padding: 5px 11px; border-radius: var(--r-full); background: var(--surface-2); color: var(--text-2); white-space: nowrap; }
  .chip .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .chip.dirty { color: var(--warning); }
  .btn { font: inherit; font-size: var(--t-md); font-weight: 600; padding: 8px 16px; border-radius: var(--r-sm); cursor: pointer; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 7px; transition: all var(--dur) var(--ease); }
  .btn-out { background: transparent; border-color: var(--border-strong); color: var(--text-2); } .btn-out:hover { background: var(--surface-2); color: var(--text); }
  .btn-green { background: var(--action); color: #08220f; } .btn-green:hover { background: var(--action-hover); }
  .btn-ghost { background: transparent; border-color: var(--border-faint); color: var(--text-faint); cursor: not-allowed; }

  /* ─── body: work columns + (optional) timeline strip ─── */
  .body { flex: 1; min-height: 0; display: flex; flex-direction: column; }
  .work { flex: 1; min-height: 0; display: flex; gap: 1px; background: var(--border-faint); }
  .col { background: var(--canvas); display: flex; flex-direction: column; min-height: 0; }
  .stagecol { flex: 0 1 380px; align-items: center; justify-content: center; background: var(--stage); padding: var(--s-10); position: relative; }
  .ctrlcol { flex: 1; padding: var(--s-8) var(--s-10); overflow-y: auto; }
  .metacol { flex: 0 0 224px; background: var(--surface); align-items: center; justify-content: center; padding: var(--s-8); }
  .metacol .soon { font-size: var(--t-xs); color: var(--text-faint); border: 1px dashed var(--border-strong); border-radius: var(--r-sm); padding: 10px 14px; text-align: center; line-height: 1.5; }

  /* the 9:16 stage as an EDITING canvas (042-C) with the live caption (025-C) */
  .canvas { width: 216px; height: 384px; border-radius: var(--r-md); background: linear-gradient(180deg, oklch(0.34 0.05 255), oklch(0.2 0.03 280)); box-shadow: var(--shadow-md); position: relative; overflow: hidden; }
  .canvas .ttl { position: absolute; top: 40px; left: 18px; text-align: center; font-weight: 700; font-size: 13px; background: rgba(0,0,0,.5); color: #fff; padding: 6px 10px; border-radius: 5px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.03em; }
  .canvas .png { position: absolute; top: 64px; left: 120px; width: 56px; height: 56px; border-radius: 6px;
    background-image: linear-gradient(45deg, oklch(0.4 0.02 280) 25%, transparent 25%), linear-gradient(-45deg, oklch(0.4 0.02 280) 25%, transparent 25%), linear-gradient(45deg, transparent 75%, oklch(0.4 0.02 280) 75%), linear-gradient(-45deg, transparent 75%, oklch(0.4 0.02 280) 75%);
    background-size: 10px 10px; background-position: 0 0, 0 5px, 5px -5px, -5px 0px; display: grid; place-items: center; }
  .canvas .png span { font-size: 9px; color: var(--text); font-weight: 700; background: oklch(0.2 0.02 280 / .8); padding: 1px 4px; border-radius: 3px; }
  .canvas .cap { position: absolute; bottom: 56px; left: 8px; right: 8px; text-align: center; font-weight: 800; font-size: 18px; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,.65); line-height: 1.25; }
  .canvas .cap .w { transition: color .12s var(--ease); } .canvas .cap .w.lit { color: var(--accent); }
  /* selection ring + handles (042-C: handles for size) */
  .sel { outline: 1.5px solid var(--accent); outline-offset: 2px; }
  .handle { position: absolute; width: 9px; height: 9px; background: var(--surface); border: 1.5px solid var(--accent); border-radius: 2px; z-index: 6; }
  .handle.nw { left: -6px; top: -6px; } .handle.ne { right: -6px; top: -6px; } .handle.sw { left: -6px; bottom: -6px; } .handle.se { right: -6px; bottom: -6px; }
  /* 9-anchor field (042-C: position snaps to anchors) */
  .anchor { position: absolute; width: 7px; height: 7px; border-radius: 50%; border: 1px solid var(--accent); transform: translate(-50%, -50%); opacity: .32; pointer-events: none; z-index: 3; }
  .anchor.hot { opacity: 1; background: var(--accent); box-shadow: 0 0 0 4px var(--accent-tint); }
  /* layer-chip stack for overlap (042-C) */
  .layerchip { position: absolute; top: 6px; right: 6px; display: flex; flex-direction: column; gap: 3px; z-index: 7; }
  .layerchip .lc { width: 22px; height: 18px; border-radius: 4px; background: oklch(0.2 0.02 280 / .85); border: 1px solid var(--border-strong); font-size: 9px; color: var(--text-2); display: grid; place-items: center; cursor: pointer; }
  .layerchip .lc.cur { border-color: var(--accent); color: var(--accent); }
  .canvas-note { position: absolute; bottom: 8px; left: 0; right: 0; text-align: center; font-size: var(--t-2xs); color: var(--text-faint); }

  .transport { display: flex; align-items: center; gap: var(--s-4); margin-top: var(--s-6); width: 216px; }
  .transport .pbtn { width: 26px; height: 26px; border-radius: 50%; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); display: grid; place-items: center; cursor: pointer; font-size: 11px; }
  .transport .track { flex: 1; height: 4px; border-radius: 2px; background: var(--surface-2); position: relative; overflow: hidden; }
  .transport .track i { position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent); border-radius: 2px; }
  .transport .tt { font-size: var(--t-2xs); color: var(--text-faint); font-family: var(--mono); }

  /* error: Whisper-down panel over the dimmed stage (040-A) */
  .stage-fault { position: absolute; inset: 0; background: oklch(0.165 0.022 280 / .82); display: none; flex-direction: column; align-items: center; justify-content: center; gap: var(--s-5); padding: var(--s-10); text-align: center; z-index: 8; }
  .stage-fault.show { display: flex; animation: fadein .18s var(--ease); }
  .stage-fault .fi { width: 38px; height: 38px; border-radius: 50%; display: grid; place-items: center; background: oklch(0.63 0.185 25 / .14); color: var(--danger); font-size: 19px; }
  .stage-fault .ft { font-size: var(--t-md); font-weight: 600; color: var(--text); }
  .stage-fault .fd { font-size: var(--t-xs); color: var(--text-2); max-width: 240px; line-height: 1.5; }
  .stage-fault .fcause { font-family: var(--mono); font-size: var(--t-2xs); color: var(--text-muted); background: oklch(0.2 0.02 280 / .7); padding: 4px 8px; border-radius: var(--r-xs); }
  .stage-fault .fok { font-size: var(--t-2xs); color: var(--success); }

  /* control-tab body (Subtitles, dense, 011-C) */
  .seclead { display: flex; align-items: center; gap: var(--s-5); margin-bottom: var(--s-6); }
  .specimen { flex: 1; height: 56px; border-radius: var(--r-sm); background: oklch(0.22 0.03 280); border: 1px solid var(--border); display: grid; place-items: center; position: relative; overflow: hidden; }
  .specimen .sc { font-weight: 800; font-size: 16px; color: #fff; } .specimen .sc .w { transition: color .12s var(--ease); } .specimen .sc .w.lit { color: var(--accent); }
  .specimen .badge { position: absolute; top: 5px; left: 7px; font-size: 8px; color: var(--text-faint); letter-spacing: 0.06em; text-transform: uppercase; }
  .seclabel { font-size: var(--t-2xs); color: var(--text-muted); letter-spacing: 0.07em; text-transform: uppercase; margin: var(--s-8) 0 var(--s-5); display: flex; align-items: center; gap: 6px; }
  .seclabel::after { content: ""; flex: 1; height: 1px; background: var(--border-faint); }
  .presetgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; width: 96px; }
  .pcell { aspect-ratio: 1; border: 1px solid var(--border); border-radius: var(--r-xs); display: grid; place-items: center; font-size: 11px; color: var(--text-muted); cursor: pointer; background: var(--surface); }
  .pcell:hover { border-color: var(--border-strong); color: var(--text-2); } .pcell.on { border-color: var(--accent-strong); background: var(--accent-tint); color: var(--accent); }
  .posrow { display: flex; gap: var(--s-6); align-items: flex-start; }
  .form2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-5) var(--s-6); flex: 1; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: var(--t-2xs); color: var(--text-muted); }
  .field .inp { height: 30px; border-radius: var(--r-sm); background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; padding: 0 9px; font-size: var(--t-sm); color: var(--text-2); }
  .colormatrix { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-4); }
  .swatchrow { display: flex; align-items: center; gap: var(--s-4); font-size: var(--t-xs); color: var(--text-2); }
  .swatchrow .sw { width: 22px; height: 22px; border-radius: var(--r-xs); border: 1px solid var(--border-strong); flex: none; }
  .effectrow { display: flex; align-items: center; justify-content: space-between; height: 34px; border-top: 1px solid var(--border-faint); font-size: var(--t-sm); color: var(--text-2); }
  .effectrow .tog { width: 32px; height: 18px; border-radius: var(--r-full); background: var(--surface-2); position: relative; cursor: pointer; }
  .effectrow .tog.on { background: var(--accent-strong); } .effectrow .tog i { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: #fff; transition: left var(--dur) var(--ease); } .effectrow .tog.on i { left: 16px; }

  /* ─── timeline strip (020-C) with intro/outro endcaps (043-B) ─── */
  .timeline { flex: none; background: var(--canvas); border-top: 1px solid var(--border); padding: var(--s-5) var(--s-10) var(--s-6); }
  .timeline.collapsed { padding: 0; }
  .tl-collapsed-bar { height: 30px; display: flex; align-items: center; gap: var(--s-5); font-size: var(--t-2xs); color: var(--text-muted); cursor: pointer; }
  .tl-collapsed-bar:hover { color: var(--text-2); }
  .tl-head { display: flex; align-items: center; gap: var(--s-5); margin-bottom: var(--s-4); }
  .tl-head .tlab { font-size: var(--t-2xs); color: var(--text-muted); letter-spacing: 0.07em; text-transform: uppercase; }
  .tl-head .collapse { margin-left: auto; font-size: var(--t-2xs); color: var(--text-faint); cursor: pointer; }
  .tl-row { display: flex; align-items: stretch; gap: 4px; height: 22px; margin-bottom: 4px; }
  .tl-row .rk { width: 70px; flex: none; font-size: var(--t-2xs); color: var(--text-muted); display: flex; align-items: center; }
  .tl-track { flex: 1; display: flex; gap: 3px; position: relative; }
  .endcap { flex: none; width: 42px; border-radius: var(--r-xs); display: grid; place-items: center; font-size: 8px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; border: 1px solid; }
  .endcap.intro { background: oklch(0.3 0.05 300 / .35); border-color: oklch(0.5 0.08 300); color: oklch(0.82 0.07 300); }
  .endcap.outro { background: oklch(0.3 0.05 300 / .35); border-color: oklch(0.5 0.08 300); color: oklch(0.82 0.07 300); }
  .endcap.dormant { background: transparent; border-style: dashed; border-color: var(--border-strong); color: var(--text-faint); }
  .tl-body { flex: 1; border-radius: var(--r-xs); background: var(--surface-2); position: relative; }
  .tl-blk { position: absolute; top: 3px; bottom: 3px; border-radius: 3px; background: var(--accent-tint); border: 1px solid var(--accent-strong); font-size: 8px; color: var(--accent); display: grid; place-items: center; }
  .tl-play { position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--text); border-radius: 2px; z-index: 4; }
  .tl-play::before { content: ""; position: absolute; top: -4px; left: -3px; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 5px solid var(--text); }

  /* ─── z-ladder demo (041-B): toast 60 ▸ sheet 20 + scrim ─── */
  .scrim { position: absolute; inset: 0; background: oklch(0.12 0.02 280 / .5); z-index: 20; display: none; animation: scrimin .16s var(--ease); }
  .scrim.show { display: block; }
  .sheet { position: absolute; top: 0; right: 0; bottom: 0; width: 300px; background: var(--surface); border-left: 1px solid var(--border-strong); box-shadow: var(--shadow-pop); z-index: 21; transform: translateX(100%); transition: transform .22s var(--ease); display: flex; flex-direction: column; }
  .sheet.show { transform: none; }
  .sheet .sh-hd { height: 46px; flex: none; display: flex; align-items: center; gap: 8px; padding: 0 var(--s-8); border-bottom: 1px solid var(--border); font-weight: 600; font-size: var(--t-md); }
  .sheet .sh-hd .x { margin-left: auto; color: var(--text-muted); cursor: pointer; font-size: 16px; }
  .sheet .sh-bd { padding: var(--s-8); overflow-y: auto; font-size: var(--t-sm); color: var(--text-2); line-height: 1.6; }
  .toast { position: absolute; bottom: 16px; right: 16px; z-index: 60; background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--r-md); box-shadow: var(--shadow-pop); padding: var(--s-5) var(--s-6); display: none; align-items: center; gap: var(--s-5); font-size: var(--t-sm); animation: toastin .2s var(--ease); max-width: 290px; }
  .toast.show { display: flex; }
  .toast .ti { width: 24px; height: 24px; border-radius: 50%; background: oklch(0.72 0.14 150 / .16); color: var(--success); display: grid; place-items: center; flex: none; }
  .toast .tx b { color: var(--text); font-weight: 600; } .toast .tx { color: var(--text-2); }
  .toast .ta { margin-left: 4px; color: var(--accent); font-weight: 600; cursor: pointer; font-size: var(--t-xs); }

  /* per-variant control strip on the stage to demo the laws */
  .lawbar { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; gap: 6px; flex-wrap: wrap; z-index: 9; }
  .lawbtn { font: inherit; font-size: 9.5px; font-weight: 600; padding: 4px 8px; border-radius: var(--r-full); background: oklch(0.2 0.02 280 / .8); border: 1px solid var(--border-strong); color: var(--text-2); cursor: pointer; }
  .lawbtn:hover { border-color: var(--accent-strong); color: var(--accent); }

  .vhint { font-size: var(--t-2xs); color: var(--text-faint); padding: var(--s-4) var(--s-10); text-align: center; border-top: 1px solid var(--border-faint); background: var(--canvas); flex: none; line-height: 1.5; }
  .vhint b { color: var(--text-muted); }

  #vnav { position: fixed; top: 0; left: 0; right: 0; height: 46px; z-index: 9998; background: var(--chrome); border-bottom: 1px solid var(--border-strong); display: flex; align-items: center; gap: var(--s-4); padding: 0 var(--s-10); font-size: var(--t-sm); }
  #vnav .lbl { color: var(--text-muted); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; font-size: var(--t-2xs); margin-right: var(--s-4); }
  .vtab { font: inherit; font-size: var(--t-sm); color: var(--text-2); background: var(--surface); border: 1px solid var(--border); padding: 5px 12px; border-radius: var(--r-full); cursor: pointer; }
  .vtab.active { background: var(--accent-tint); border-color: var(--accent-strong); color: var(--accent); font-weight: 600; }
  #vnav .hint { margin-left: auto; color: var(--text-faint); font-size: var(--t-2xs); }
  #tools { position: fixed; bottom: 12px; left: 12px; z-index: 9999; font-family: system-ui; font-size: 11px; background: rgba(0,0,0,0.72); color: #fff; padding: 7px 10px; border-radius: 8px; opacity: 0.4; display: flex; gap: 8px; transition: opacity .2s; }
  #tools:hover { opacity: 1; } #tools select { font: inherit; background: #222; color: #fff; border: 1px solid #555; border-radius: 4px; }
</style>
</head>
<body>

<nav id="vnav">
  <span class="lbl">Sketch 044 · north-star v5</span>
  <button class="vtab" onclick="show('a',this)">A · Máxima (todo encendido)</button>
  <button class="vtab active" onclick="show('b',this)">B ★ · Slice comprometido</button>
  <button class="vtab" onclick="show('c',this)">C · Progresiva (un afford. a la vez)</button>
  <span class="hint">¿Cohesionan 040 (errores) · 041 (escalera-z) · 042 (handles) · 043 (intro/outro) en la pantalla canónica? ¿Se satura el lienzo?</span>
</nav>

<!-- shared dynamic editor injected per-variant by JS -->
<div class="variant" id="v-a"></div>
<div class="variant active" id="v-b"></div>
<div class="variant" id="v-c"></div>

<div id="tools"><span>theme</span>
  <select onchange="document.querySelector('link[href*=themes]').href='../themes/'+this.value+'.css'"><option value="default">default</option></select>
</div>

<script>
const WORDS = ['así','editás','tus','reels','en','minutos'];
let frame = 0, playing = true;
function paintCaption(){
  const lit = frame % WORDS.length;
  const html = WORDS.map((w,i)=>`<span class="w${i===lit?' lit':''}">${w}</span>`).join(' ');
  document.querySelectorAll('.variant.active .cap, .variant.active .specimen .sc').forEach(el=>el.innerHTML = html);
  document.querySelectorAll('.variant.active .transport .track i').forEach(i=>i.style.width = `${(lit+1)/WORDS.length*100}%`);
  document.querySelectorAll('.variant.active .transport .tt').forEach(t=>t.textContent = `0:0${Math.min(9,lit+1)} / 0:14`);
  document.querySelectorAll('.variant.active .tl-play').forEach(p=>p.style.left = `${20+(lit/WORDS.length)*55}%`);
}
setInterval(()=>{ if(playing){ frame++; paintCaption(); } }, 620);

// ─── stage variants ───
// A: everything live at once. B: committed slice (calm). C: progressive (nothing extra until selected).
function stage(v){
  const selPng = v==='a';                    // A shows a selected PNG with handles
  const showAnchors = v==='a';               // A shows the 9-anchor field live
  const showChips = v==='a';                 // A shows the layer-chip stack
  let h = `<div class="canvas">`;
  if(showAnchors){ const A=[[.2,.18],[.5,.18],[.8,.18],[.2,.5],[.5,.5],[.8,.5],[.2,.82],[.5,.82],[.8,.82]];
    h += A.map((a,i)=>`<div class="anchor ${i===5?'hot':''}" style="left:${a[0]*100}%;top:${a[1]*100}%"></div>`).join(''); }
  h += `<div class="ttl">3 trucos de edición</div>`;
  h += `<div class="png ${selPng?'sel':''}"><span>LOGO</span>${selPng?'<div class="handle nw"></div><div class="handle ne"></div><div class="handle sw"></div><div class="handle se"></div>':''}</div>`;
  if(showChips){ h += `<div class="layerchip"><div class="lc cur">▣</div><div class="lc">T</div></div>`; }
  h += `<div class="cap"></div>`;
  if(v==='c'){ h += `<div class="canvas-note">Clic en un elemento para editar · sus handles aparecen al seleccionar</div>`; }
  // 040: Whisper-down fault layer (toggled)
  h += `<div class="stage-fault" id="fault-${v}">
      <div class="fi">⚠</div>
      <div class="ft">Transcripción no disponible</div>
      <div class="fd">El servicio Whisper no responde. El resto del editor sigue funcionando: podés ajustar estilos y volver a intentar.</div>
      <div class="fcause">ECONNREFUSED · whisper-api:8001</div>
      <div class="fok">✓ títulos, overlays y render quedan disponibles</div>
      <button class="btn btn-out btn-sm" style="font-size:var(--t-xs);padding:5px 11px" onclick="toggleFault('${v}')">Reintentar transcripción</button>
    </div>`;
  h += `</div>`;
  return h;
}

function ctrlBody(){
  return `<div class="seclead"><div class="specimen"><span class="badge">muestra · loop</span><div class="sc"></div></div></div>
    <div class="seclabel">Posición</div>
    <div class="posrow">
      <div class="presetgrid">${[0,1,2,3,4,5,6,7,8].map(i=>`<div class="pcell ${i===7?'on':''}">${['↖','↑','↗','←','•','→','↙','↓','↘'][i]}</div>`).join('')}</div>
      <div class="form2"><div class="field"><label>X (px)</label><div class="inp">540</div></div><div class="field"><label>Y (px)</label><div class="inp">1560</div></div></div>
    </div>
    <div class="seclabel">Colores</div>
    <div class="colormatrix">
      <div class="swatchrow"><span class="sw" style="background:#fff"></span>Texto</div>
      <div class="swatchrow"><span class="sw" style="background:var(--accent)"></span>Resaltado</div>
      <div class="swatchrow"><span class="sw" style="background:#0a0a14"></span>Contorno</div>
      <div class="swatchrow"><span class="sw" style="background:transparent"></span>Fondo</div>
    </div>
    <div class="seclabel">Efectos</div>
    <div class="effectrow"><span>Glow</span><div class="tog on" onclick="this.classList.toggle('on')"><i></i></div></div>
    <div class="effectrow"><span>Caja de fondo</span><div class="tog" onclick="this.classList.toggle('on')"><i></i></div></div>`;
}

// timeline state per variant: A = expanded + intro/outro endcaps live; B = collapsed; C = expanded but endcaps dormant
function timeline(v){
  if(v==='b'){ return `<div class="timeline collapsed"><div class="tl-collapsed-bar" onclick="alert('(demo) la línea de tiempo se expande aquí — 020-C frontier')">▸ Línea de tiempo &nbsp;·&nbsp; <span style="color:var(--text-faint)">colapsada (slice comprometido)</span></div></div>`; }
  const dormant = v==='c';
  const cap = (cls,lab)=>`<div class="endcap ${cls} ${dormant?'dormant':''}" title="${dormant?'intro/outro dormido — Fase 6, sin sección en pipeline-config.json':'tap para configurar'}">${lab}</div>`;
  return `<div class="timeline">
    <div class="tl-head"><span class="tlab">Línea de tiempo</span>
      ${dormant?'<span style="font-size:var(--t-2xs);color:var(--text-faint)">intro/outro: capacidad dormida (043) — punteadas</span>':'<span style="font-size:var(--t-2xs);color:oklch(0.82 0.07 300)">intro/outro como endcaps (043-B)</span>'}
      <span class="collapse">colapsar ▾</span></div>
    <div class="tl-row"><div class="rk">Clip</div><div class="tl-track">${cap('intro','Intro')}<div class="tl-body"><div class="tl-blk" style="left:30%;width:24%">Título</div><div class="tl-play"></div></div>${cap('outro','Outro')}</div></div>
    <div class="tl-row"><div class="rk">Subtítulos</div><div class="tl-track"><div style="width:42px;flex:none"></div><div class="tl-body" style="background:var(--accent-tint-2)"></div><div style="width:42px;flex:none"></div></div></div>
  </div>`;
}

function lawbar(v){
  // the demo controls to exercise the laws on each variant
  return `<div class="lawbar">
    <button class="lawbtn" onclick="toggleFault('${v}')">▸ 040 · simular Whisper caído</button>
    <button class="lawbtn" onclick="openSheet('${v}')">▸ 041 · abrir ⚙ sheet (escalera-z)</button>
    <button class="lawbtn" onclick="fireToast('${v}')">▸ 041 · disparar toast (z60)</button>
  </div>`;
}

function editor(v){
  const hdr = `<header class="hdr">
      <div class="preset"><span class="pl">Estilo</span><span class="pv">Mi estilo TikTok</span><span class="mod">· Modificado</span><span class="car">▾</span></div>
      <div class="ctabs" style="margin-left:var(--s-6)"><span class="ctab">Títulos</span><span class="ctab on">Subtítulos</span><span class="ctab">Overlays</span></div>
      <div class="spacer"></div>
      <span class="ctab" style="margin-right:var(--s-6)">Video</span>
      <span class="chip dirty"><span class="dot"></span>Sin guardar</span>
      <button class="btn btn-out">Guardar</button>
      <button class="btn btn-green">▶ Render</button>
    </header>`;
  return `<nav class="rail">
      <div class="rlogo">R</div>
      <button class="railbtn on">✎<span class="lab">Editor</span></button>
      <button class="railbtn">≣<span class="lab">Cola · 1 en proceso</span><span class="tally"><span class="ok">✓3</span><span class="er">✕1</span></span></button>
      <button class="railbtn">✓<span class="lab">Resultados</span></button>
      <div class="rsp"></div>
      <button class="railbtn">⚙<span class="lab">Procesamiento</span></button>
      <button class="railbtn">?<span class="lab">Ayuda · ⌘K</span></button>
    </nav>
    <div class="colwrap">
      ${hdr}
      <div class="body">
        <div class="work">
          <div class="col stagecol">
            ${lawbar(v)}
            ${stage(v)}
            <div class="transport"><div class="pbtn" onclick="playing=!playing;this.textContent=playing?'❚❚':'▶'">❚❚</div><div class="track"><i></i></div><span class="tt"></span></div>
          </div>
          <div class="col ctrlcol">${ctrlBody()}</div>
          <div class="col metacol"><div class="soon">Metadata de redes<br>— próximamente —</div></div>
        </div>
        ${timeline(v)}
      </div>
      <div class="vhint" id="vhint-${v}"></div>
      <!-- z-ladder surfaces (scoped per variant colwrap) -->
      <div class="scrim" id="scrim-${v}" onclick="closeSheet('${v}')"></div>
      <div class="sheet" id="sheet-${v}">
        <div class="sh-hd">⚙ Procesamiento <span class="x" onclick="closeSheet('${v}')">✕</span></div>
        <div class="sh-bd">Sheet de ejemplo (z20 + scrim). <b>041-B:</b> un toast (z60) puede aparecer encima sin cerrar este sheet; Esc cierra el sheet. La escalera-z gobierna toast ▸ palette ▸ takeover ▸ sheet.</div>
      </div>
    </div>`;
}

const VHINTS = {
  a: 'A — <b>máxima</b>: handles + 9 anclas + chips de capa + caption animado + endcaps intro/outro + timeline, todo encendido a la vez. El test de saturación: ¿el lienzo se lee o se ahoga? Es el "north-star frontier" (todas las capas activas).',
  b: 'B — <b>slice comprometido</b> (lo que sale primero): caption vivo + clic-para-seleccionar (sin handles hasta seleccionar), timeline colapsada, intro/outro dormido. Las capas frontier (042 handles · 043 endcaps) están presentes pero en reposo. Sigue la tradición A↔B de 015/023/027/037.',
  c: 'C — <b>progresiva</b>: un afford. a la vez. Nada extra en el lienzo hasta que seleccionás; el timeline se expande on-demand; intro/outro punteado (dormido). La respuesta "disciplina" a la saturación de A.'
};

['a','b','c'].forEach(v=>{ document.getElementById('v-'+v).innerHTML = editor(v); document.getElementById('vhint-'+v).innerHTML = VHINTS[v]; });
paintCaption();

function toggleFault(v){ document.getElementById('fault-'+v).classList.toggle('show'); }
function openSheet(v){ document.getElementById('scrim-'+v).classList.add('show'); document.getElementById('sheet-'+v).classList.add('show'); }
function closeSheet(v){ document.getElementById('scrim-'+v).classList.remove('show'); document.getElementById('sheet-'+v).classList.remove('show'); }
let toastTimers = {};
function fireToast(v){
  let t = document.getElementById('toast-'+v);
  if(!t){ t = document.createElement('div'); t.className='toast'; t.id='toast-'+v; t.innerHTML='<div class="ti">✓</div><div class="tx"><b>Reel listo</b> · 3 trucos de edición.mp4 <span class="ta">Abrir</span></div>'; document.getElementById('v-'+v).querySelector('.colwrap').appendChild(t); }
  t.classList.add('show'); clearTimeout(toastTimers[v]); toastTimers[v]=setTimeout(()=>t.classList.remove('show'), 5000);
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ document.querySelectorAll('.scrim.show').forEach(s=>s.classList.remove('show')); document.querySelectorAll('.sheet.show').forEach(s=>s.classList.remove('show')); } });

function show(id, btn){
  document.querySelectorAll('.variant').forEach(v=>v.classList.remove('active'));
  document.getElementById('v-'+id).classList.add('active');
  document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active'); paintCaption();
}
</script>
</body>
</html>
