x-pipeline-common: &pipeline-common
  volumes:
    - ./pipeline:/data/pipeline
  networks:
    - pipeline-net
  user: "${UID:-1000}:${GID:-1000}"
  environment:
    - HOME=/data/pipeline/.cache

services:
  base-python:
    build:
      context: ./services/base-python
    image: video-pipeline-base-python:latest

  base-node:
    build:
      context: ./services/base-node
    image: video-pipeline-base-node:latest

  smoke-test:
    <<: *pipeline-common
    build:
      context: ./services/smoke-test
    depends_on:
      base-python:
        condition: service_completed_successfully
    environment:
      - INPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/input/video.mp4
      - OUTPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/smoke-test/output/video.mp4
      - PIPELINE_JOB_ID=${PIPELINE_JOB_ID}

  # ═════════════════════════════════════════════════════
  # Pipeline Step Services
  # Each step uses the x-pipeline-common extension for shared volume/network config.
  # Steps are chained with depends_on + healthcheck (D-08, D-09).
  # To add a new step: insert a service in the chain with depends_on the previous step.
  # Existing step configurations do NOT need modification (PIPE-04).
  # ═════════════════════════════════════════════════════

  # Step 1: Whisper Transcription (Phase 2)
  whisper:
    <<: *pipeline-common
    build:
      context: ./services/whisper
      dockerfile: Dockerfile
    depends_on:
      base-python:
        condition: service_completed_successfully
    environment:
      - INPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/input/video.mp4
      - OUTPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/whisper/transcript.json
      - PIPELINE_JOB_ID=${PIPELINE_JOB_ID}
      - HF_HOME=/data/pipeline/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "test", "-f", "/data/pipeline/${PIPELINE_JOB_ID}/whisper/manifest.json"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Silence Cutter: runs BEFORE whisper in the new pipeline order.
  # TRANSCRIPT_PATH is optional — if not set, uses FFmpeg-only mode.
  silence-cutter:
    <<: *pipeline-common
    build:
      context: ./services/silence-cutter
    depends_on:
      base-python:
        condition: service_completed_successfully
    environment:
      - INPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/input/video.mp4
      - OUTPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/silence-cutter/output.mp4
      - PIPELINE_JOB_ID=${PIPELINE_JOB_ID}
      - TRANSCRIPT_PATH=${TRANSCRIPT_PATH:-}
      - SILENCE_MIN_DURATION=${SILENCE_MIN_DURATION:-0.5}
      - SILENCE_CUT_SHRINK=${SILENCE_CUT_SHRINK:-0.4}
    healthcheck:
      test: ["CMD", "test", "-f", "/data/pipeline/${PIPELINE_JOB_ID}/silence-cutter/manifest.json"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Remotion Renderer: adds TikTok-style animated subtitles to video
  remotion-renderer:
    <<: *pipeline-common
    build:
      context: ./services/remotion-renderer
    depends_on:
      base-node:
        condition: service_completed_successfully
    environment:
      - INPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/silence-cutter/output.mp4
      - OUTPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/remotion-renderer/output.mp4
      - PIPELINE_JOB_ID=${PIPELINE_JOB_ID}
      - TRANSCRIPT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/whisper/transcript.json
      - ACTIVE_COLOR=${ACTIVE_COLOR:-#FFFF00}
      - INACTIVE_COLOR=${ACTIVE_COLOR:-#FFFFFF}
      - FONT_SIZE=${FONT_SIZE:-58}

  # FFmpeg Finalizer: converts to 9:16 vertical (1080x1920) with center-crop
  ffmpeg-finalizer:
    <<: *pipeline-common
    build:
      context: ./services/ffmpeg-finalizer
    depends_on:
      base-python:
        condition: service_completed_successfully
    environment:
      - INPUT_PATH=${FINALIZER_INPUT_PATH:-/data/pipeline/${PIPELINE_JOB_ID}/silence-cutter/output.mp4}
      - OUTPUT_PATH=/data/pipeline/${PIPELINE_JOB_ID}/ffmpeg-finalizer/output.mp4
      - PIPELINE_JOB_ID=${PIPELINE_JOB_ID}
      - VERTICAL_WIDTH=${VERTICAL_WIDTH:-1080}
      - VERTICAL_HEIGHT=${VERTICAL_HEIGHT:-1920}
      - CROP_STRATEGY=${CROP_STRATEGY:-center}
    healthcheck:
      test: ["CMD", "test", "-f", "/data/pipeline/${PIPELINE_JOB_ID}/ffmpeg-finalizer/manifest.json"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  pipeline-net:
    driver: bridge