<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sketch 047 — shell responsive ladder (the whole 3-col + rail collapse sequence)</title>
<link rel="stylesheet" href="../themes/default.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--canvas); color: var(--text); font-size: var(--t-base); padding-top: 46px; -webkit-font-smoothing: antialiased; }
  .variant { display: none; }
  .variant.active { display: block; }

  .wrap { max-width: 1000px; margin: 0 auto; padding: var(--s-12) var(--s-8) 80px; }
  .lede h1 { font-size: var(--t-xl); font-weight: 700; margin-bottom: var(--s-3); }
  .lede p { font-size: var(--t-sm); color: var(--text-2); max-width: 72ch; line-height: 1.6; }
  .lede .rule { display: inline-block; margin-top: var(--s-5); font-size: var(--t-xs); color: var(--text-2); background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); padding: var(--s-4) var(--s-6); line-height: 1.6; }
  .lede .rule b { color: var(--accent); }

  .frames { margin-top: var(--s-12); display: flex; flex-direction: column; gap: var(--s-12); align-items: center; }
  .framewrap { width: 100%; }
  .framelabel { display: flex; align-items: baseline; gap: var(--s-5); margin-bottom: var(--s-4); }
  .framelabel .fw { font-size: var(--t-md); font-weight: 600; color: var(--text); }
  .framelabel .bp { font-size: var(--t-2xs); font-family: var(--mono); color: var(--accent); }
  .framelabel .fd { font-size: var(--t-2xs); color: var(--text-muted); margin-left: auto; }

  /* a "device frame" — the shell at a given width */
  .frame { border: 1px solid var(--border-strong); border-radius: var(--r-md); overflow: hidden; box-shadow: var(--shadow-md); background: var(--canvas); margin: 0 auto; }
  .frame.lg { width: 880px; } .frame.md { width: 600px; } .frame.sm { width: 340px; }

  /* shell pieces (mini) */
  .shell { display: flex; height: 300px; }
  .frame.sm .shell { height: 380px; }
  .rail { width: 38px; flex: none; background: var(--chrome); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 8px 0; gap: 5px; }
  .rail .rl { width: 22px; height: 22px; border-radius: 5px; background: linear-gradient(145deg, var(--accent), var(--accent-strong)); margin-bottom: 6px; }
  .rail .rb { width: 26px; height: 26px; border-radius: 5px; display: grid; place-items: center; font-size: 12px; color: var(--text-muted); }
  .rail .rb.on { background: var(--accent-tint); color: var(--accent); }
  .rail .sp { flex: 1; }

  .hdr { height: 34px; flex: none; display: flex; align-items: center; gap: 8px; padding: 0 12px; background: var(--chrome); border-bottom: 1px solid var(--border); font-size: 10px; }
  .hdr .tabs { display: flex; gap: 4px; }
  .hdr .tb { font-size: 9px; padding: 3px 7px; border-radius: 999px; background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); }
  .hdr .tb.on { background: var(--accent-tint); color: var(--accent); border-color: var(--accent-strong); }
  .hdr .sp { flex: 1; }
  .hdr .gn { font-size: 9px; font-weight: 600; padding: 4px 9px; border-radius: 5px; background: var(--action); color: #08220f; }
  .hdr .ob { font-size: 9px; padding: 4px 9px; border-radius: 5px; border: 1px solid var(--border-strong); color: var(--text-2); }
  .colwrap { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  .work { flex: 1; display: flex; gap: 1px; background: var(--border-faint); min-height: 0; }
  .col { background: var(--canvas); }
  .stagecol { flex: 0 1 200px; background: var(--stage); display: grid; place-items: center; min-width: 0; }
  .stage9 { width: 96px; height: 170px; border-radius: 6px; background: linear-gradient(180deg, oklch(0.34 0.05 255), oklch(0.2 0.03 280)); position: relative; }
  .stage9 .cp { position: absolute; bottom: 18px; left: 6px; right: 6px; text-align: center; font-size: 9px; font-weight: 800; color: #fff; }
  .stage9 .cp b { color: var(--accent); }
  .ctrlcol { flex: 1; padding: 10px; overflow: hidden; min-width: 0; }
  .ctrlcol .cl { font-size: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 6px; }
  .ctrlcol .cgrid { display: grid; gap: 6px; }
  .ctrlcol .cgrid.two { grid-template-columns: 1fr 1fr; }
  .ctrlcol .cgrid.one { grid-template-columns: 1fr; }
  .ctrlcol .cf { height: 22px; border-radius: 5px; background: var(--surface); border: 1px solid var(--border); }
  .metacol { flex: 0 0 150px; background: var(--surface); display: grid; place-items: center; padding: 10px; }
  .metacol .ph { font-size: 8px; color: var(--text-faint); border: 1px dashed var(--border-strong); border-radius: 5px; padding: 8px; text-align: center; line-height: 1.5; }

  /* collapsed-metadata toggle tab (when metadata folds) */
  .metatab { flex: none; width: 22px; background: var(--surface); border-left: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .metatab span { writing-mode: vertical-rl; font-size: 8px; color: var(--text-muted); letter-spacing: 0.05em; transform: rotate(180deg); }

  /* stacked work (narrow): preview on top, controls below */
  .work.stack { flex-direction: column; }
  .work.stack .stagecol { flex: none; height: 150px; }
  .work.stack .ctrlcol { flex: 1; }

  /* bottom bar (rail → bottom at smallest) */
  .botbar { height: 40px; flex: none; background: var(--chrome); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-around; padding: 0 8px; }
  .botbar .bb { width: 28px; height: 28px; border-radius: 6px; display: grid; place-items: center; font-size: 13px; color: var(--text-muted); }
  .botbar .bb.on { background: var(--accent-tint); color: var(--accent); }

  .change { margin-top: var(--s-4); font-size: var(--t-2xs); color: var(--text-muted); display: flex; gap: var(--s-6); flex-wrap: wrap; }
  .change .pill { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-full); padding: 3px 9px; }
  .change .pill b { color: var(--accent); }

  .vhint { max-width: 1000px; margin: var(--s-12) auto 0; font-size: var(--t-2xs); color: var(--text-faint); text-align: center; line-height: 1.6; }
  .vhint b { color: var(--text-muted); }

  #vnav { position: fixed; top: 0; left: 0; right: 0; height: 46px; z-index: 9998; background: var(--chrome); border-bottom: 1px solid var(--border-strong); display: flex; align-items: center; gap: var(--s-4); padding: 0 var(--s-10); font-size: var(--t-sm); }
  #vnav .lbl { color: var(--text-muted); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; font-size: var(--t-2xs); margin-right: var(--s-4); }
  .vtab { font: inherit; font-size: var(--t-sm); color: var(--text-2); background: var(--surface); border: 1px solid var(--border); padding: 5px 12px; border-radius: var(--r-full); cursor: pointer; }
  .vtab.active { background: var(--accent-tint); border-color: var(--accent-strong); color: var(--accent); font-weight: 600; }
  #vnav .hint { margin-left: auto; color: var(--text-faint); font-size: var(--t-2xs); }
  #tools { position: fixed; bottom: 12px; left: 12px; z-index: 9999; font-family: system-ui; font-size: 11px; background: rgba(0,0,0,0.72); color: #fff; padding: 7px 10px; border-radius: 8px; opacity: 0.4; display: flex; gap: 8px; transition: opacity .2s; }
  #tools:hover { opacity: 1; } #tools select { font: inherit; background: #222; color: #fff; border: 1px solid #555; border-radius: 4px; }
</style>
</head>
<body>

<nav id="vnav">
  <span class="lbl">Sketch 047 · shell responsive ladder</span>
  <button class="vtab active" onclick="show('a',this)">A ★ · Metadata cede primero</button>
  <button class="vtab" onclick="show('b',this)">B · Columnas internas primero</button>
  <button class="vtab" onclick="show('c',this)">C · Riel → barra inferior</button>
  <span class="hint">La secuencia de colapso del shell completo (3-col → 2-col → apilado), distinta del reflow de tabs (018)</span>
</nav>

<div class="variant active" id="v-a"></div>
<div class="variant" id="v-b"></div>
<div class="variant" id="v-c"></div>

<div id="tools"><span>theme</span>
  <select onchange="document.querySelector('link[href*=themes]').href='../themes/'+this.value+'.css'"><option value="default">default</option></select>
</div>

<script>
function rail(activeBottom){
  return `<nav class="rail"><div class="rl"></div>
    <div class="rb on">✎</div><div class="rb">≣</div><div class="rb">✓</div>
    <div class="sp"></div><div class="rb">⚙</div><div class="rb">?</div></nav>`;
}
function header(tabsMode){
  // tabsMode: 'full' shows 4 tabs, 'tight' shows fewer, 'mini' hides tabs into the work area
  const tabs = tabsMode==='mini' ? '' : `<div class="tabs"><span class="tb on">Sub</span><span class="tb">Tít</span><span class="tb">Ovl</span>${tabsMode==='full'?'<span class="tb">Vid</span>':''}</div>`;
  return `<div class="hdr"><span style="font-weight:600;color:var(--text)">Estilo ▾</span>${tabs}<span class="sp"></span><span class="ob">Guardar</span><span class="gn">▶ Render</span></div>`;
}
function stage(){ return `<div class="col stagecol"><div class="stage9"><div class="cp">así <b>editás</b> tus reels</div></div></div>`; }
function controls(cols){ return `<div class="col ctrlcol"><p class="cl">Posición · Estilo</p><div class="cgrid ${cols}"><div class="cf"></div><div class="cf"></div><div class="cf"></div><div class="cf"></div><div class="cf"></div><div class="cf"></div></div></div>`; }
function metaCol(){ return `<div class="col metacol"><div class="ph">Metadata<br>de redes<br>— próximamente —</div></div>`; }
function metaTab(){ return `<div class="metatab"><span>Metadata ▸</span></div>`; }

// ─────────── Variant A: metadata folds first; rail persists; preview stacks last ───────────
function frameA(size){
  if(size==='lg'){
    return `<div class="frame lg"><div class="shell">${rail()}<div class="colwrap">${header('full')}
      <div class="work">${stage()}${controls('two')}${metaCol()}</div></div></div></div>`;
  }
  if(size==='md'){
    // metadata (a placeholder) folds to a toggle tab; preview+controls stay side by side; controls go 1-col
    return `<div class="frame md"><div class="shell">${rail()}<div class="colwrap">${header('tight')}
      <div class="work">${stage()}${controls('one')}</div></div>${metaTab()}</div></div>`;
  }
  // sm: preview stacks over controls; rail stays (icon-only, already 38px); metadata stays folded
  return `<div class="frame sm"><div class="shell">${rail()}<div class="colwrap">${header('tight')}
    <div class="work stack">${stage()}${controls('one')}</div></div></div></div>`;
}

// ─────────── Variant B: controls' internal columns collapse first, metadata persists longer ───────────
function frameB(size){
  if(size==='lg'){
    return `<div class="frame lg"><div class="shell">${rail()}<div class="colwrap">${header('full')}
      <div class="work">${stage()}${controls('two')}${metaCol()}</div></div></div></div>`;
  }
  if(size==='md'){
    // controls go 1-col (018's rule at shell scale) but metadata column SURVIVES (it's the reserved AI width)
    return `<div class="frame md"><div class="shell">${rail()}<div class="colwrap">${header('tight')}
      <div class="work">${stage()}${controls('one')}${metaCol()}</div></div></div></div>`;
  }
  // sm: now metadata folds AND preview stacks; rail → bottom bar
  return `<div class="frame sm"><div class="colwrap" style="height:100%;display:flex">${header('mini')}
    <div class="work stack" style="flex:1">${stage()}${controls('one')}</div>
    <div class="botbar"><div class="bb on">✎</div><div class="bb">≣</div><div class="bb">✓</div><div class="bb">⚙</div><div class="bb">?</div></div></div></div>`;
}

// ─────────── Variant C: preview-priority — rail → bottom bar early to free horizontal room ───────────
function frameC(size){
  if(size==='lg'){
    return `<div class="frame lg"><div class="shell">${rail()}<div class="colwrap">${header('full')}
      <div class="work">${stage()}${controls('two')}${metaCol()}</div></div></div></div>`;
  }
  if(size==='md'){
    // rail becomes bottom bar already → preview keeps full prominence beside controls; metadata folds
    return `<div class="frame md"><div class="colwrap" style="height:100%;display:flex">${header('tight')}
      <div class="work" style="flex:1">${stage()}${controls('one')}</div>
      <div class="botbar"><div class="bb on">✎</div><div class="bb">≣</div><div class="bb">✓</div><div class="bb">⚙</div><div class="bb">?</div></div></div></div>`;
  }
  // sm: single column, preview pinned top, controls scroll, bottom bar nav
  return `<div class="frame sm"><div class="colwrap" style="height:100%;display:flex">${header('mini')}
    <div class="work stack" style="flex:1">${stage()}${controls('one')}</div>
    <div class="botbar"><div class="bb on">✎</div><div class="bb">≣</div><div class="bb">✓</div><div class="bb">⚙</div><div class="bb">?</div></div></div></div>`;
}

const BUILDERS = { a: frameA, b: frameB, c: frameC };
const ROWS = [
  { size:'lg', fw:'Escritorio', bp:'≥ 1100px', fd:'3 columnas · riel + preview + controles(2col) + metadata' },
  { size:'md', fw:'Laptop angosto', bp:'~ 820px', fd:'el punto donde algo tiene que ceder' },
  { size:'sm', fw:'Tablet / vertical', bp:'≤ 620px', fd:'una sola columna de trabajo' },
];
const CHANGES = {
  a: {
    md: ['<b>Metadata</b> se pliega a una pestaña ▸ (hoy es placeholder, cede primero)', 'Controles → <b>1 columna</b> interna', 'Riel intacto'],
    sm: ['Preview <b>se apila</b> sobre los controles', 'Riel se mantiene (ya es 38px)', 'Metadata sigue plegada'],
  },
  b: {
    md: ['Controles → <b>1 columna</b> (regla 018 a escala de shell)', '<b>Metadata persiste</b> (su ancho reservado de IA)', 'Riel intacto'],
    sm: ['Ahora sí: metadata se pliega + preview se apila', 'Riel → <b>barra inferior</b>'],
  },
  c: {
    md: ['Riel → <b>barra inferior</b> ya acá (libera ancho horizontal)', 'Preview mantiene prominencia', 'Metadata plegada'],
    sm: ['Una columna; preview fijo arriba, controles scrollean', 'Barra inferior de navegación'],
  },
};
const VHINTS = {
  a: 'A — <b>la metadata cede primero</b>: es un placeholder "Próximamente", así que es lo de menor valor hoy; se pliega a una pestaña al primer apretón. El riel (ya angosto, 38–56px) sobrevive hasta el final. Secuencia simple, una sola pieza se mueve por escalón.',
  b: 'B — <b>columnas internas primero</b>: respeta la regla 018 (form 2→1 col) a escala de shell antes de tocar la metadata, defendiendo el ancho reservado de la columna IA más tiempo. Apuesta a que la metadata vale su espacio aún apretado — discutible mientras siga "Próximamente".',
  c: 'C — <b>preview-priority</b>: el riel se va a barra inferior temprano para dar ancho horizontal, tratando el preview 9:16 como el héroe. Idioma más "app móvil". Bueno si la herramienta se usa en tablets; pesado si es de escritorio (el riel Linear/Figma es la seña de identidad).'
};

function render(v){
  const build = BUILDERS[v];
  const ledeP = {
    a: 'El reflow 018 resolvió los <b>tabs densos</b> dentro de una columna de controles angosta. Esto es el escalón de arriba: el <b>shell entero</b> — riel de 56px + preview + controles + columna de metadata persistente — ¿en qué orden colapsa cuando la ventana se achica?',
    b: 'El reflow 018 resolvió los <b>tabs densos</b> dentro de una columna de controles angosta. Esto es el escalón de arriba: el <b>shell entero</b> — riel de 56px + preview + controles + columna de metadata persistente — ¿en qué orden colapsa cuando la ventana se achica?',
    c: 'El reflow 018 resolvió los <b>tabs densos</b> dentro de una columna de controles angosta. Esto es el escalón de arriba: el <b>shell entero</b> — riel de 56px + preview + controles + columna de metadata persistente — ¿en qué orden colapsa cuando la ventana se achica?'
  }[v];
  const rule = {
    a: '<b>Regla:</b> lo de menor valor cede primero (metadata-placeholder → pestaña), luego se apila el preview. El riel persiste; nunca barra inferior.',
    b: '<b>Regla:</b> primero la densidad interna (2→1 col, regla 018), después la metadata, último el riel → barra inferior.',
    c: '<b>Regla:</b> el preview manda; el riel cede temprano a barra inferior para liberar ancho. Idioma app/tablet.'
  }[v];
  return `<div class="wrap">
    <div class="lede"><h1>Escalera responsive del shell — ${v==='a'?'metadata cede primero':v==='b'?'columnas internas primero':'riel → barra inferior'}</h1>
      <p>${ledeP}</p><div class="rule">${rule}</div></div>
    <div class="frames">
      ${ROWS.map(r=>`<div class="framewrap">
        <div class="framelabel"><span class="fw">${r.fw}</span><span class="bp">${r.bp}</span><span class="fd">${r.fd}</span></div>
        ${build(r.size)}
        ${CHANGES[v][r.size] ? `<div class="change">${CHANGES[v][r.size].map(c=>`<span class="pill">${c}</span>`).join('')}</div>` : ''}
      </div>`).join('')}
    </div>
    <div class="vhint">${VHINTS[v]}</div>
  </div>`;
}
['a','b','c'].forEach(v=>{ document.getElementById('v-'+v).innerHTML = render(v); });

function show(id, btn){
  document.querySelectorAll('.variant').forEach(v=>v.classList.remove('active'));
  document.getElementById('v-'+id).classList.add('active');
  document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  window.scrollTo({top:0});
}
</script>
</body>
</html>
