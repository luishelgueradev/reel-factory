<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sketch 015 — north-star composite</title>
<link rel="stylesheet" href="../themes/default.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--font); background: var(--canvas); color: var(--text); font-size: var(--t-base); padding-top: 46px; -webkit-font-smoothing: antialiased; }
  .variant { display: none; height: calc(100vh - 46px); }
  .variant.active { display: flex; flex-direction: column; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hdr { height: 52px; flex: none; display: flex; align-items: center; gap: var(--s-8); padding: 0 var(--s-12); background: var(--chrome); border-bottom: 1px solid var(--border); }
  .brand { display: flex; align-items: center; gap: var(--s-5); flex: none; }
  .brand .glyph { width: 26px; height: 26px; border-radius: var(--r-sm); background: linear-gradient(145deg, var(--accent), var(--accent-strong)); display: grid; place-items: center; font-weight: 700; font-size: var(--t-md); color: var(--stage); }
  .brand h1 { font-size: var(--t-lg); font-weight: 600; letter-spacing: -0.01em; }
  .brand .tag { font-size: var(--t-2xs); color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 1px; }
  .save-chip { display: inline-flex; align-items: center; gap: 6px; font-size: var(--t-sm); padding: 5px 11px; border-radius: var(--r-full); color: var(--warning); background: oklch(0.80 0.12 78 / 0.12); margin-left: var(--s-4); }
  .save-chip .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; box-shadow: 0 0 0 3px oklch(0.80 0.12 78 / 0.22); }
  .hdr-spacer { flex: 1; }
  .hdr-actions { display: flex; gap: var(--s-6); align-items: center; flex: none; }
  .zone-div { width: 1px; height: 24px; background: var(--border); }
  .btn { font: inherit; font-size: var(--t-md); font-weight: 500; padding: 7px 14px; border-radius: var(--r-sm); border: 1px solid var(--border-strong); background: transparent; color: var(--text-2); cursor: pointer; }
  .btn:hover { background: var(--surface-2); color: var(--text); }
  .btn.ghost { color: var(--text-faint); border-color: var(--border); cursor: not-allowed; }
  .render-cta { display: inline-flex; align-items: center; gap: 8px; font: inherit; font-size: var(--t-md); font-weight: 600; padding: 7px 16px; border-radius: var(--r-sm); border: 1px solid transparent; background: var(--action); color: oklch(0.16 0.02 150); cursor: pointer; }
  .render-cta:hover { background: var(--action-hover); }
  .render-cta:disabled { opacity: 0.55; cursor: not-allowed; }
  .render-cta .gspin { width: 12px; height: 12px; border: 2px solid oklch(0.16 0.02 150); border-top-color: transparent; border-radius: 50%; display: inline-block; animation: spin .7s linear infinite; }

  .work { flex: 1; display: flex; min-height: 0; }
  .stage { position: relative; flex: 0 1 470px; background: var(--stage); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: var(--s-12); border-right: 1px solid var(--border); min-width: 0; }
  .phone { position: relative; aspect-ratio: 9 / 16; height: min(100%, 620px); border-radius: 18px; overflow: hidden;
           background: radial-gradient(120% 70% at 50% 18%, oklch(0.42 0.07 250), transparent 60%),
                       radial-gradient(90% 60% at 50% 95%, oklch(0.30 0.06 320), transparent 70%),
                       linear-gradient(180deg, oklch(0.30 0.04 255), oklch(0.18 0.03 270));
           box-shadow: var(--shadow-pop), inset 0 0 0 1px oklch(0.6 0.02 280 / 0.18); }
  /* draggable elements on the preview (007-A) */
  .el { position: absolute; z-index: 50; cursor: grab; user-select: none; outline: 1.5px solid transparent; outline-offset: 3px; border-radius: var(--r-xs); transition: outline-color var(--dur) var(--ease); }
  .el.sel { outline-color: var(--accent); }
  .el.dragging { cursor: grabbing; outline-color: var(--accent-strong); }
  .variant.scoped .el { cursor: pointer; }
  .el-title { padding: 7px 16px; border-radius: var(--r-sm); background: oklch(0.20 0.03 280 / 0.8); backdrop-filter: blur(3px); font-family: "Plus Jakarta Sans", var(--font); font-weight: 700; font-size: 16px; white-space: nowrap; color: #fff; }
  .el-cap { text-align: center; font-family: "Plus Jakarta Sans", var(--font); font-weight: 800; font-size: 26px; line-height: 1.15; color: #fff; text-shadow: 0 2px 12px oklch(0.12 0 0 / 0.85); width: 78%; }
  .el-cap .on { color: #ffea00; }
  .el-logo { width: 17%; aspect-ratio: 1; display: grid; place-items: center; border-radius: var(--r-sm); background: linear-gradient(140deg, oklch(0.7 0.13 30), oklch(0.6 0.16 12)); font-size: var(--t-xs); font-weight: 700; color: #fff; }
  /* snap guides */
  .guide { position: absolute; z-index: 45; background: var(--accent); opacity: 0; pointer-events: none; transition: opacity 120ms var(--ease); }
  .guide.vx { width: 1px; top: 0; bottom: 0; } .guide.hy { height: 1px; left: 0; right: 0; }
  .guide.show { opacity: 0.55; }
  .stage-meta { margin-top: var(--s-8); display: flex; gap: var(--s-6); align-items: center; color: var(--text-muted); font-size: var(--t-xs); }
  .pill { padding: 3px 9px; border-radius: var(--r-full); background: var(--surface); border: 1px solid var(--border); font-variant-numeric: tabular-nums; }
  .hint { margin-top: var(--s-5); font-size: var(--t-2xs); color: var(--text-faint); }
  .hint b { color: var(--accent); font-weight: 600; }

  /* render overlay */
  .stage-overlay { position: absolute; inset: 0; z-index: 80; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--s-10); padding: var(--s-16); background: oklch(0.165 0.022 280 / 0.86); backdrop-filter: blur(6px); opacity: 0; pointer-events: none; transition: opacity var(--dur) var(--ease); }
  .stage-overlay.show { opacity: 1; pointer-events: auto; }
  .ring-wrap { position: relative; width: 124px; height: 124px; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-wrap .pct { position: absolute; inset: 0; display: grid; place-items: center; font-size: var(--t-2xl); font-weight: 700; font-variant-numeric: tabular-nums; }
  .ring-wrap .pct small { display: block; font-size: var(--t-2xs); font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-top: 2px; }
  .steps { display: flex; flex-direction: column; gap: var(--s-3); width: 100%; max-width: 270px; }
  .step { display: flex; align-items: center; gap: var(--s-5); padding: var(--s-4) var(--s-5); border-radius: var(--r-sm); font-size: var(--t-sm); color: var(--text-muted); }
  .step .dot { width: 18px; height: 18px; border-radius: 50%; flex: none; display: grid; place-items: center; font-size: 10px; border: 1px solid var(--border-strong); color: var(--text-faint); }
  .step.done { color: var(--text-2); } .step.done .dot { background: var(--success); border-color: transparent; color: var(--stage); }
  .step.active { color: var(--text); background: var(--accent-tint-2); } .step.active .dot { border-color: var(--accent); color: var(--accent); }
  .step.active .dot .s { width: 9px; height: 9px; border-radius: 50%; border: 2px solid var(--accent); border-top-color: transparent; animation: spin 0.7s linear infinite; }
  .step .tool { margin-left: auto; font-size: var(--t-2xs); color: var(--text-faint); font-family: var(--mono); }
  .done-card { text-align: center; }
  .done-card .check { width: 54px; height: 54px; margin: 0 auto var(--s-6); border-radius: 50%; background: oklch(0.72 0.14 150 / 0.16); border: 1px solid var(--success); display: grid; place-items: center; font-size: 24px; color: var(--success); }
  .done-card .t1 { font-size: var(--t-lg); font-weight: 600; }
  .done-card .meta2 { font-size: var(--t-xs); color: var(--text-muted); margin-top: 4px; }
  .done-actions { display: flex; gap: var(--s-5); justify-content: center; margin-top: var(--s-8); flex-wrap: wrap; }
  .da { font: inherit; font-size: var(--t-sm); font-weight: 500; padding: 7px 14px; border-radius: var(--r-sm); border: 1px solid var(--border-strong); background: var(--surface-2); color: var(--text-2); cursor: pointer; }
  .da.prim { background: var(--accent); color: var(--stage); border-color: transparent; font-weight: 600; }

  .controls { display: flex; flex-direction: column; min-width: 0; background: var(--canvas); flex: 1 1 auto; }
  .tabs { display: flex; gap: 2px; padding: 0 var(--s-10); background: var(--chrome); border-bottom: 1px solid var(--border); flex: none; }
  .tab { appearance: none; border: none; background: none; font: inherit; font-size: var(--t-md); font-weight: 500; color: var(--text-muted); padding: 13px 14px 11px; cursor: pointer; border-bottom: 2px solid transparent; transition: color var(--dur) var(--ease); }
  .tab:hover { color: var(--text-2); }
  .tab.sel { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .tab .ct { margin-left: 6px; font-size: var(--t-2xs); color: var(--text-faint); }
  .ctrl-body { flex: 1; overflow-y: auto; padding: var(--s-10); }

  .scope-note { display: flex; align-items: center; gap: var(--s-5); padding: var(--s-5) var(--s-6); margin-bottom: var(--s-8); border-radius: var(--r-sm); font-size: var(--t-xs); line-height: 1.5; }
  .scope-note.committed { background: oklch(0.72 0.14 150 / 0.10); color: var(--text-2); border: 1px solid oklch(0.72 0.14 150 / 0.3); }
  .scope-note.frontier { background: var(--accent-tint-2); color: var(--text-2); border: 1px solid var(--accent-strong); }
  .scope-note b { color: var(--text); font-weight: 600; }

  .sec { margin-bottom: var(--s-10); }
  .sec-h { display: flex; align-items: center; gap: var(--s-5); font-size: var(--t-2xs); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: var(--s-6); }
  .sec-h::after { content: ""; flex: 1; height: 1px; background: var(--border-faint); }
  .sec-h .num { width: 16px; height: 16px; border-radius: var(--r-xs); background: var(--surface-2); display: grid; place-items: center; font-size: var(--t-2xs); color: var(--text-2); }
  .sec-h .note { color: var(--text-faint); font-weight: 500; text-transform: none; letter-spacing: 0; }
  .row { display: grid; grid-template-columns: 84px 1fr; align-items: center; gap: var(--s-6); margin-bottom: var(--s-5); }
  .ctrl-2col .row { grid-template-columns: 72px 1fr; }
  .row > label { font-size: var(--t-sm); color: var(--text-2); }
  .inp, .sel { font: inherit; font-size: var(--t-md); color: var(--text); background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 6px 9px; width: 100%; transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease); }
  .inp:focus, .sel:focus { outline: none; border-color: var(--accent-strong); box-shadow: 0 0 0 3px var(--accent-tint); }
  .inp.flash { animation: flash 0.5s var(--ease); }
  @keyframes flash { 0% { background: var(--accent-tint); border-color: var(--accent-strong); } 100% { background: var(--surface-2); } }
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-5); }
  .field { display: flex; flex-direction: column; gap: var(--s-3); }
  .field .mini { font-size: var(--t-2xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .seg { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 2px; gap: 2px; }
  .seg button { flex: 1; font: inherit; font-size: var(--t-sm); color: var(--text-2); background: none; border: none; padding: 5px; border-radius: var(--r-xs); cursor: pointer; }
  .seg button.on { background: var(--accent-tint); color: var(--accent); font-weight: 600; }
  .rng { display: grid; grid-template-columns: 1fr 42px; align-items: center; gap: var(--s-5); }
  input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; border-radius: var(--r-full); background: var(--surface-hover); }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; border-radius: 50%; background: var(--accent); cursor: pointer; }
  .rng output { font-size: var(--t-xs); color: var(--text-2); font-variant-numeric: tabular-nums; text-align: right; }
  .pgrid { display: inline-grid; grid-template-columns: repeat(3, 30px); grid-auto-rows: 30px; gap: 3px; margin-top: var(--s-6); }
  .pgrid button { border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); border-radius: var(--r-xs); cursor: pointer; font-size: 13px; display: grid; place-items: center; transition: all var(--dur) var(--ease); }
  .pgrid button:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-strong); }
  .pgrid button.on { background: var(--accent-tint); border-color: var(--accent-strong); color: var(--accent); }
  .colorfield { display: flex; align-items: center; gap: var(--s-4); }
  .cswatch { position: relative; width: 26px; height: 26px; flex: none; border-radius: var(--r-sm); border: 1px solid var(--border-strong); overflow: hidden; cursor: pointer; }
  .cswatch input[type=color] { position: absolute; inset: -4px; width: calc(100% + 8px); height: calc(100% + 8px); border: none; padding: 0; background: none; cursor: pointer; }
  .chex { font-family: var(--mono); font-size: var(--t-xs); color: var(--text-2); text-transform: uppercase; }
  .cmatrix { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-5) var(--s-6); }
  .crole { display: flex; align-items: center; gap: var(--s-4); padding: var(--s-3) 0; }
  .crole .rl { font-size: var(--t-xs); color: var(--text-2); }

  .modecards { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--s-4); }
  .modecard { padding: var(--s-5) var(--s-3) var(--s-4); background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); cursor: pointer; text-align: center; transition: border-color var(--dur) var(--ease), background var(--dur) var(--ease); }
  .modecard.on { border-color: var(--accent-strong); background: var(--accent-tint-2); }
  .modecard .mc-vis { height: 28px; border-radius: var(--r-xs); background: var(--stage); display: grid; place-items: center; margin-bottom: var(--s-4); font-size: 9px; font-weight: 800; }
  .mc-vis .a { color: #ffea00; } .mc-vis .b { color: #fff; opacity: 0.65; } .mc-vis .bar { background: var(--accent); color: var(--stage); padding: 1px 4px; border-radius: 2px; }
  .modecard .mc-nm { font-size: var(--t-2xs); color: var(--text-2); font-weight: 600; }
  .modecard.on .mc-nm { color: var(--accent); }

  .listhead { display: flex; align-items: center; gap: var(--s-5); font-size: var(--t-2xs); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: var(--s-6); }
  .listhead .cnt { margin-left: auto; font-weight: 600; color: var(--text-faint); text-transform: none; letter-spacing: 0; }
  .ovlist { display: flex; flex-direction: column; gap: var(--s-4); margin-bottom: var(--s-6); }
  .ovcard { display: flex; align-items: center; gap: var(--s-5); padding: var(--s-4) var(--s-5); background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); cursor: pointer; }
  .ovcard:hover { border-color: var(--border-strong); }
  .ovcard.sel { border-color: var(--accent-strong); background: var(--accent-tint-2); }
  .ovcard .drag { color: var(--text-faint); font-size: 15px; cursor: grab; }
  .ovthumb { width: 30px; height: 30px; border-radius: var(--r-xs); flex: none; display: grid; place-items: center; font-size: 12px; font-weight: 700; color: #fff; }
  .th-logo { background: linear-gradient(140deg, oklch(0.7 0.13 30), oklch(0.6 0.16 12)); } .th-mark { background: oklch(0.96 0.01 280 / 0.14); border: 1px solid oklch(0.96 0.01 280 / 0.3); } .th-text { background: var(--accent-tint); color: var(--accent); }
  .ovcard .info { flex: 1; min-width: 0; } .ovcard .nm { font-size: var(--t-sm); color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; } .ovcard .sub { font-size: var(--t-2xs); color: var(--text-muted); margin-top: 1px; }
  .lbadge { font-size: var(--t-2xs); font-weight: 700; text-transform: uppercase; padding: 2px 7px; border-radius: var(--r-full); border: 1px solid var(--border); }
  .lbadge.back { color: var(--text-muted); background: var(--surface-2); } .lbadge.front { color: var(--accent); background: var(--accent-tint); border-color: var(--accent-strong); }
  .addbtn { width: 100%; padding: 8px; border: 1px dashed var(--border-strong); background: transparent; color: var(--text-2); border-radius: var(--r-sm); font: inherit; font-size: var(--t-sm); cursor: pointer; }
  .addbtn:hover { border-color: var(--accent-strong); color: var(--accent); }
  .editing-head { display: flex; align-items: center; justify-content: space-between; margin: var(--s-12) 0 var(--s-6); padding-bottom: var(--s-5); border-bottom: 1px solid var(--border-faint); }
  .editing-head .t { font-size: var(--t-md); font-weight: 600; }
  .ta { font: inherit; font-size: var(--t-md); line-height: 1.5; color: var(--text); background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r-sm); padding: var(--s-5) var(--s-6); width: 100%; resize: none; height: 40px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; cursor: text; transition: height var(--dur) var(--ease), border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease); }
  .ta:focus { outline: none; height: 80px; white-space: normal; border-color: var(--accent-strong); box-shadow: 0 0 0 3px var(--accent-tint); }
  .ta-meta { margin-top: var(--s-3); font-size: var(--t-2xs); }
  .ta-meta .drives { display: inline-flex; align-items: center; gap: 5px; color: var(--accent); }
  .ta-meta .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 3px var(--accent-tint); }
  .specimen { position: relative; border-radius: var(--r-md); overflow: hidden; background: linear-gradient(180deg, oklch(0.30 0.04 255), oklch(0.20 0.03 270)); border: 1px solid var(--border); min-height: 80px; display: grid; place-items: center; padding: var(--s-8); }
  .specimen .sp-cap { font-family: "Plus Jakarta Sans", var(--font); font-weight: 800; font-size: 22px; text-align: center; } .specimen .sp-cap .w { color: #fff; } .specimen .sp-cap .w.on { color: #ffea00; }
  .specimen .sp-tag { position: absolute; top: 7px; right: 9px; font-size: var(--t-2xs); color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.07em; }
  .fontgrid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-4); }
  .fontcard { padding: var(--s-4) var(--s-5); background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); cursor: pointer; }
  .fontcard.on { border-color: var(--accent-strong); background: var(--accent-tint-2); }
  .fontcard .fn { font-size: var(--t-sm); color: var(--text); } .fontcard .fp { font-size: var(--t-2xs); color: var(--text-muted); margin-top: 2px; }

  .ctrl-2col { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-6) var(--s-12); align-items: start; }
  .ctrl-2col .colwrap { display: flex; flex-direction: column; min-width: 0; }
  .ctrl-2col .colwrap > .sec:first-child { margin-top: 0; }
  .fullbleed { margin-bottom: var(--s-10); }

  .meta { background: var(--chrome); border-left: 1px solid var(--border); display: flex; flex-direction: column; min-width: 0; flex: 0 0 320px; }
  .meta-h { padding: var(--s-10) var(--s-10) var(--s-6); }
  .meta-h .row1 { display: flex; align-items: center; justify-content: space-between; }
  .meta-h h2 { font-size: var(--t-md); font-weight: 600; }
  .soon { font-size: var(--t-2xs); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); background: var(--accent-tint); padding: 3px 8px; border-radius: var(--r-full); }
  .meta-h p { font-size: var(--t-xs); color: var(--text-muted); margin-top: 4px; line-height: 1.5; }
  .meta-body { flex: 1; overflow-y: auto; padding: var(--s-6) var(--s-10) var(--s-12); display: flex; flex-direction: column; gap: var(--s-8); }
  .ghost { opacity: 0.5; pointer-events: none; }
  .gh-label { font-size: var(--t-2xs); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: var(--s-3); }
  .gh-box { background: var(--surface); border: 1px dashed var(--border-strong); border-radius: var(--r-sm); padding: var(--s-6); color: var(--text-faint); font-size: var(--t-sm); }
  .gh-line { height: 9px; border-radius: var(--r-full); background: var(--surface-2); margin: 7px 0; }
  .gh-line.w70 { width: 70%; } .gh-line.w90 { width: 90%; } .gh-line.w50 { width: 50%; }
  .chips { display: flex; flex-wrap: wrap; gap: var(--s-4); }
  .chip { font-size: var(--t-xs); color: var(--text-2); background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-full); padding: 4px 10px; }

  #vnav { position: fixed; top: 0; left: 0; right: 0; height: 46px; z-index: 9998; background: var(--chrome); border-bottom: 1px solid var(--border-strong); display: flex; align-items: center; gap: var(--s-4); padding: 0 var(--s-10); font-size: var(--t-sm); }
  #vnav .lbl { color: var(--text-muted); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; font-size: var(--t-2xs); margin-right: var(--s-4); }
  .vtab { font: inherit; font-size: var(--t-sm); color: var(--text-2); background: var(--surface); border: 1px solid var(--border); padding: 5px 12px; border-radius: var(--r-full); cursor: pointer; }
  .vtab.active { background: var(--accent-tint); border-color: var(--accent-strong); color: var(--accent); font-weight: 600; }
  #tools { position: fixed; bottom: 12px; right: 12px; z-index: 9999; font-family: system-ui; font-size: 11px; background: rgba(0,0,0,0.72); color: #fff; padding: 7px 10px; border-radius: 8px; opacity: 0.4; display: flex; gap: 8px; align-items: center; }
  #tools:hover { opacity: 1; }
  #tools select { font: inherit; background: #222; color: #fff; border: 1px solid #555; border-radius: 4px; padding: 2px 4px; }
</style>
</head>
<body>

<nav id="vnav">
  <span class="lbl">Sketch 015 · north-star composite</span>
  <button class="vtab active" onclick="show('a',this)">A ★ · North star (everything)</button>
  <button class="vtab" onclick="show('b',this)">B · Committed scope only</button>
  <span style="margin-left:auto;color:var(--text-faint);font-size:var(--t-2xs)">drag elements on the preview · switch tabs · Render the reel (A)</span>
</nav>

<div class="variant active scoped-off" id="v-a"></div>
<div class="variant scoped" id="v-b"></div>

<div id="tools"><span>theme</span>
  <select onchange="document.querySelector('link[href*=themes]').href='../themes/'+this.value+'.css'"><option value="default">default</option></select>
</div>

<script>
  const STEPS = [
    { id:'transcribe', label:'Transcripción', tool:'Whisper' },
    { id:'silence', label:'Cortar silencios', tool:'FFmpeg' },
    { id:'render', label:'Render 9:16', tool:'Remotion' },
  ];
  const titles = [{ id:'t1', name:'Cómo edité este reel', x:300, y:175 }, { id:'t2', name:'El antes y el después', x:300, y:1500 }];
  const overlays = [
    { id:'o1', name:'logo-marca.png', kind:'logo', x:840, y:75, w:170, op:1, layer:'front' },
    { id:'o2', name:'watermark.png', kind:'mark', x:465, y:880, w:150, op:0.45, layer:'back' },
    { id:'o3', name:'marco-borde.png', kind:'frame', x:0, y:0, w:1080, op:0.7, layer:'back' },
  ];
  // element positions on the preview (px in 1080×1920 space, top-left anchor of element center is approximated)
  const els = {
    title: { x:300, y:175 },
    caption: { x:140, y:1480 },
    logo: { x:840, y:75 },
  };
  const state = { a:{ tab:'titles', selT:'t1', selO:'o1', selEl:'title', render:'idle', prog:0, step:0 }, b:{ tab:'titles', selT:'t1', selO:'o1', selEl:'title' } };
  let timer = {};

  const ANCHORS = [[0.12,0.10],[0.5,0.10],[0.88,0.10],[0.12,0.5],[0.5,0.5],[0.88,0.5],[0.12,0.88],[0.5,0.88],[0.88,0.88]];
  const presetGrid = `<div class="pgrid"><button>↖</button><button>↑</button><button>↗</button><button>←</button><button>•</button><button>→</button><button>↙</button><button class="on">↓</button><button>↘</button></div>`;

  // ── forms ──
  function titleForm(t){
    return `<div class="ctrl-2col">
      <div class="colwrap">
        <div class="sec"><div class="sec-h"><span class="num">1</span>Posición</div>
          <div class="two"><div class="field"><span class="mini">X</span><input class="inp" data-x value="${t.x}"></div><div class="field"><span class="mini">Y</span><input class="inp" data-y value="${t.y}"></div></div>${presetGrid}</div>
        <div class="sec" style="margin-bottom:0"><div class="sec-h"><span class="num">3</span>Avanzado <span class="note">· rara vez</span></div>
          <div class="row"><label>Entrada</label><select class="sel"><option>Slide ↑</option><option>Fade</option><option>Ninguna</option></select></div>
          <div class="row"><label>Aparece</label><input class="inp" value="0.0 s"></div></div>
      </div>
      <div class="colwrap">
        <div class="sec" style="margin-bottom:0"><div class="sec-h"><span class="num">2</span>Estilo</div>
          <div class="row"><label>Texto</label><input class="inp" value="${t.name}"></div>
          <div class="row"><label>Fuente</label><select class="sel"><option>Plus Jakarta Sans</option><option>Inter</option></select></div>
          <div class="row"><label>Tamaño</label><div class="rng"><input type="range" min="20" max="120" value="56"><output>56</output></div></div>
          <div class="row"><label>Peso</label><div class="seg"><button>Reg</button><button class="on">Bold</button></div></div>
          <div class="row"><label>Caja col.</label><div class="colorfield"><span class="cswatch"><input type="color" value="#1a1a2e"></span><span class="chex">#1A1A2E</span></div></div></div>
      </div></div>`;
  }
  function overlayForm(o){
    return `<div class="ctrl-2col">
      <div class="colwrap">
        <div class="sec"><div class="sec-h"><span class="num">1</span>Posición</div>
          <div class="two"><div class="field"><span class="mini">X</span><input class="inp" data-x value="${o.x}"></div><div class="field"><span class="mini">Y</span><input class="inp" data-y value="${o.y}"></div></div>${presetGrid}</div>
        <div class="sec" style="margin-bottom:0"><div class="sec-h"><span class="num">3</span>Avanzado</div>
          <div class="row"><label>Aparece</label><input class="inp" value="0.0 s"></div></div>
      </div>
      <div class="colwrap">
        <div class="sec" style="margin-bottom:0"><div class="sec-h"><span class="num">2</span>Estilo</div>
          <div class="row"><label>Capa</label><div class="seg"><button class="${o.layer==='back'?'on':''}">Detrás</button><button class="${o.layer==='front'?'on':''}">Delante</button></div></div>
          <div class="row"><label>Ancho</label><div class="rng"><input type="range" min="40" max="1080" value="${o.w}"><output>${o.w}</output></div></div>
          <div class="row"><label>Opacidad</label><div class="rng"><input type="range" min="0" max="100" value="${Math.round(o.op*100)}"><output>${Math.round(o.op*100)}</output></div></div></div>
      </div></div>`;
  }
  function subtitleBody(){
    return `<div class="sec fullbleed"><div class="sec-h"><span class="num">✎</span>Texto de muestra <span class="note" style="margin-left:auto">enfocá para expandir</span></div>
        <textarea class="ta" data-text>Cómo edité este reel para que los subtítulos enganchen palabra por palabra.</textarea>
        <div class="ta-meta"><span class="drives"><span class="dot"></span>Alimenta los subtítulos · no se exporta</span></div></div>
      <div class="specimen fullbleed"><span class="sp-tag">vista en vivo</span><div class="sp-cap" data-cap></div></div>
      <div class="sec fullbleed"><div class="sec-h">Modo de subtítulo</div><div class="modecards">
          <div class="modecard" data-mode><div class="mc-vis"><span class="a">pa</span><span class="b">labra</span></div><div class="mc-nm">TikTok</div></div>
          <div class="modecard on" data-mode><div class="mc-vis"><span class="bar">barra</span></div><div class="mc-nm">Barra</div></div>
          <div class="modecard" data-mode><div class="mc-vis"><span class="b">frase</span></div><div class="mc-nm">Frase</div></div>
          <div class="modecard" data-mode><div class="mc-vis"><span class="a">k</span><span class="b">oke</span></div><div class="mc-nm">Karaoke</div></div></div></div>
      <div class="ctrl-2col">
        <div class="colwrap">
          <div class="sec"><div class="sec-h"><span class="num">1</span>Tipografía</div>
            <div class="fontgrid" style="margin-bottom:var(--s-6)"><div class="fontcard on" data-font="'Plus Jakarta Sans'"><div class="fn" style="font-family:'Plus Jakarta Sans'">Plus Jakarta</div><div class="fp">Humanista</div></div><div class="fontcard" data-font="Inter"><div class="fn" style="font-family:Inter">Inter</div><div class="fp">Geométrica</div></div></div>
            <div class="row"><label>Tamaño</label><div class="rng"><input type="range" min="24" max="200" value="58" data-size><output>58</output></div></div>
            <div class="row"><label>Estilo</label><div class="seg" data-weight><button>Reg</button><button class="on">Bold</button></div></div></div>
          <div class="sec" style="margin-bottom:0"><div class="sec-h"><span class="num">3</span>Posición</div>
            <div class="row"><label>Lugar</label><div class="seg"><button>Arriba</button><button>Centro</button><button class="on">Abajo</button></div></div>${presetGrid}</div>
        </div>
        <div class="colwrap">
          <div class="sec"><div class="sec-h"><span class="num">2</span>Color</div>
            <div class="cmatrix"><div class="crole"><span class="cswatch"><input type="color" value="#ffea00" data-active></span><span class="rl">Activo</span></div>
              <div class="crole"><span class="cswatch"><input type="color" value="#ffffff"></span><span class="rl">Inactivo</span></div></div></div>
          <div class="sec" style="margin-bottom:0"><div class="sec-h">Efectos <span class="note">· opcionales</span></div>
            <div class="row"><label>Glow</label><div class="seg"><button class="on">Off</button><button>On</button></div></div></div>
        </div>
      </div>`;
  }

  function tabBody(vk){
    const v = state[vk];
    if (v.tab==='subtitles') return subtitleBody();
    const isOv = v.tab==='overlays';
    const items = isOv ? overlays : titles;
    const selId = isOv ? v.selO : v.selT;
    const selItem = items.find(i=>i.id===selId) || items[0];
    let h = `<div class="listhead">${isOv?'Overlays':'Títulos'} <span class="cnt">${items.length}${isOv?' / 3':''}</span></div><div class="ovlist" data-list>`;
    items.forEach(i=>{
      const kind = isOv ? i.kind : 'text';
      const th = kind==='logo'?'th-logo':kind==='text'?'th-text':'th-mark';
      const g = kind==='logo'?'R':kind==='mark'?'@':kind==='frame'?'▢':'T';
      const sub = isOv ? `${i.w}px · ${Math.round(i.op*100)}%` : `X ${i.x} · Y ${i.y}`;
      const badge = isOv ? `<span class="lbadge ${i.layer}">${i.layer==='back'?'Detrás':'Delante'}</span>` : '';
      h += `<div class="ovcard ${i.id===selId?'sel':''}" data-id="${i.id}"><span class="drag">⠿</span><span class="ovthumb ${th}">${g}</span><div class="info"><div class="nm">${i.name}</div><div class="sub">${sub}</div></div>${badge}</div>`;
    });
    h += `</div><button class="addbtn">＋ Agregar ${isOv?'overlay':'título'}</button>`;
    h += `<div class="editing-head"><span class="t">${isOv?'Overlay':'Título'} · ${selItem.name}</span></div>`;
    h += isOv ? overlayForm(selItem) : titleForm(selItem);
    return h;
  }

  // ── header ──
  function header(vk){
    const v = state[vk];
    if (vk==='b') {
      return `<div class="brand"><div class="glyph">R</div><div><h1>Reel Factory Studio</h1><div class="tag">Vertical 9:16</div></div></div>
        <span class="save-chip"><span class="dot"></span>Cambios sin guardar</span><div class="hdr-spacer"></div>
        <div class="hdr-actions"><button class="btn">Guardar config</button><span class="zone-div"></span><button class="btn ghost" title="Frontera — fuera de alcance comprometido">▶ Render Video</button></div>`;
    }
    const running = v.render==='running';
    const renderInner = running ? `<span class="gspin"></span>Renderizando…` : v.render==='done' ? `▶ Render de nuevo` : `<span style="font-size:11px">▶</span>Render Video`;
    return `<div class="brand"><div class="glyph">R</div><div><h1>Reel Factory Studio</h1><div class="tag">Vertical 9:16</div></div></div>
      <span class="save-chip"><span class="dot"></span>Cambios sin guardar</span><div class="hdr-spacer"></div>
      <div class="hdr-actions"><button class="btn" ${running?'disabled':''}>Guardar config</button><span class="zone-div"></span><button class="render-cta" data-render ${running?'disabled':''}>${renderInner}</button></div>`;
  }

  // ── stage overlay ──
  function ringSvg(pct){ const r=54,c=2*Math.PI*r,off=c*(1-pct/100);
    return `<svg width="124" height="124"><circle cx="62" cy="62" r="${r}" fill="none" stroke="var(--border)" stroke-width="6"/><circle cx="62" cy="62" r="${r}" fill="none" stroke="var(--accent)" stroke-width="6" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset var(--dur) var(--ease)"/></svg>`; }
  function stageOverlay(v){
    if (!v || v.render==='idle' || v.render===undefined) return '';
    let inner='';
    if (v.render==='running') inner = `<div class="ring-wrap">${ringSvg(v.prog)}<div class="pct">${v.prog}%<small>${STEPS[v.step].label}</small></div></div>
        <div class="steps">`+STEPS.map((s,i)=>{ const cls=i<v.step?'done':i===v.step?'active':''; const ic=i<v.step?'✓':i===v.step?'<span class="s"></span>':i+1; return `<div class="step ${cls}"><span class="dot">${ic}</span>${s.label}<span class="tool">${s.tool}</span></div>`; }).join('')+`</div>`;
    else inner = `<div class="done-card"><div class="check">✓</div><div class="t1">Reel listo</div><div class="meta2">reel-final.mp4 · 1080×1920 · 8.4 MB · 00:42</div>
        <div class="done-actions"><button class="da prim">⤓ Descargar MP4</button><button class="da">Ver</button></div></div>`;
    return `<div class="stage-overlay show">${inner}</div>`;
  }

  // ── preview elements ──
  function phoneInner(vk){
    const v = state[vk];
    const selEl = v.selEl;
    const titleSel = (v.tab==='titles' && selEl==='title') ? ' sel':'';
    const capSel = (v.tab==='subtitles' && selEl==='caption') ? ' sel':'';
    const logoSel = (v.tab==='overlays' && selEl==='logo') ? ' sel':'';
    return `<div class="guide vx" data-gx></div><div class="guide hy" data-gy></div>
      <div class="el el-title${titleSel}" data-el="title" style="left:${(els.title.x/1080*100)}%;top:${(els.title.y/1920*100)}%">Cómo edité este reel</div>
      <div class="el el-logo${logoSel}" data-el="logo" style="left:${(els.logo.x/1080*100)}%;top:${(els.logo.y/1920*100)}%">LOGO</div>
      <div class="el el-cap${capSel}" data-el="caption" style="left:${(els.caption.x/1080*100)}%;top:${(els.caption.y/1920*100)}%"><span class="on">subtítulos</span> que enganchan</div>`;
  }

  const metaHTML = `<aside class="meta"><div class="meta-h"><div class="row1"><h2>Metadata de redes</h2><span class="soon">Próximamente</span></div>
      <p>Generada con IA desde la transcripción y los títulos.</p></div>
    <div class="meta-body ghost"><div><div class="gh-label">Título</div><div class="gh-box">El truco de edición que cambió mis reels</div></div>
      <div><div class="gh-label">Descripción</div><div class="gh-box"><div class="gh-line w90"></div><div class="gh-line w70"></div><div class="gh-line w50"></div></div></div>
      <div><div class="gh-label">Hashtags</div><div class="chips"><span class="chip">#reels</span><span class="chip">#edición</span><span class="chip">#tutorial</span></div></div></div></aside>`;

  function scopeNote(vk){
    if (vk==='b') return `<div class="scope-note committed"><span>✓</span><div><b>Alcance comprometido de la Fase 22.</b> Solo la superficie de edición: shell · controles · placeholder de metadata. Render y arrastrar-en-preview quedan como frontera (sketches 007 / 010), fuera de este corte.</div></div>`;
    return `<div class="scope-note frontier"><span>★</span><div><b>North star — todo compuesto.</b> Incluye los frontier 007 (arrastrar en el preview) y 010 (render en el stage). Arrastrá un elemento o tocá <b>Render Video</b>.</div></div>`;
  }

  function render(vk){
    const v = state[vk];
    document.getElementById('v-'+vk).innerHTML = `
      <header class="hdr">${header(vk)}</header>
      <div class="work">
        <section class="stage"><div class="phone" data-phone>${phoneInner(vk)}</div>
          <div class="stage-meta"><span class="pill">1080 × 1920</span><span class="pill">9:16</span><span class="pill">00:42</span></div>
          <div class="hint">${vk==='b'?'Tocá un elemento para seleccionar su control (subset barato de 007)':'Arrastrá cualquier elemento · imanta a los 9 anclajes'}</div>
          ${stageOverlay(v)}
        </section>
        <section class="controls">
          <div class="tabs">
            <button class="tab ${v.tab==='titles'?'sel':''}" data-tab="titles">Títulos<span class="ct">2</span></button>
            <button class="tab ${v.tab==='overlays'?'sel':''}" data-tab="overlays">Overlays<span class="ct">3</span></button>
            <button class="tab ${v.tab==='subtitles'?'sel':''}" data-tab="subtitles">Subtítulos</button>
          </div>
          <div class="ctrl-body">${scopeNote(vk)}${tabBody(vk)}</div>
        </section>
        ${metaHTML}
      </div>`;
    wire(vk); syncCap(vk);
  }

  function syncCap(vk){
    const root = document.getElementById('v-'+vk);
    const cap = root.querySelector('[data-cap]'); if (!cap) return;
    const text = root.querySelector('[data-text]')?.value.trim() || 'subtítulos que enganchan';
    const words = text.split(/\s+/).slice(0,4);
    const active = Math.min(1, words.length-1);
    cap.innerHTML = words.map((w,i)=>`<span class="w${i===active?' on':''}">${w}</span>`).join(' ');
    const ac = root.querySelector('[data-active]')?.value || '#ffea00';
    cap.querySelectorAll('.w.on').forEach(w=> w.style.color=ac);
  }

  function elFor(vk){ // map current tab → which element is "active"
    const v = state[vk];
    return v.tab==='titles'?'title': v.tab==='overlays'?'logo':'caption';
  }

  function wire(vk){
    const root = document.getElementById('v-'+vk); const v = state[vk];
    root.querySelectorAll('.tab').forEach(b=> b.onclick=()=>{ v.tab=b.dataset.tab; v.selEl=elFor(vk); render(vk); });
    root.querySelectorAll('[data-list] .ovcard').forEach(c=> c.onclick=()=>{ if(v.tab==='overlays') v.selO=c.dataset.id; else v.selT=c.dataset.id; render(vk); });
    root.querySelectorAll('.seg').forEach(s=> s.querySelectorAll('button').forEach(b=> b.onclick=()=>{ s.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); }));
    root.querySelectorAll('.pgrid').forEach(g=> g.querySelectorAll('button').forEach(b=> b.onclick=()=>{ g.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); }));
    root.querySelectorAll('.fontcard').forEach(c=> c.onclick=()=>{ c.closest('.fontgrid').querySelectorAll('.fontcard').forEach(x=>x.classList.remove('on')); c.classList.add('on'); });
    root.querySelectorAll('.modecard').forEach(c=> c.onclick=()=>{ c.closest('.modecards').querySelectorAll('.modecard').forEach(x=>x.classList.remove('on')); c.classList.add('on'); });
    root.querySelectorAll('.rng input[type=range]').forEach(r=>{ const out=r.parentElement.querySelector('output'); r.oninput=()=>{ if(out) out.textContent=r.value; syncCap(vk); }; });
    root.querySelectorAll('input[type=color]').forEach(ci=> ci.oninput=()=>{ const hex=ci.closest('.colorfield')?.querySelector('.chex'); if(hex) hex.textContent=ci.value.toUpperCase(); syncCap(vk); });
    const ta = root.querySelector('[data-text]'); if(ta) ta.oninput=()=>syncCap(vk);
    root.querySelectorAll('[data-render]').forEach(b=> b.onclick=()=> runRender(vk));
    // preview interaction
    const tabForEl = { title:'titles', logo:'overlays', caption:'subtitles' };
    root.querySelectorAll('.el').forEach(el=>{
      const name = el.dataset.el;
      if (vk==='b') { el.onclick=()=>{ v.tab=tabForEl[name]; v.selEl=name; render(vk); }; return; }
      el.addEventListener('pointerdown', e=> startDrag(vk, el, name, e));
    });
  }

  function startDrag(vk, el, name, e){
    const v = state[vk]; if (v.render==='running') return;
    const tabForEl = { title:'titles', logo:'overlays', caption:'subtitles' };
    if (v.tab !== tabForEl[name]) { v.tab=tabForEl[name]; v.selEl=name; render(vk); return; }
    v.selEl=name; el.classList.add('dragging','sel');
    const phone = el.parentElement; const pr = phone.getBoundingClientRect();
    const gx = phone.querySelector('[data-gx]'), gy = phone.querySelector('[data-gy]');
    el.setPointerCapture(e.pointerId);
    function move(ev){
      let px = (ev.clientX - pr.left) / pr.width;
      let py = (ev.clientY - pr.top) / pr.height;
      px = Math.max(0.02, Math.min(0.98, px)); py = Math.max(0.02, Math.min(0.98, py));
      // snap to nearest anchor if close
      let snapped=false;
      for (const [ax,ay] of ANCHORS){ if (Math.abs(px-ax)<0.05 && Math.abs(py-ay)<0.05){ px=ax; py=ay; snapped=true; } }
      el.style.left = (px*100)+'%'; el.style.top = (py*100)+'%';
      if (gx&&gy){ gx.style.left=(px*100)+'%'; gy.style.top=(py*100)+'%'; gx.classList.toggle('show',snapped); gy.classList.toggle('show',snapped); }
      els[name] = { x: Math.round(px*1080), y: Math.round(py*1920) };
      // live-write X/Y into the inspector inputs
      const xi = document.querySelector('#v-'+vk+' [data-x]'), yi = document.querySelector('#v-'+vk+' [data-y]');
      if (xi){ xi.value = els[name].x; xi.classList.remove('flash'); void xi.offsetWidth; xi.classList.add('flash'); }
      if (yi){ yi.value = els[name].y; yi.classList.remove('flash'); void yi.offsetWidth; yi.classList.add('flash'); }
    }
    function up(ev){ el.classList.remove('dragging'); if(gx)gx.classList.remove('show'); if(gy)gy.classList.remove('show');
      el.releasePointerCapture(e.pointerId); el.removeEventListener('pointermove', move); el.removeEventListener('pointerup', up);
      // persist into model
      if (name==='title'){ const t=titles.find(t=>t.id===v.selT); if(t){ t.x=els.title.x; t.y=els.title.y; } }
    }
    el.addEventListener('pointermove', move); el.addEventListener('pointerup', up);
  }

  function runRender(vk){
    const v = state[vk]; if (v.render==='running') return;
    clearInterval(timer[vk]); v.render='running'; v.prog=0; v.step=0; render(vk);
    timer[vk]=setInterval(()=>{
      v.prog += Math.max(2, Math.round(7*Math.random()));
      v.step = Math.min(STEPS.length-1, Math.floor(v.prog/(100/STEPS.length)));
      if (v.prog>=100){ v.prog=100; clearInterval(timer[vk]); v.render='done'; }
      render(vk);
    }, 240);
  }

  ['a','b'].forEach(render);

  function show(id, btn){
    document.querySelectorAll('.variant').forEach(v=>v.classList.remove('active'));
    document.getElementById('v-'+id).classList.add('active');
    document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
  }
</script>
</body>
